<script type="importmap">

<script type="module">
  import * as THREE from 'three';

  const canvas = document.getElementById('webgl-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setClearColor(0x000000, 0);
  
  const scene = new THREE.Scene();
  scene.background = null;
  scene.fog = new THREE.FogExp2(0x050505, 0.006);
  
  const camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 1.2, 13);
  camera.lookAt(0, 0, 0);
  
  // Cinematic Redshift-style lighting
  const ambientLight = new THREE.AmbientLight(0x111111);
  scene.add(ambientLight);
  
  const keyLight = new THREE.PointLight(0xe63946, 1.2);
  keyLight.position.set(3, 4, 5);
  scene.add(keyLight);
  
  const fillLight = new THREE.PointLight(0xffb347, 0.7);
  fillLight.position.set(-2, 2, 6);
  scene.add(fillLight);
  
  const rimLight = new THREE.PointLight(0xffffff, 0.5);
  rimLight.position.set(0, 3, -5);
  scene.add(rimLight);
  
  const backLight = new THREE.DirectionalLight(0x4466cc, 0.4);
  backLight.position.set(0, 2, -4);
  scene.add(backLight);
  
  // Floating particles (cinematic dust)
  const particleCount = 1800;
  const particleGeo = new THREE.BufferGeometry();
  const positions = new Float32Array(particleCount * 3);
  for (let i = 0; i < particleCount; i++) {
    positions[i*3] = (Math.random() - 0.5) * 50;
    positions[i*3+1] = (Math.random() - 0.5) * 28;
    positions[i*3+2] = (Math.random() - 0.5) * 40 - 20;
  }
  particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const particleMat = new THREE.PointsMaterial({ color: 0xe63946, size: 0.06, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending });
  const particles = new THREE.Points(particleGeo, particleMat);
  scene.add(particles);
  
  // Central Torus Knot (Cinematic 4D style)
  const knotGeo = new THREE.TorusKnotGeometry(1.0, 0.22, 200, 32, 3, 4);
  const knotMat = new THREE.MeshStandardMaterial({ color: 0xe63946, emissive: 0x441111, roughness: 0.25, metalness: 0.85, emissiveIntensity: 0.6 });
  const knot = new THREE.Mesh(knotGeo, knotMat);
  scene.add(knot);
  
  // Outer Ring with redshift gloss
  const ringGeo = new THREE.TorusGeometry(1.6, 0.04, 128, 300);
  const ringMat = new THREE.MeshStandardMaterial({ color: 0xffb347, emissive: 0x552200, metalness: 0.9, roughness: 0.2 });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  scene.add(ring);
  
  // Floating Orbs
  const orbGroup = new THREE.Group();
  const orbMat = new THREE.MeshStandardMaterial({ color: 0xff6b6b, emissive: 0x331111, emissiveIntensity: 0.5 });
  for (let i = 0; i < 80; i++) {
    const orb = new THREE.Mesh(new THREE.SphereGeometry(0.045, 12, 12), orbMat);
    const radius = 2.4;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    orb.position.set(radius * Math.sin(phi) * Math.cos(theta), radius * Math.sin(phi) * Math.sin(theta), radius * Math.cos(phi));
    orbGroup.add(orb);
  }
  scene.add(orbGroup);
  
  let time = 0;
  
  function animateWebGL() {
    requestAnimationFrame(animateWebGL);
    time += 0.008;
    
    knot.rotation.x = time * 0.5;
    knot.rotation.y = time * 0.7;
    knot.rotation.z = time * 0.3;
    knot.material.emissiveIntensity = 0.5 + Math.sin(time * 2) * 0.2;
    
    ring.rotation.x = Math.sin(time * 0.4) * 0.2;
    ring.rotation.y = time * 0.5;
    
    orbGroup.rotation.y = time * 0.2;
    orbGroup.rotation.x = Math.sin(time * 0.3) * 0.1;
    
    particles.rotation.y = time * 0.03;
    particles.rotation.x = Math.sin(time * 0.1) * 0.05;
    
    // Cinematic camera drift
    camera.position.x += (Math.sin(time * 0.2) * 0.06 - camera.position.x) * 0.02;
    camera.position.y += (Math.sin(time * 0.5) * 0.04 - camera.position.y) * 0.03;
    camera.lookAt(0, 0, 0);
    
    renderer.render(scene, camera);
  }
  animateWebGL();
  
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
  
  // ScrollTrigger for scroll effects
  ScrollTrigger.create({
    trigger: "body",
    start: "top top",
    end: "bottom bottom",
    onUpdate: (self) => {
      const prog = self.progress;
      knot.material.emissiveIntensity = 0.4 + prog * 0.6;
      particleMat.opacity = 0.3 + prog * 0.3;
    }
  });
</script>

<script>
  // ========== MASSIVE SNEAKER COLLECTION (120+ SHOES) ==========
  const brandList = ["Nike", "Jordan", "Adidas", "Under Armour", "Puma", "New Balance", "Reebok", "ASICS", "Li-Ning", "Anta", "Converse", "Vans"];
  const shoeNames = [
    "LeBron XXI", "Kobe 6 Protro", "Air Jordan 38", "Curry 11", "Harden Vol 8", "Ja Morant 2", "Dame 9", "Zion 3",
    "Paul George 6", "Kyrie Low 5", "Trae Young 3", "MB.03", "Kawhi 4", "Giannis Freak 5", "Don Issue 5", "Jordan Luka 2",
    "Clyde All-Pro", "Two WXY v4", "Curry 4 Flotro", "Crazy 1", "Way of Wade 10", "KT9", "Nova Surge", "Savage Motion",
    "Air Jordan 39", "LeBron NXXT Gen", "Jordan Tatum 2", "Curry 12", "Adidas AE 1", "Puma Scoot 1", "Kobe 8 Protro",
    "Air Max 95", "Dunk Low", "Forum 84", "574 Legacy", "RS-X", "Ultraboost 1.0", "Vaporfly Next%", "Gel-Kayano 30",
    "Fresh Foam X", "Pegasus 41", "Chuck 70 High", "Old Skool", "Slip-On", "Campus 00s", "550", "Yeezy 350 V2",
    "Disruptor 2", "Club C 85", "Jordan 1 Mid", "Cloudmonster", "Triumph 22", "Speedgoat 5", "XT-6"
  ];
  
  let allProducts = [];
  let idCounter = 1;
  
  // Generate 125 shoes
  for (let i = 0; i < 130; i++) {
    const brand = brandList[i % brandList.length];
    const nameIdx = i % shoeNames.length;
    let name = shoeNames[nameIdx];
    if (i > 80) name += " SE";
    if (i > 100) name += " LX";
    const isBasketball = i < 70 || (i % 3 === 0);
    allProducts.push({
      id: idCounter++,
      name: name,
      brand: brand,
      price: 69 + (i * 2) % 180,
      badge: i < 25 ? "🔥 NEW" : (i < 60 ? "SIGNATURE" : "ELITE"),
      icon: isBasketball ? "fa-basketball-ball" : "fa-shoe-prints",
      official: "https://www.nike.com/"
    });
  }
  allProducts = allProducts.sort(() => Math.random() - 0.5);
  
  // Cart State
  let cart = [];
  let currentSearch = "";
  let currentBrand = "all";
  
  const productGrid = document.getElementById("productGrid");
  const searchInput = document.getElementById("searchInput");
  const filterGroup = document.getElementById("filterGroup");
  const cartCountBadge = document.getElementById("cartCountBadge");
  const cartIconBtn = document.getElementById("cartIconBtn");
  const checkoutModal = document.getElementById("checkoutModal");
  const closeCheckoutBtn = document.getElementById("closeCheckoutBtn");
  const cartItemsList = document.getElementById("cartItemsList");
  const cartTotalSpan = document.getElementById("cartTotal");
  const placeOrderBtn = document.getElementById("placeOrderBtn");
  
  function saveCart() { localStorage.setItem("cinematic_cart", JSON.stringify(cart)); updateCartUI(); }
  function updateCartUI() { const totalQty = cart.reduce((s,i)=>s+i.quantity,0); cartCountBadge.innerText = totalQty; renderCartModal(); }
  function renderCartModal() {
    if(!cartItemsList) return;
    if(cart.length===0) { cartItemsList.innerHTML = "<div style='text-align:center;padding:2rem;'>📦 Your cart is empty</div>"; cartTotalSpan.innerText="$0"; return; }
    let html = "", total = 0;
    cart.forEach(item => { total += item.price * item.quantity;
      html += `<div class="cart-item"><div style="font-size:2rem;"><i class="fas ${item.icon}"></i></div><div style="flex:1"><b>${escapeHtml(item.name)}</b><div>$${item.price}</div><div class="cart-qty"><button class="qty-dec" data-id="${item.id}">-</button><span>${item.quantity}</span><button class="qty-inc" data-id="${item.id}">+</button><button class="cart-remove" data-id="${item.id}" style="background:none;margin-left:6px;">🗑️</button></div></div></div>`;
    });
    cartItemsList.innerHTML = html; cartTotalSpan.innerText = "$"+total;
    document.querySelectorAll(".qty-dec").forEach(b=>b.addEventListener("click",()=>updateQty(parseInt(b.dataset.id),-1)));
    document.querySelectorAll(".qty-inc").forEach(b=>b.addEventListener("click",()=>updateQty(parseInt(b.dataset.id),1)));
    document.querySelectorAll(".cart-remove").forEach(b=>b.addEventListener("click",()=>removeFromCart(parseInt(b.dataset.id))));
  }
  function updateQty(id, delta) { let idx = cart.findIndex(i=>i.id===id); if(idx!==-1) { let newQ = cart[idx].quantity+delta; if(newQ<=0) cart.splice(idx,1); else cart[idx].quantity=newQ; saveCart(); renderProducts(); } }
  function removeFromCart(id) { cart = cart.filter(i=>i.id!==id); saveCart(); renderProducts(); }
  function addToCart(product) { let exist = cart.find(i=>i.id===product.id); if(exist) exist.quantity++; else cart.push({id:product.id,name:product.name,price:product.price,quantity:1,icon:product.icon}); saveCart(); showToast(`✓ ${product.name} added to cart`); }
  function showToast(msg) { let t=document.createElement("div"); t.innerText=msg; t.style.cssText="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#e63946;padding:10px 24px;border-radius:60px;z-index:9999;font-size:0.8rem;"; document.body.appendChild(t); setTimeout(()=>t.remove(),1500); }
  
  function getFiltered() {
    let res = [...allProducts];
    if(currentBrand !== "all") res = res.filter(p => p.brand.toLowerCase() === currentBrand.toLowerCase());
    if(currentSearch.trim()) { let term = currentSearch.trim().toLowerCase(); res = res.filter(p => p.name.toLowerCase().includes(term) || p.brand.toLowerCase().includes(term)); }
    return res;
  }
  function renderProducts() {
    const filtered = getFiltered();
    if(filtered.length===0) { productGrid.innerHTML = `<div class="no-results">No sneakers found 🔥</div>`; return; }
    let html = "";
    filtered.forEach(prod => {
      html += `<div class="product-card"><div class="product-img"><i class="fas ${prod.icon}"></i>${prod.badge?`<div class="badge">${prod.badge}</div>`:''}</div><div class="product-info"><div class="brand">${prod.brand}</div><div class="product-name">${escapeHtml(prod.name)}</div><div class="price-row"><div class="price">$${prod.price}</div><button class="add-btn add-to-cart" data-id="${prod.id}">ADD</button></div><a href="${prod.official}" target="_blank" class="official-link"><i class="fas fa-external-link-alt"></i> Official Store</a></div></div>`;
    });
    productGrid.innerHTML = html;
    document.querySelectorAll(".add-to-cart").forEach(btn => { btn.addEventListener("click", (e) => { const id = parseInt(btn.dataset.id); const prod = allProducts.find(p=>p.id===id); if(prod) addToCart(prod); }); });
    gsap.fromTo(".product-card", { opacity:0, y:30 }, { opacity:1, y:0, duration:0.5, stagger:0.04, ease:"power2.out" });
  }
  function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
  
  function initFilters() {
    const uniqueBrands = ["all", ...new Set(allProducts.map(p=>p.brand))];
    filterGroup.innerHTML = uniqueBrands.map(b => `<button class="filter-chip ${b==='all'?'active':''}" data-brand="${b}">${b.toUpperCase().slice(0,12)}</button>`).join('');
    document.querySelectorAll(".filter-chip").forEach(chip => { chip.addEventListener("click", () => { currentBrand = chip.dataset.brand; document.querySelectorAll(".filter-chip").forEach(c=>c.classList.remove("active")); chip.classList.add("active"); renderProducts(); }); });
    searchInput.addEventListener("input", (e) => { currentSearch = e.target.value; renderProducts(); });
  }
  
  function initCheckout() {
    cartIconBtn.addEventListener("click", () => { renderCartModal(); checkoutModal.classList.add("active"); });
    closeCheckoutBtn.addEventListener("click", () => checkoutModal.classList.remove("active"));
    checkoutModal.addEventListener("click", (e) => { if(e.target === checkoutModal) checkoutModal.classList.remove("active"); });
    document.getElementById("paymentMethods")?.addEventListener("click", (e) => { let div = e.target.closest(".pay-option"); if(div) { document.querySelectorAll(".pay-option").forEach(p=>p.classList.remove("selected")); div.classList.add("selected"); } });
    placeOrderBtn.addEventListener("click", () => {
      if(cart.length===0) { showToast("Your cart is empty — add some shoes first!"); return; }
      const fullName = document.getElementById("fullName").value.trim();
      const email = document.getElementById("email").value.trim();
      const address = document.getElementById("address").value.trim();
      const city = document.getElementById("city").value.trim();
      const zip = document.getElementById("zip").value.trim();
      if(!fullName || !email || !address || !city || !zip) {
        showToast("❌ Please fill in all shipping details (Name, Email, Address, City, ZIP)");
        return;
      }
      if(!email.includes("@")) { showToast("Invalid email address"); return; }
      const selectedPay = document.querySelector(".pay-option.selected")?.dataset.method || "card";
      const total = cart.reduce((s,i)=>s+i.price*i.quantity,0);
      const methodName = selectedPay === "card" ? "Credit Card" : "PayPal";
      showToast(`✅ Order placed! ${methodName} payment of $${total} processed. Shipping to ${fullName}. Thank you!`);
      cart = [];
      saveCart();
      renderProducts();
      checkoutModal.classList.remove("active");
      document.getElementById("fullName").value = "";
      document.getElementById("email").value = "";
      document.getElementById("address").value = "";
      document.getElementById("city").value = "";
      document.getElementById("zip").value = "";
    });
    document.getElementById("officialStoreLink")?.addEventListener("click", (e) => { e.preventDefault(); window.open("https://www.nike.com/", "_blank"); });
  }
  
  const savedCart = localStorage.getItem("cinematic_cart");
  if(savedCart) cart = JSON.parse(savedCart);
  initFilters(); renderProducts(); initCheckout(); updateCartUI();
  
  // Navigation
  document.getElementById("homeBtn")?.addEventListener("click",()=>{ window.scrollTo({top:0,behavior:"smooth"}); });
  document.getElementById("shopBtn")?.addEventListener("click",()=>{ document.getElementById("shopSection").scrollIntoView({behavior:"smooth"}); });
  document.getElementById("contactBtn")?.addEventListener("click",()=>{ alert("📧 studio@cinematic4d.com\n📍 Global Sneaker Hub\nCinematic 4D + Redshift Studio"); });
  document.getElementById("scrollIndicator")?.addEventListener("click",()=>{ document.getElementById("shopSection").scrollIntoView({behavior:"smooth"}); });
  window.addEventListener("scroll",()=>{ const nav=document.getElementById("nav"); if(window.scrollY>50) nav.classList.add("scrolled"); else nav.classList.remove("scrolled"); });
  
  // Music
  let musicPlaying=false; const music=document.getElementById("bgMusic"); const musicBtn=document.getElementById("musicControl"); music.volume=0.25;
  musicBtn.addEventListener("click",()=>{ if(musicPlaying){ music.pause(); musicPlaying=false; musicBtn.style.background="rgba(0,0,0,0.8)"; musicBtn.style.color="#e63946"; } else { music.play().catch(()=>{}); musicPlaying=true; musicBtn.style.background="#e63946"; musicBtn.style.color="white"; } });
  document.body.addEventListener("click",()=>{ if(!musicPlaying && music.paused){ music.play().then(()=>{ musicPlaying=true; musicBtn.style.background="#e63946"; musicBtn.style.color="white"; }).catch(()=>{}); } }, { once: true });
  
  // Cursor
  const dot = document.querySelector(".cursor-dot"), outline = document.querySelector(".cursor-outline");
  document.addEventListener("mousemove",(e)=>{ if(dot) dot.style.transform=`translate(${e.clientX-2}px,${e.clientY-2}px)`; if(outline) outline.style.transform=`translate(${e.clientX}px,${e.clientY}px) translate(-50%,-50%)`; });
</script>
</body>
</html>
