  // Save/load cart
  function saveCart() { localStorage.setItem("basketball_cart", JSON.stringify(cart)); updateCartUI(); }
  function updateCartUI() { const totalQty = cart.reduce((s,i)=>s+i.quantity,0); cartCountBadge.innerText = totalQty; renderCartModal(); }
  function renderCartModal() {
    if(!cartItemsList) return;
    if(cart.length===0) { cartItemsList.innerHTML = "<div style='text-align:center;padding:2rem;'>Empty</div>"; cartTotalSpan.innerText="$0"; return; }
    let html = "", total = 0;
    cart.forEach(item => { total += item.price * item.quantity;
      html += `<div class="cart-item"><div><i class="fas ${item.icon}"></i></div><div class="cart-item-details"><b>${escapeHtml(item.name)}</b><div>$${item.price}</div><div class="cart-qty"><button class="qty-dec" data-id="${item.id}">-</button><span>${item.quantity}</span><button class="qty-inc" data-id="${item.id}">+</button><button class="cart-remove" data-id="${item.id}" style="background:none;margin-left:8px;">🗑️</button></div></div></div>`;
    });
    cartItemsList.innerHTML = html; cartTotalSpan.innerText = "$"+total;
    document.querySelectorAll(".qty-dec").forEach(b=>b.addEventListener("click",()=>updateQty(parseInt(b.dataset.id),-1)));
    document.querySelectorAll(".qty-inc").forEach(b=>b.addEventListener("click",()=>updateQty(parseInt(b.dataset.id),1)));
    document.querySelectorAll(".cart-remove").forEach(b=>b.addEventListener("click",()=>removeFromCart(parseInt(b.dataset.id))));
  }
  function updateQty(id, delta) { let idx = cart.findIndex(i=>i.id===id); if(idx!==-1) { let newQ = cart[idx].quantity+delta; if(newQ<=0) cart.splice(idx,1); else cart[idx].quantity=newQ; saveCart(); renderProducts(); } }
  function removeFromCart(id) { cart = cart.filter(i=>i.id!==id); saveCart(); renderProducts(); }
  function addToCart(shoe) { let exist = cart.find(i=>i.id===shoe.id); if(exist) exist.quantity++; else cart.push({id:shoe.id,name:shoe.name,price:shoe.price,quantity:1,icon:shoe.icon,official:shoe.official}); saveCart(); showToast(`+ ${shoe.name} added`); }
  function showToast(msg) { let t=document.createElement("div"); t.innerText=msg; t.style.cssText="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#e63946;padding:10px 24px;border-radius:60px;z-index:9999"; document.body.appendChild(t); setTimeout(()=>t.remove(),1500); }
  
  function getFiltered() {
    let res = [...basketballShoes];
    if(currentBrand !== "all") res = res.filter(s => s.brand.toLowerCase() === currentBrand.toLowerCase());
    if(currentSearch.trim()) { let term = currentSearch.trim().toLowerCase(); res = res.filter(s => s.name.toLowerCase().includes(term) || s.brand.toLowerCase().includes(term)); }
    return res;
  }
  function renderProducts() {
    const filtered = getFiltered();
    if(filtered.length===0) { productGrid.innerHTML = `<div class="no-results">No sneakers found 🔥</div>`; return; }
    let html = "";
    filtered.forEach(shoe => {
      html += `<div class="product-card"><div class="product-img"><i class="fas ${shoe.icon}"></i>${shoe.badge?`<div class="badge">${shoe.badge}</div>`:''}</div><div class="product-info"><div class="brand">${shoe.brand}</div><div class="product-name">${escapeHtml(shoe.name)}</div><div class="price-row"><div class="price">$${shoe.price}</div><button class="add-btn add-to-cart" data-id="${shoe.id}">ADD</button></div><a href="${shoe.official}" target="_blank" class="official-link"><i class="fas fa-external-link-alt"></i> Official Store</a></div></div>`;
    });
    productGrid.innerHTML = html;
    document.querySelectorAll(".add-to-cart").forEach(btn => { btn.addEventListener("click", (e) => { const id = parseInt(btn.dataset.id); const shoe = basketballShoes.find(s=>s.id===id); if(shoe) addToCart(shoe); }); });
    gsap.fromTo(".product-card", { opacity:0, y:30 }, { opacity:1, y:0, duration:0.5, stagger:0.04, ease:"power2.out" });
  }
  function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
  
  function initFilters() {
    const brands = ["all", "Nike", "Jordan", "Adidas", "Under Armour", "Puma", "New Balance"];
    filterGroup.innerHTML = brands.map(b => `<button class="filter-chip ${b==='all'?'active':''}" data-brand="${b}">${b.toUpperCase()}</button>`).join('');
    document.querySelectorAll(".filter-chip").forEach(chip => { chip.addEventListener("click", () => { currentBrand = chip.dataset.brand; document.querySelectorAll(".filter-chip").forEach(c=>c.classList.remove("active")); chip.classList.add("active"); renderProducts(); }); });
    searchInput.addEventListener("input", (e) => { currentSearch = e.target.value; renderProducts(); });
  }
  
  function initCheckout() {
    cartIconBtn.addEventListener("click", () => { renderCartModal(); checkoutModal.classList.add("active"); });
    closeCheckoutBtn.addEventListener("click", () => checkoutModal.classList.remove("active"));
    checkoutModal.addEventListener("click", (e) => { if(e.target === checkoutModal) checkoutModal.classList.remove("active"); });
    document.getElementById("paymentMethods")?.addEventListener("click", (e) => { let div = e.target.closest(".pay-option"); if(div) { document.querySelectorAll(".pay-option").forEach(p=>p.classList.remove("selected")); div.classList.add("selected"); } });
    placeOrderBtn.addEventListener("click", () => {
      if(cart.length===0) { showToast("Cart is empty"); return; }
      let name = document.getElementById("fullName").value.trim(), email = document.getElementById("email").value.trim();
      if(!name || !email) { showToast("Fill shipping details"); return; }
      let method = document.querySelector(".pay-option.selected")?.dataset.method || "card";
      let total = cart.reduce((s,i)=>s+i.price*i.quantity,0);
      showToast(`✅ Order placed! (${method}) Total $${total}. Thank you.`);
      cart = []; saveCart(); renderProducts(); checkoutModal.classList.remove("active");
    });
    document.getElementById("officialStoreLink")?.addEventListener("click", (e) => { e.preventDefault(); window.open("https://www.nike.com/", "_blank"); });
  }
  
  // Load cart from storage
  const savedCart = localStorage.getItem("basketball_cart");
  if(savedCart) cart = JSON.parse(savedCart);
  initFilters(); renderProducts(); initCheckout(); updateCartUI();
  
  // Floating particles & animations
  const floatingWords = ["BASKETBALL", "HYPE", "GRAIL", "COURT", "ICON", "SIGNATURE", "ELITE", "DUNK", "CROSSOVER"];
  const container = document.getElementById("floatingTextContainer");
  for(let i=0;i<35;i++) { let w=document.createElement("div"); w.className="floating-word"; w.textContent=floatingWords[Math.floor(Math.random()*floatingWords.length)]; w.style.left=Math.random()*100+"%"; w.style.top=Math.random()*100+"%"; w.style.animation=`floatWord ${8+Math.random()*10}s infinite`; w.style.animationDelay=Math.random()*5+"s"; container.appendChild(w); }
  const particleCont = document.getElementById("particleContainer");
  for(let i=0;i<50;i++) { let p=document.createElement("div"); p.className="particle"; let s=2+Math.random()*6; p.style.width=s+"px"; p.style.height=s+"px"; p.style.left=Math.random()*100+"%"; p.style.top=Math.random()*100+"%"; p.style.animation=`floatParticle ${6+Math.random()*10}s infinite`; particleCont.appendChild(p); }
  const styleSheet = document.createElement("style");
  styleSheet.textContent = `@keyframes floatWord { 0% { transform: translateY(0px) rotate(0deg); opacity: 0; } 20% { opacity: 0.5; } 100% { transform: translateY(-90px) rotate(12deg); opacity: 0; } } @keyframes floatParticle { 0%,100% { transform: translateY(0px); opacity: 0; } 20% { opacity: 0.4; } 100% { transform: translateY(-100px); opacity: 0; } }`;
  document.head.appendChild(styleSheet);
  
  // 3D Logo
  const logoWrapper = document.querySelector(".logo-3d-wrapper");
  let rx=0,ry=0,trx=0,try_=0;
  document.addEventListener("mousemove", (e) => { let rect = document.querySelector(".center-logo")?.getBoundingClientRect(); if(rect){ let dx=(e.clientX-(rect.left+rect.width/2))/(rect.width/2); let dy=(e.clientY-(rect.top+rect.height/2))/(rect.height/2); try_=dx*10; trx=-dy*10; } });
  function animate3D() { rx+=(trx-rx)*0.1; ry+=(try_-ry)*0.1; if(logoWrapper) logoWrapper.style.transform=`rotateX(${rx}deg) rotateY(${ry}deg)`; requestAnimationFrame(animate3D); } animate3D();
  
  // Navigation
  document.getElementById("homeBtn")?.addEventListener("click",()=>{ window.scrollTo({top:0,behavior:"smooth"}); });
  document.getElementById("shopBtn")?.addEventListener("click",()=>{ document.getElementById("shopSection").scrollIntoView({behavior:"smooth"}); });
  document.getElementById("contactBtn")?.addEventListener("click",()=>{ alert("📧 studio@unseensnkrs.com\n📍 47 Mercer Street, NYC"); });
  document.getElementById("scrollIndicator")?.addEventListener("click",()=>{ document.getElementById("shopSection").scrollIntoView({behavior:"smooth"}); });
  window.addEventListener("scroll",()=>{ const nav=document.getElementById("nav"); if(window.scrollY>50) nav.classList.add("scrolled"); else nav.classList.remove("scrolled"); });
  
  // Music
  let musicPlaying=false; const music=document.getElementById("bgMusic"); const musicBtn=document.getElementById("musicControl"); music.volume=0.25;
  musicBtn.addEventListener("click",()=>{ if(musicPlaying){ music.pause(); musicPlaying=false; musicBtn.style.background="rgba(0,0,0,0.8)"; musicBtn.style.color="#e63946"; } else { music.play().catch(()=>{}); musicPlaying=true; musicBtn.style.background="#e63946"; musicBtn.style.color="white"; } });
  document.body.addEventListener("click",()=>{ if(!musicPlaying && music.paused){ music.play().then(()=>{ musicPlaying=true; musicBtn.style.background="#e63946"; musicBtn.style.color="white"; }).catch(()=>{}); } }, { once: true });
  
  // Cursor
  const dot = document.querySelector(".cursor-dot"), outline = document.querySelector(".cursor-outline");
  document.addEventListener("mousemove",(e)=>{ if(dot) dot.style.transform=`translate(${e.clientX-2}px,${e.clientY-2}px)`; if(outline) outline.style.transform=`translate(${e.clientX}px,${e.clientY}px) translate(-50%,-50%)`; });
</script>
</body>
</html>
