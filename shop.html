    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050505; font-family: 'Inter', sans-serif; color: #fff; overflow-x: hidden; }
        
        #webgl-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        
        /* Soft Graffiti Overlay Elements - Reduced Opacity */
        .graffiti-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 12;
            overflow: hidden;
        }
        
        .graffiti-splash {
            position: absolute;
            background: radial-gradient(circle, rgba(230,57,70,0.06) 0%, transparent 80%);
            border-radius: 50%;
            filter: blur(60px);
        }
        
        .graffiti-splash-1 { width: 600px; height: 600px; top: -200px; left: -200px; background: radial-gradient(circle, rgba(230,57,70,0.08) 0%, transparent 80%); }
        .graffiti-splash-2 { width: 500px; height: 500px; bottom: -150px; right: -150px; background: radial-gradient(circle, rgba(255,180,71,0.06) 0%, transparent 80%); }
        .graffiti-splash-3 { width: 400px; height: 400px; top: 40%; left: 20%; background: radial-gradient(circle, rgba(230,57,70,0.04) 0%, transparent 80%); }
        
        /* Gentle spray lines - slower, calmer */
        .spray-line {
            position: absolute;
            background: linear-gradient(90deg, transparent, rgba(230,57,70,0.15), rgba(255,180,71,0.1), transparent);
            height: 1px;
            width: 180px;
            filter: blur(5px);
            opacity: 0.3;
            animation: gentleMove 12s ease-in-out infinite;
        }
        
        @keyframes gentleMove {
            0%, 100% { transform: translateX(-50px) scaleX(0.8); opacity: 0.15; }
            50% { transform: translateX(50px) scaleX(1.1); opacity: 0.3; }
        }
        
        .spray-1 { top: 20%; left: 5%; width: 200px; animation-delay: 0s; }
        .spray-2 { bottom: 25%; right: 5%; width: 250px; animation-delay: 3s; }
        .spray-3 { top: 60%; left: 15%; width: 150px; animation-delay: 6s; }
        
        /* Soft graffiti text art - subtle */
        .graffiti-text {
            position: absolute;
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            letter-spacing: -1px;
            text-transform: uppercase;
            opacity: 0.03;
            white-space: nowrap;
            pointer-events: none;
            background: linear-gradient(135deg, #e63946, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .graffiti-text-1 { bottom: 15%; left: -30px; font-size: 7rem; transform: rotate(-8deg); }
        .graffiti-text-2 { top: 25%; right: -20px; font-size: 5rem; transform: rotate(3deg); }
        .graffiti-text-3 { bottom: 35%; right: 15%; font-size: 4rem; transform: rotate(15deg); }
        
        /* Gentle static - much softer */
        .gentle-static {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 14;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="2" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noise)" opacity="0.03"/></svg>');
            opacity: 0.2;
            animation: gentleStaticShift 8s steps(3) infinite;
        }
        
        @keyframes gentleStaticShift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(1px, -0.5px); }
        }
        
        /* Very subtle scanline overlay */

            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 15;

                rgba(0, 0, 0, 0.08) 0px,
                rgba(0, 0, 0, 0.08) 1px,

                transparent 3px

        .filter-chip.active, .filter-chip:hover { background: rgba(230,57,70,0.2); color: white; }

        .product-grid {

        .product-card {

        .product-card::before {
            content: '';

            border-color: rgba(230,57,70,0.4);

<script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js" } }</script>
<script type="module">
    import * as THREE from 'three';
    
    const canvas = document.getElementById('webgl-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setClearColor(0x000000, 0);
    
    const scene = new THREE.Scene();
    scene.background = null;
    scene.fog = new THREE.FogExp2(0x050505, 0.004);
    
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2, 13);
    camera.lookAt(0, 0, 0);
    
    // Gentle Lighting
    const ambientLight = new THREE.AmbientLight(0x1a1a2a);
    scene.add(ambientLight);
    
    const keyLight = new THREE.PointLight(0xe63946, 0.6);
    keyLight.position.set(2, 3, 4);
    scene.add(keyLight);
    
    const fillLight = new THREE.PointLight(0xffb347, 0.4);
    fillLight.position.set(-2, 1, 5);
    scene.add(fillLight);
    
    const backLight = new THREE.PointLight(0xffffff, 0.3);
    backLight.position.set(0, 1, -5);
    scene.add(backLight);
    
    // Main Torus Knot - Gentle Pulse
    const knotGeo = new THREE.TorusKnotGeometry(1.0, 0.22, 180, 24, 3, 4);
    const knotMat = new THREE.MeshStandardMaterial({ 
        color: 0xe63946, 
        emissive: 0x331111, 
        roughness: 0.35, 
        metalness: 0.65,
        emissiveIntensity: 0.25
    });
    const knot = new THREE.Mesh(knotGeo, knotMat);
    scene.add(knot);
    
    // Floating Particles - Calm
    const particleCount = 800;
    const particleGeo = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);
    for (let i = 0; i < particleCount; i++) {
        positions[i*3] = (Math.random() - 0.5) * 25;
        positions[i*3+1] = (Math.random() - 0.5) * 15;
        positions[i*3+2] = (Math.random() - 0.5) * 20 - 10;
    }
    particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const particleMat = new THREE.PointsMaterial({ color: 0xe63946, size: 0.045, transparent: true, opacity: 0.3, blending: THREE.AdditiveBlending });
    const particles = new THREE.Points(particleGeo, particleMat);
    scene.add(particles);
    
    // Small floating orbs
    const orbGroup = new THREE.Group();
    const orbMat = new THREE.MeshStandardMaterial({ color: 0xffb347, emissive: 0x331100, emissiveIntensity: 0.15 });
    for (let i = 0; i < 30; i++) {
        const orb = new THREE.Mesh(new THREE.SphereGeometry(0.07, 8, 8), orbMat);
        const radius = 2.0;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        orb.position.set(radius * Math.sin(phi) * Math.cos(theta), radius * Math.sin(phi) * Math.sin(theta), radius * Math.cos(phi));
        orbGroup.add(orb);
    }
    scene.add(orbGroup);
    
    // Outer ring
    const ringGeo = new THREE.TorusGeometry(1.8, 0.04, 100, 200);
    const ringMat = new THREE.MeshStandardMaterial({ color: 0xffb347, emissive: 0x331100, metalness: 0.6, roughness: 0.4 });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    scene.add(ring);
    
    let time = 0;
    
    function animateWebGL() {
        requestAnimationFrame(animateWebGL);
        time += 0.006;
        
        knot.rotation.x = time * 0.35;
        knot.rotation.y = time * 0.5;
        knot.rotation.z = time * 0.2;
        knot.material.emissiveIntensity = 0.25 + Math.sin(time) * 0.08;
        
        ring.rotation.x = Math.sin(time * 0.3) * 0.1;
        ring.rotation.y = time * 0.4;
        
        orbGroup.rotation.y = time * 0.15;
        orbGroup.rotation.x = Math.sin(time * 0.2) * 0.05;
        
        particles.rotation.y = time * 0.01;
        particles.rotation.x = Math.sin(time * 0.05) * 0.02;
        
        // Gentle camera sway
        camera.position.x += (Math.sin(time * 0.15) * 0.04 - camera.position.x) * 0.01;
        camera.position.y += (Math.sin(time * 0.25) * 0.03 - camera.position.y) * 0.01;
        camera.lookAt(0, 0.3, 0);
        
        renderer.render(scene, camera);
    }
    
    animateWebGL();
    
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    // Gentle scroll interaction
    ScrollTrigger.create({
        trigger: "body",
        start: "top top",
        end: "bottom bottom",
        onUpdate: (self) => {
            const prog = self.progress;
            knot.material.emissiveIntensity = 0.2 + prog * 0.3;
            particleMat.opacity = 0.2 + prog * 0.2;
        }
    });
</script>

        { id: 12, name: "Dame 9", brand: "Adidas", price: 129, badge: "SIGNATURE", image: "images/dame 9.png", official: "https://www.adidas.com/dame-9", cardColor: "#2a2a3e", cardColorHover: "#3a3a52" },

        { id: 14, name: "Don Issue 5", brand: "Adidas", price: 119, badge: "DON", image: "images/don.png", official: "https://www.adidas.com/don-issue-5", cardColor: "#8b4513", cardColorHover: "#a85a20" },

        { id: 17, name: "MB.03", brand: "Puma", price: 139, badge: "FUTURE", image: "images/mbo3.png", official: "https://us.puma.com/mb-03", cardColor: "#1a5060", cardColorHover: "#2a6a7a" },
        { id: 18, name: "Clyde All-Pro", brand: "Puma", price: 129, badge: "RETRO", image: "images/k 4.png", official: "https://us.puma.com/clyde-all-pro", cardColor: "#6b4c3a", cardColorHover: "#826050" },
        { id: 19, name: "Kawhi 4", brand: "New Balance", price: 179, badge: "CLAW", image: "images/download (5).png", official: "https://www.newbalance.com/kawhi-4", cardColor: "#2a3a4a", cardColorHover: "#3a5068" },
        { id: 20, name: "Two WXY v4", brand: "New Balance", price: 149, badge: "TWO-WAY", image: "images/download (6).png", official: "https://www.newbalance.com/two-wxy", cardColor: "#3a5570", cardColorHover: "#4a7088" }
    ];
    
    const FALLBACK_IMAGE = "https://placehold.co/400x300/1a1a2a/e63946?text=Image+Not+Found";
    
    function wrapTextForWave(text) {
        return text.split('').map((char, index) => char === ' ' ? ' ' : `<span style="--i: ${index}">${char}</span>`).join('');
    }
    
    function redirectToPreview(shoeId, shoeName) {
        window.location.href = `shoePreviwe.html?id=${shoeId}&name=${encodeURIComponent(shoeName)}`;
    }
    
    let cart = [];
    let currentSearch = "";
    let currentBrand = "all";
    
    const productGrid = document.getElementById("productGrid");
    const searchInput = document.getElementById("searchInput");
    const filterGroup = document.getElementById("filterGroup");
    const cartCountBadge = document.getElementById("cartCountBadge");
    const cartIconBtn = document.getElementById("cartIconBtn");
    const cartModal = document.getElementById("cartModal");
    const cartItemsSummary = document.getElementById("cartItemsSummary");
    const cartTotalSummaryDiv = document.getElementById("cartTotalSummary");
    const proceedToPaymentBtn = document.getElementById("proceedToPaymentBtn");
    const cancelCartBtn = document.getElementById("cancelCartBtn");
    
    function saveCart() { localStorage.setItem("sneaker_cart", JSON.stringify(cart)); updateCartBadge(); }
    function updateCartBadge() { const totalQty = cart.reduce((s,i)=>s+i.quantity,0); cartCountBadge.innerText = totalQty; }
    
    function removeFromCart(shoeId) {
        const index = cart.findIndex(item => item.id === shoeId);
        if (index !== -1) { cart.splice(index, 1); saveCart(); renderCartModal(); updateCartBadge(); }
    }
    
    function renderCartModal() {
        if(cart.length === 0) {
            cartItemsSummary.innerHTML = '<div class="empty-cart-msg"><i class="fas fa-box-open"></i> Your cart is empty.</div>';
            cartTotalSummaryDiv.innerHTML = '';
            return;
        }
        let itemsHtml = '', total = 0;
        cart.forEach(item => {
            const itemTotal = item.price * item.quantity;
            total += itemTotal;
            itemsHtml += `<div class="cart-summary-item"><div><b>${escapeHtml(item.name)}</b><br><small>x${item.quantity}</small></div><div>$${itemTotal}</div><button class="cart-remove-btn" data-id="${item.id}"><i class="fas fa-trash-alt"></i></button></div>`;
        });
        cartItemsSummary.innerHTML = itemsHtml;
        cartTotalSummaryDiv.innerHTML = `<span>Total</span><span>$${total}</span>`;
        document.querySelectorAll('.cart-remove-btn').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); removeFromCart(parseInt(btn.dataset.id)); }));
    }
    
    function showCartModal() { renderCartModal(); cartModal.classList.add('active'); }
    function closeCartModal() { cartModal.classList.remove('active'); }
    function proceedToPayment() {
        if(cart.length === 0) { alert("Your cart is empty. Please add items before proceeding."); closeCartModal(); return; }
        localStorage.setItem("sneaker_cart", JSON.stringify(cart));
        window.location.href = "Payment.html";
    }
    
    window.addToCartFromPreview = function(shoe) {
        const existing = cart.find(item => item.id === shoe.id);
        if(existing) existing.quantity++;
        else cart.push({ id: shoe.id, name: shoe.name, price: shoe.price, quantity: 1, image: shoe.image });
        saveCart(); updateCartBadge();
        return true;
    };
    
    function getFiltered() {
        let results = [...shoesDatabase];
        if (currentBrand !== "all") results = results.filter(shoe => shoe.brand.toLowerCase() === currentBrand.toLowerCase());
        if (currentSearch.trim()) { const term = currentSearch.trim().toLowerCase(); results = results.filter(shoe => shoe.name.toLowerCase().includes(term) || shoe.brand.toLowerCase().includes(term)); }
        return results;
    }
    
    async function renderProducts() {
        const filtered = getFiltered();
        if(filtered.length === 0) { productGrid.innerHTML = `<div class="no-results">No sneakers found — try a different search or brand</div>`; return; }
        
        let html = "";
        filtered.forEach(shoe => {
            html += `<div class="product-card" data-shoe-id="${shoe.id}" data-shoe-name="${escapeHtml(shoe.name)}" style="--card-bg: radial-gradient(circle at 20% 30%, ${shoe.cardColor}0c, rgba(5,5,10,0.85)); --card-bg-hover: radial-gradient(circle at 30% 40%, ${shoe.cardColorHover}12, rgba(5,5,10,0.9));">
                <div class="product-img">
                    <img src="${shoe.image}" alt="${escapeHtml(shoe.name)}" onerror="this.onerror=null; this.src='${FALLBACK_IMAGE}';">
                    ${shoe.badge ? `<div class="badge">${shoe.badge}</div>` : ''}
                </div>
                <div class="product-info">
                    <div class="brand">${shoe.brand}</div>
                    <div class="product-name">${escapeHtml(shoe.name)}</div>
                    <div class="price-row"><div class="price">$${shoe.price}</div></div>
                    <a href="${shoe.official}" target="_blank" class="official-link" onclick="event.stopPropagation()">Official Store →</a>
                </div>
            </div>`;
        });
        
        productGrid.innerHTML = html;
        
        document.querySelectorAll('.product-card').forEach(card => {
            card.addEventListener('click', (e) => {
                if(e.target.classList.contains('official-link') || e.target.closest('.official-link')) return;
                const shoeId = card.dataset.shoeId;
                const shoeName = card.dataset.shoeName;
                if(shoeId) redirectToPreview(shoeId, shoeName);
            });
        });
        
        gsap.utils.toArray(".product-card").forEach((card) => {
            gsap.fromTo(card,
                { opacity: 0, y: 40, filter: "blur(6px)" },
                { opacity: 1, y: 0, filter: "blur(0px)", duration: 0.6, scrollTrigger: { trigger: card, start: "top 90%", end: "top 75%", scrub: 0.4, toggleActions: "play none none reverse" } }
            );
        });
    }
    
    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    
    function initFilters() {
        const uniqueBrands = ["all", ...new Set(shoesDatabase.map(s => s.brand))];
        filterGroup.innerHTML = uniqueBrands.map(b => `<button class="filter-chip ${b==='all'?'active':''}" data-brand="${b}">${wrapTextForWave(b === "all" ? "ALL" : b.toUpperCase())}</button>`).join('');
        document.querySelectorAll(".filter-chip").forEach(chip => chip.addEventListener("click", () => { currentBrand = chip.dataset.brand; document.querySelectorAll(".filter-chip").forEach(c => c.classList.remove("active")); chip.classList.add("active"); renderProducts(); }));
        searchInput.addEventListener("input", (e) => { currentSearch = e.target.value; renderProducts(); });
    }
    
    const homeBtn = document.getElementById("homeBtn");
    const contactBtn = document.getElementById("contactBtn");
    const shopBtn = document.getElementById("shopBtn");
    const contactSection = document.getElementById("contactSection");
    
    homeBtn.addEventListener("click", () => { window.location.href = "index.html"; });
    contactBtn.addEventListener("click", () => { contactSection.classList.add("visible"); contactSection.scrollIntoView({ behavior: "smooth", block: "start" }); });
    shopBtn.addEventListener("click", () => { document.getElementById("shopSection").scrollIntoView({ behavior: "smooth" }); });
    document.getElementById("scrollIndicator").addEventListener("click", () => { document.getElementById("shopSection").scrollIntoView({ behavior: "smooth" }); });
    cartIconBtn.addEventListener("click", showCartModal);
    proceedToPaymentBtn.addEventListener("click", proceedToPayment);
    cancelCartBtn.addEventListener("click", closeCartModal);
    cartModal.addEventListener("click", (e) => { if(e.target === cartModal) closeCartModal(); });
    
    const savedCart = localStorage.getItem("sneaker_cart");
    if(savedCart) cart = JSON.parse(savedCart);
    updateCartBadge();
    initFilters();
    renderProducts();
    
    window.addEventListener("scroll", () => { const nav = document.getElementById("nav"); if(window.scrollY > 50) nav.classList.add("scrolled"); else nav.classList.remove("scrolled"); });
    
    let musicPlaying=false; const music=document.getElementById("bgMusic"); const musicBtn=document.getElementById("musicControl"); music.volume=0.2;
    musicBtn.addEventListener("click",()=>{ if(musicPlaying){ music.pause(); musicPlaying=false; musicBtn.style.background="rgba(0,0,0,0.6)"; musicBtn.style.color="#e63946"; } else { music.play().catch(()=>{}); musicPlaying=true; musicBtn.style.background="#e63946"; musicBtn.style.color="white"; } });
    document.body.addEventListener("click",()=>{ if(!musicPlaying && music.paused){ music.play().then(()=>{ musicPlaying=true; musicBtn.style.background="#e63946"; musicBtn.style.color="white"; }).catch(()=>{}); } }, { once: true });
    
    const dot = document.querySelector(".cursor-dot"), outline = document.querySelector(".cursor-outline");
    document.addEventListener("mousemove",(e)=>{ if(dot) dot.style.transform=`translate(${e.clientX-2}px,${e.clientY-2}px)`; if(outline) outline.style.transform=`translate(${e.clientX}px,${e.clientY}px) translate(-50%,-50%)`; });
</script>
