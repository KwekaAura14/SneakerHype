<script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js" } }</script>
<script type="module">
    import * as THREE from 'three';
    
    const canvas = document.getElementById('webgl-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setClearColor(0x000000, 0);
    
    const scene = new THREE.Scene();
    scene.background = null;
    scene.fog = new THREE.FogExp2(0x050505, 0.003);
    
    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 3, 12);
    camera.lookAt(0, 0, 0);
    
    // Cinematic Basketball Court Lighting
    const ambientLight = new THREE.AmbientLight(0x222222);
    scene.add(ambientLight);
    
    // Key Light - Warm
    const keyLight = new THREE.PointLight(0xe63946, 1.2);
    keyLight.position.set(3, 5, 4);
    scene.add(keyLight);
    
    // Fill Light - Cool
    const fillLight = new THREE.PointLight(0xffb347, 0.6);
    fillLight.position.set(-2, 3, 5);
    scene.add(fillLight);
    
    // Rim Light
    const rimLight = new THREE.PointLight(0xffffff, 0.4);
    rimLight.position.set(0, 2, -6);
    scene.add(rimLight);
    
    // Backlight for dramatic effect
    const backLight = new THREE.DirectionalLight(0x4466cc, 0.3);
    backLight.position.set(0, 2, -4);
    scene.add(backLight);
    
    // Main Basketball Model (Torus Knot with basketball texture colors)
    const knotGeo = new THREE.TorusKnotGeometry(1.1, 0.28, 200, 32, 3, 4);
    const knotMat = new THREE.MeshStandardMaterial({ 
        color: 0xe63946, 
        emissive: 0x441111, 
        roughness: 0.3, 
        metalness: 0.7,
        emissiveIntensity: 0.5
    });
    const knot = new THREE.Mesh(knotGeo, knotMat);
    scene.add(knot);
    
    // Floating basketball-like orbs around the knot
    const orbGroup = new THREE.Group();
    const orbMat = new THREE.MeshStandardMaterial({ color: 0xff6b35, emissive: 0x331100, emissiveIntensity: 0.4 });
    const orbPositions = [
        [1.8, 0.5, 0.8], [-1.5, 0.6, 1.2], [0.5, 1.9, 0.3], [-0.8, -1.6, 1.0],
        [1.2, -1.2, -0.5], [-1.3, 0.2, -1.5], [0.3, 1.2, -1.8], [1.5, -0.8, -1.0],
        [-1.8, -0.3, -0.7], [0.8, -1.9, 0.2]
    ];
    orbPositions.forEach(pos => {
        const orb = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), orbMat);
        orb.position.set(pos[0], pos[1], pos[2]);
        orbGroup.add(orb);
    });
    scene.add(orbGroup);
    
    // Arena floor glow (subtle)
    const floorGlowGeo = new THREE.CircleGeometry(8, 32);
    const floorGlowMat = new THREE.MeshStandardMaterial({ color: 0x1a0a0a, emissive: 0x330000, emissiveIntensity: 0.2, transparent: true, opacity: 0.4, side: THREE.DoubleSide });
    const floorGlow = new THREE.Mesh(floorGlowGeo, floorGlowMat);
    floorGlow.rotation.x = -Math.PI / 2;
    floorGlow.position.y = -1.5;
    scene.add(floorGlow);
    
    // Floating Particles (dust / energy)
    const particleCount = 1200;
    const particleGeo = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);
    for (let i = 0; i < particleCount; i++) {
        positions[i*3] = (Math.random() - 0.5) * 30;
        positions[i*3+1] = (Math.random() - 0.5) * 12;
        positions[i*3+2] = (Math.random() - 0.5) * 25 - 8;
    }
    particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const particleMat = new THREE.PointsMaterial({ color: 0xe63946, size: 0.05, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending });
    const particles = new THREE.Points(particleGeo, particleMat);
    scene.add(particles);
    
    // Outer energy ring
    const ringGeo = new THREE.TorusGeometry(1.9, 0.05, 128, 300);
    const ringMat = new THREE.MeshStandardMaterial({ color: 0xffb347, emissive: 0x552200, metalness: 0.8, roughness: 0.2 });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    scene.add(ring);
    
    let time = 0;
    
    function animateWebGL() {
        requestAnimationFrame(animateWebGL);
        time += 0.008;
        
        // Rotate main knot - basketball spin effect
        knot.rotation.x = time * 0.4;
        knot.rotation.y = time * 0.7;
        knot.rotation.z = time * 0.3;
        knot.material.emissiveIntensity = 0.5 + Math.sin(time * 2) * 0.15;
        
        // Ring rotation
        ring.rotation.x = Math.sin(time * 0.4) * 0.2;
        ring.rotation.y = time * 0.6;
        
        // Orb group rotation
        orbGroup.rotation.y = time * 0.2;
        orbGroup.rotation.x = Math.sin(time * 0.3) * 0.1;
        
        // Particle system gentle drift
        particles.rotation.y = time * 0.02;
        particles.rotation.x = Math.sin(time * 0.1) * 0.03;
        
        // Cinematic camera sway (subtle)
        camera.position.x += (Math.sin(time * 0.15) * 0.08 - camera.position.x) * 0.02;
        camera.position.y += (Math.sin(time * 0.4) * 0.05 - camera.position.y) * 0.02;
        camera.lookAt(0, 0.5, 0);
        
        renderer.render(scene, camera);
    }
    
    animateWebGL();
    
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    // Scroll interaction - light intensity changes with scroll
    ScrollTrigger.create({
        trigger: "body",
        start: "top top",
        end: "bottom bottom",
        onUpdate: (self) => {
            const prog = self.progress;
            knot.material.emissiveIntensity = 0.4 + prog * 0.7;
            particleMat.opacity = 0.3 + prog * 0.4;
            keyLight.intensity = 1.0 + prog * 0.8;
        }
    });
</script>

        { id: 20, name: "Two WXY v4", brand: "New Balance", price: 149, badge: "TWO-WAY", image: "images/download (6).png", official: "https://www.newbalance.com/two-wxy", cardColor: "#385b7a", cardColorHover: "#4a7a9e" }
    ];
    
    const FALLBACK_IMAGE = "https://placehold.co/400x300/1a1a2a/e63946?text=Image+Not+Found";
    
    function wrapTextForWave(text) {
        return text.split('').map((char, index) => char === ' ' ? ' ' : `<span style="--i: ${index}">${char}</span>`).join('');
    }
    
    function redirectToPreview(shoeId, shoeName) {
        window.location.href = `shoePreviwe.html?id=${shoeId}&name=${encodeURIComponent(shoeName)}`;
    }
    
    let cart = [];
    let currentSearch = "";
    let currentBrand = "all";
    
    const productGrid = document.getElementById("productGrid");
    const searchInput = document.getElementById("searchInput");
    const filterGroup = document.getElementById("filterGroup");
    const cartCountBadge = document.getElementById("cartCountBadge");
    const cartIconBtn = document.getElementById("cartIconBtn");
    const cartModal = document.getElementById("cartModal");
    const cartItemsSummary = document.getElementById("cartItemsSummary");
    const cartTotalSummaryDiv = document.getElementById("cartTotalSummary");
    const proceedToPaymentBtn = document.getElementById("proceedToPaymentBtn");
    const cancelCartBtn = document.getElementById("cancelCartBtn");
    
    function saveCart() { localStorage.setItem("sneaker_cart", JSON.stringify(cart)); updateCartBadge(); }
    function updateCartBadge() { const totalQty = cart.reduce((s,i)=>s+i.quantity,0); cartCountBadge.innerText = totalQty; }
    
    function removeFromCart(shoeId) {
        const index = cart.findIndex(item => item.id === shoeId);
        if (index !== -1) { cart.splice(index, 1); saveCart(); renderCartModal(); updateCartBadge(); }
    }
    
    function renderCartModal() {
        if(cart.length === 0) {
            cartItemsSummary.innerHTML = '<div class="empty-cart-msg"><i class="fas fa-box-open"></i> Your cart is empty.</div>';
            cartTotalSummaryDiv.innerHTML = '';
            return;
        }
        let itemsHtml = '', total = 0;
        cart.forEach(item => {
            const itemTotal = item.price * item.quantity;
            total += itemTotal;
            itemsHtml += `<div class="cart-summary-item"><div><b>${escapeHtml(item.name)}</b><br><small>x${item.quantity}</small></div><div>$${itemTotal}</div><button class="cart-remove-btn" data-id="${item.id}"><i class="fas fa-trash-alt"></i></button></div>`;
        });
        cartItemsSummary.innerHTML = itemsHtml;
        cartTotalSummaryDiv.innerHTML = `<span>Total</span><span>$${total}</span>`;
        document.querySelectorAll('.cart-remove-btn').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); removeFromCart(parseInt(btn.dataset.id)); }));
    }
    
    function showCartModal() { renderCartModal(); cartModal.classList.add('active'); }
    function closeCartModal() { cartModal.classList.remove('active'); }
    function proceedToPayment() {
        if(cart.length === 0) { alert("Your cart is empty. Please add items before proceeding."); closeCartModal(); return; }
        localStorage.setItem("sneaker_cart", JSON.stringify(cart));
        window.location.href = "Payment.html";
    }
    
    window.addToCartFromPreview = function(shoe) {
        const existing = cart.find(item => item.id === shoe.id);
        if(existing) existing.quantity++;
        else cart.push({ id: shoe.id, name: shoe.name, price: shoe.price, quantity: 1, image: shoe.image });
        saveCart(); updateCartBadge();
        return true;
    };
    
    window.getCart = function() { return cart; };
    
    function getFiltered() {
        let results = [...shoesDatabase];
        if (currentBrand !== "all") results = results.filter(shoe => shoe.brand.toLowerCase() === currentBrand.toLowerCase());
        if (currentSearch.trim()) { const term = currentSearch.trim().toLowerCase(); results = results.filter(shoe => shoe.name.toLowerCase().includes(term) || shoe.brand.toLowerCase().includes(term)); }
        return results;
    }
    
    async function renderProducts() {
        const filtered = getFiltered();
        if(filtered.length === 0) { productGrid.innerHTML = `<div class="no-results">No sneakers found — try a different search or brand</div>`; return; }
        
        let html = "";
        filtered.forEach(shoe => {
            html += `<div class="product-card" data-shoe-id="${shoe.id}" data-shoe-name="${escapeHtml(shoe.name)}" style="--card-bg: radial-gradient(circle at 20% 30%, ${shoe.cardColor}15, rgba(5,5,10,0.9)); --card-bg-hover: radial-gradient(circle at 30% 40%, ${shoe.cardColorHover}25, rgba(5,5,10,0.95));">
                <div class="product-img">
                    <img src="${shoe.image}" alt="${escapeHtml(shoe.name)}" onerror="this.onerror=null; this.src='${FALLBACK_IMAGE}';">
                    ${shoe.badge ? `<div class="badge">${shoe.badge}</div>` : ''}
                </div>
                <div class="product-info">
                    <div class="brand">${shoe.brand}</div>
                    <div class="product-name">${escapeHtml(shoe.name)}</div>
                    <div class="price-row"><div class="price">$${shoe.price}</div></div>
                    <a href="${shoe.official}" target="_blank" class="official-link" onclick="event.stopPropagation()">Official Store →</a>
                </div>
            </div>`;
        });
        
        productGrid.innerHTML = html;
        
        document.querySelectorAll('.product-card').forEach(card => {
            card.addEventListener('click', (e) => {
                if(e.target.classList.contains('official-link') || e.target.closest('.official-link')) return;
                const shoeId = card.dataset.shoeId;
                const shoeName = card.dataset.shoeName;
                if(shoeId) redirectToPreview(shoeId, shoeName);
            });
        });
        
        gsap.utils.toArray(".product-card").forEach((card) => {
            gsap.fromTo(card,
                { opacity: 0, y: 60, filter: "blur(8px)" },
                { opacity: 1, y: 0, filter: "blur(0px)", duration: 0.8, scrollTrigger: { trigger: card, start: "top 90%", end: "top 70%", scrub: 0.5, toggleActions: "play none none reverse" } }
            );
        });
    }
    
    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    
    function initFilters() {
        const uniqueBrands = ["all", ...new Set(shoesDatabase.map(s => s.brand))];
        filterGroup.innerHTML = uniqueBrands.map(b => `<button class="filter-chip ${b==='all'?'active':''}" data-brand="${b}">${wrapTextForWave(b === "all" ? "ALL" : b.toUpperCase())}</button>`).join('');
        document.querySelectorAll(".filter-chip").forEach(chip => chip.addEventListener("click", () => { currentBrand = chip.dataset.brand; document.querySelectorAll(".filter-chip").forEach(c => c.classList.remove("active")); chip.classList.add("active"); renderProducts(); }));
        searchInput.addEventListener("input", (e) => { currentSearch = e.target.value; renderProducts(); });
    }
    
    const homeBtn = document.getElementById("homeBtn");
    const contactBtn = document.getElementById("contactBtn");
    const shopBtn = document.getElementById("shopBtn");
    const contactSection = document.getElementById("contactSection");
    
    homeBtn.addEventListener("click", () => { window.location.href = "index.html"; });
    contactBtn.addEventListener("click", () => { contactSection.classList.add("visible"); contactSection.scrollIntoView({ behavior: "smooth", block: "start" }); });
    shopBtn.addEventListener("click", () => { document.getElementById("shopSection").scrollIntoView({ behavior: "smooth" }); });
    document.getElementById("scrollIndicator").addEventListener("click", () => { document.getElementById("shopSection").scrollIntoView({ behavior: "smooth" }); });
    cartIconBtn.addEventListener("click", showCartModal);
    proceedToPaymentBtn.addEventListener("click", proceedToPayment);
    cancelCartBtn.addEventListener("click", closeCartModal);
    cartModal.addEventListener("click", (e) => { if(e.target === cartModal) closeCartModal(); });
    
    const savedCart = localStorage.getItem("sneaker_cart");
    if(savedCart) cart = JSON.parse(savedCart);
    updateCartBadge();
    initFilters();
    renderProducts();
    
    window.addEventListener("scroll", () => { const nav = document.getElementById("nav"); if(window.scrollY > 50) nav.classList.add("scrolled"); else nav.classList.remove("scrolled"); });
    
    let musicPlaying=false; const music=document.getElementById("bgMusic"); const musicBtn=document.getElementById("musicControl"); music.volume=0.25;
    musicBtn.addEventListener("click",()=>{ if(musicPlaying){ music.pause(); musicPlaying=false; musicBtn.style.background="rgba(0,0,0,0.8)"; musicBtn.style.color="#e63946"; } else { music.play().catch(()=>{}); musicPlaying=true; musicBtn.style.background="#e63946"; musicBtn.style.color="white"; } });
    document.body.addEventListener("click",()=>{ if(!musicPlaying && music.paused){ music.play().then(()=>{ musicPlaying=true; musicBtn.style.background="#e63946"; musicBtn.style.color="white"; }).catch(()=>{}); } }, { once: true });
    
    const dot = document.querySelector(".cursor-dot"), outline = document.querySelector(".cursor-outline");
    document.addEventListener("mousemove",(e)=>{ if(dot) dot.style.transform=`translate(${e.clientX-2}px,${e.clientY-2}px)`; if(outline) outline.style.transform=`translate(${e.clientX}px,${e.clientY}px) translate(-50%,-50%)`; });
</script>
