<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>SNEAKER HYPE | 3D PREVIEW — SIZE & ADD TO CART</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050508;
      font-family: 'Inter', sans-serif;
      color: #ffffff;
      overflow-x: hidden;
    }
    .bg-particle-field {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .bg-particle {
      position: absolute;
      background: radial-gradient(circle, rgba(230,57,70,0.2), rgba(255,180,71,0.05));
      border-radius: 50%;
      animation: floatParticle 22s infinite alternate;
    }
    @keyframes floatParticle {
      0% { transform: translateY(0px) translateX(0px); opacity: 0.15; }
      100% { transform: translateY(-100px) translateX(60px); opacity: 0.4; }
    }
    .preview-main {
      position: relative;
      z-index: 10;
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.5rem 2rem 4rem;
    }
    .preview-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 1rem 0 2rem;
      border-bottom: 1px solid rgba(230,57,70,0.3);
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .logo-shop {
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 6px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ffffff, #e63946);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .back-link {
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 0.7rem;
      letter-spacing: 2px;
      border: 1px solid rgba(230,57,70,0.5);
      padding: 0.45rem 1.2rem;
      border-radius: 60px;
      cursor: pointer;
      transition: 0.2s;
    }
    .back-link:hover { background: #e63946; border-color: #e63946; color: white; }
    .product-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      margin-bottom: 2rem;
    }
    @media (max-width: 900px) {
      .product-container { grid-template-columns: 1fr; gap: 2rem; }
      .preview-main { padding: 1.2rem; }
    }
    .preview-card {
      background: rgba(12,12,18,0.6);
      backdrop-filter: blur(16px);
      border-radius: 48px;
      border: 1px solid rgba(230,57,70,0.3);
      padding: 1.5rem;
    }
    .preview-title {
      font-size: 0.75rem;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #e63946;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .shoe-canvas-wrapper {
      background: #010105;
      border-radius: 32px;
      width: 100%;
      aspect-ratio: 1 / 0.9;
      position: relative;
      overflow: hidden;
      cursor: grab;
    }
    #shoeCanvas { width: 100%; height: 100%; display: block; }
    .hint-rotate {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.6rem;
      color: rgba(255,255,255,0.4);
      letter-spacing: 2px;
    }
    .purchase-card {
      background: rgba(8,8,14,0.75);
      backdrop-filter: blur(20px);
      border-radius: 48px;
      border: 1px solid rgba(230,57,70,0.4);
      padding: 2rem;
    }
    .shoe-name { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #ffffff, #e63946); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 0.5rem; }
    .shoe-price { font-size: 2.2rem; font-weight: 800; background: linear-gradient(135deg, #fff, #ffb347); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 1rem; }
    .shoe-details {
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 0.8rem;
      margin-bottom: 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
    }
    .detail-tag {
      background: rgba(230,57,70,0.2);
      padding: 0.3rem 0.8rem;
      border-radius: 30px;
      font-size: 0.7rem;
      color: #ffb347;
    }
    .section-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 3px; color: #e63946; margin: 1rem 0 0.6rem; font-weight: 600; }
    .size-grid { display: flex; flex-wrap: wrap; gap: 0.7rem; margin: 0.8rem 0 1.2rem; }
    .size-btn {
      background: rgba(25,25,32,0.9);
      border: 1px solid rgba(230,57,70,0.4);
      border-radius: 50px;
      padding: 0.7rem 1.3rem;
      font-weight: 600;
      font-size: 0.9rem;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
    }
    .size-btn.active { background: #e63946; border-color: #ffb347; box-shadow: 0 0 12px rgba(230,57,70,0.6); }
    .size-btn:hover { background: #e63946; transform: scale(1.02); }
    .add-to-cart-btn {
      width: 100%;
      background: linear-gradient(95deg, #e63946, #ffb347);
      border: none;
      padding: 1.1rem;
      border-radius: 80px;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 2px;
      color: #0a0a0a;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-top: 1.5rem;
    }
    .toast-message {
      position: fixed;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%) scale(0.9);
      background: #121218cc;
      backdrop-filter: blur(12px);
      border: 1px solid #e63946;
      padding: 0.8rem 2rem;
      border-radius: 60px;
      z-index: 2000;
      opacity: 0;
      transition: 0.2s;
      pointer-events: none;
      white-space: nowrap;
    }
    footer { text-align: center; padding: 2rem; border-top: 1px solid rgba(255,255,255,0.03); font-size: 0.6rem; color: #444; margin-top: 2rem; }
    @media (max-width: 500px) { .shoe-name { font-size: 1.3rem; } .shoe-price { font-size: 1.6rem; } .toast-message { white-space: normal; width: 80%; text-align: center; } }
  </style>
</head>
<body>

<div class="bg-particle-field" id="particleField"></div>

<main class="preview-main">
  <div class="preview-header">
    <div class="logo-shop"><span>PREVIEW</span> // 3D STUDIO</div>
    <div class="back-link" id="backToShopBtn"><i class="fas fa-arrow-left"></i> BACK TO SHOP</div>
  </div>

  <div class="product-container">
    <div class="preview-card">
      <div class="preview-title"><i class="fas fa-cube"></i> CINEMATIC 3D PREVIEW</div>
      <div class="shoe-canvas-wrapper">
        <canvas id="shoeCanvas"></canvas>
      </div>
      <div class="hint-rotate"><i class="fas fa-mouse-pointer"></i> Drag to rotate • 360° view</div>
    </div>

    <div class="purchase-card">
      <div class="shoe-name" id="shoeNameDisplay">Loading...</div>
      <div class="shoe-price" id="shoePriceDisplay"></div>
      <div class="shoe-details" id="shoeDetailsContainer"></div>
      <div class="section-label"><i class="fas fa-ruler-combined"></i> SELECT SIZE</div>
      <div class="size-grid" id="sizeGrid"></div>
      <button class="add-to-cart-btn" id="addToCartBtn">
        <i class="fas fa-shopping-cart"></i> ADD TO CART & BACK TO SHOP
      </button>
      <div style="margin-top: 1.5rem; background: rgba(255,255,255,0.02); border-radius: 20px; padding: 0.8rem; border-left: 3px solid #ffb347;">
        <i class="fas fa-truck-fast"></i> Free worldwide shipping • 14-day returns
      </div>
    </div>
  </div>
  <footer>© 2025 SNEAKER HYPE — EXACT 3D PREVIEW FOR EACH SHOE</footer>
</main>

<div id="toastMsg" class="toast-message"></div>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
    }
  }
</script>

<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';

  // Complete shoe database - must match shop.html exactly
  const SHOES_DB = {
    "phantom-veil": { 
      id: "phantom-veil", name: "PHANTOM VEIL", price: 349, 
      primaryColor: 0xaa88ff, secondaryColor: 0xdd66cc, accentColor: 0xffaa88, 
      soleColor: 0x2d1b36, upperColor: 0x191024, emissiveIntensity: 0.6,
      details: ["Limited 500 Pairs", "Glow-in-dark Sole", "Full-grain Leather", "Memory Foam Insole"]
    },
    "midnight-edition": { 
      id: "midnight-edition", name: "MIDNIGHT EDITION", price: 399, 
      primaryColor: 0x3b82f6, secondaryColor: 0xa855f7, accentColor: 0x60a5fa, 
      soleColor: 0x1e1b2e, upperColor: 0x0f172a, emissiveIntensity: 0.5,
      details: ["Midnight Blue", "Reflective Details", "Nubuck Leather", "Air Cushioning"]
    },
    "carbon-shadow": { 
      id: "carbon-shadow", name: "CARBON SHADOW", price: 459, 
      primaryColor: 0x475569, secondaryColor: 0x94a3b8, accentColor: 0xcbd5e1, 
      soleColor: 0x111827, upperColor: 0x1e293b, emissiveIntensity: 0.3,
      details: ["Carbon Fiber Texture", "Titanium Accents", "Ultra-lightweight", "Collector's Edition"]
    },
    "azure-surge": { 
      id: "azure-surge", name: "AZURE SURGE", price: 379, 
      primaryColor: 0x0ea5e9, secondaryColor: 0x38bdf8, accentColor: 0x7dd3fc, 
      soleColor: 0x0c4a6e, upperColor: 0x082f49, emissiveIntensity: 0.55,
      details: ["Electric Blue Gradient", "3D Printed Mesh", "Breathable Fabric", "Quick-lace System"]
    },
    "ember-blaze": { 
      id: "ember-blaze", name: "EMBER BLAZE", price: 419, 
      primaryColor: 0xea580c, secondaryColor: 0xf97316, accentColor: 0xfdba74, 
      soleColor: 0x7c2d12, upperColor: 0x431407, emissiveIntensity: 0.65,
      details: ["Flame Orange", "Reflective Flame Pattern", "Durable Rubber", "Dynamic Fit Upper"]
    },
    "neon-synth": { 
      id: "neon-synth", name: "NEON SYNTH", price: 389, 
      primaryColor: 0x10b981, secondaryColor: 0x34d399, accentColor: 0x6ee7b7, 
      soleColor: 0x064e3b, upperColor: 0x022c22, emissiveIntensity: 0.7,
      details: ["Electric Green Neon", "Synthetic Fibers", "Glow Laces", "Futuristic Design"]
    }
  };

  const urlParams = new URLSearchParams(window.location.search);
  const shoeId = urlParams.get('shoe');
  let currentShoe = SHOES_DB[shoeId] || SHOES_DB["phantom-veil"];
  
  let selectedSize = null;
  const sizeList = ['US 6', 'US 7', 'US 8', 'US 9', 'US 10', 'US 11', 'US 12'];
  
  const sizeGrid = document.getElementById('sizeGrid');
  const shoeNameSpan = document.getElementById('shoeNameDisplay');
  const shoePriceSpan = document.getElementById('shoePriceDisplay');
  const shoeDetailsContainer = document.getElementById('shoeDetailsContainer');
  const toast = document.getElementById('toastMsg');
  const backBtn = document.getElementById('backToShopBtn');
  const addToCartBtn = document.getElementById('addToCartBtn');
  
  function showToast(msg) {
    toast.style.opacity = '1';
    toast.style.transform = 'translateX(-50%) scale(1)';
    toast.innerText = msg;
    setTimeout(() => {
      toast.style.opacity = '0';
      toast.style.transform = 'translateX(-50%) scale(0.9)';
    }, 2200);
  }
  
  function renderSizeButtons() {
    sizeGrid.innerHTML = '';
    sizeList.forEach(size => {
      const btn = document.createElement('div');
      btn.classList.add('size-btn');
      btn.textContent = size;
      if (selectedSize === size) btn.classList.add('active');
      btn.addEventListener('click', () => {
        document.querySelectorAll('.size-btn').forEach(el => el.classList.remove('active'));
        btn.classList.add('active');
        selectedSize = size;
        showToast(`✓ Size ${selectedSize} selected for ${currentShoe.name}`);
      });
      sizeGrid.appendChild(btn);
    });
  }
  
  function getCart() {
    const stored = localStorage.getItem('sneaker_cart');
    return stored ? JSON.parse(stored) : [];
  }
  
  function saveCart(cart) { localStorage.setItem('sneaker_cart', JSON.stringify(cart)); }
  
  function addToCartAndGoBack() {
    if (!selectedSize) {
      showToast(`❌ Please select a size for ${currentShoe.name} first!`);
      return;
    }
    let cart = getCart();
    const existingIndex = cart.findIndex(item => item.id === currentShoe.id && item.size === selectedSize);
    if (existingIndex !== -1) cart[existingIndex].quantity += 1;
    else cart.push({ id: currentShoe.id, name: currentShoe.name, price: currentShoe.price, size: selectedSize, quantity: 1 });
    saveCart(cart);
    showToast(`✅ ${currentShoe.name} (${selectedSize}) added to cart! Returning to shop...`);
    setTimeout(() => { window.location.href = 'shop.html'; }, 600);
  }
  
  const canvas = document.getElementById('shoeCanvas');
  const wrapper = canvas.parentElement;
  let current3D = null;
  
  function initFull3D(shoe) {
    if (current3D && current3D.dispose) current3D.dispose();
    const width = wrapper.clientWidth, height = wrapper.clientHeight;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x030308);
    scene.fog = new THREE.FogExp2(0x030308, 0.012);
    const camera = new THREE.PerspectiveCamera(42, width / height, 0.1, 1000);
    camera.position.set(2.4, 1.6, 3.4);
    camera.lookAt(0, 0.25, 0);
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: false, antialias: true });
    renderer.setSize(width, height);
    renderer.setPixelRatio(window.devicePixelRatio);
    const controls = new OrbitControls(camera, canvas);
    controls.enableDamping = true; controls.dampingFactor = 0.06; controls.target.set(0, 0.3, 0);
    
    const ambient = new THREE.AmbientLight(0x222222);
    scene.add(ambient);
    const dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
    dirLight.position.set(2, 3, 2);
    scene.add(dirLight);
    const fillLight = new THREE.PointLight(shoe.primaryColor, 0.6);
    fillLight.position.set(1.2, 1, 2.2);
    scene.add(fillLight);
    const backRim = new THREE.PointLight(shoe.secondaryColor, 0.65);
    backRim.position.set(-1, 1.2, -2);
    scene.add(backRim);
    const accentLight = new THREE.PointLight(shoe.accentColor, 0.55);
    accentLight.position.set(1.5, 0.8, 1.2);
    scene.add(accentLight);
    
    const gridHelper = new THREE.GridHelper(5.5, 24, shoe.primaryColor, 0x333333);
    gridHelper.position.y = -0.65; gridHelper.material.transparent = true; gridHelper.material.opacity = 0.2;
    scene.add(gridHelper);
    
    const shoeGroup = new THREE.Group();
    const sole = new THREE.Mesh(new THREE.BoxGeometry(1.68, 0.26, 2.88), new THREE.MeshStandardMaterial({ color: shoe.soleColor, roughness: 0.45, metalness: 0.65 }));
    sole.position.y = -0.28; shoeGroup.add(sole);
    const midStripe = new THREE.Mesh(new THREE.BoxGeometry(1.58, 0.1, 2.72), new THREE.MeshStandardMaterial({ color: shoe.primaryColor, metalness: 0.85, emissive: shoe.primaryColor, emissiveIntensity: shoe.emissiveIntensity * 0.7 }));
    midStripe.position.y = -0.12; shoeGroup.add(midStripe);
    const upper = new THREE.Mesh(new THREE.CylinderGeometry(0.89, 0.97, 1.18, 30), new THREE.MeshStandardMaterial({ color: shoe.upperColor, roughness: 0.35 }));
    upper.position.y = 0.39; upper.scale.set(1, 0.92, 1.05); shoeGroup.add(upper);
    const toeCap = new THREE.Mesh(new THREE.SphereGeometry(0.65, 32, 32), new THREE.MeshStandardMaterial({ color: shoe.secondaryColor, metalness: 0.88, emissive: shoe.secondaryColor, emissiveIntensity: 0.25 }));
    toeCap.position.set(0.79, 0.21, 1.12); toeCap.scale.set(0.7, 0.5, 0.6); shoeGroup.add(toeCap);
    const heelBlock = new THREE.Mesh(new THREE.BoxGeometry(0.88, 0.67, 0.78), new THREE.MeshStandardMaterial({ color: shoe.accentColor, metalness: 0.75 }));
    heelBlock.position.set(-0.79, 0.23, -1.12); shoeGroup.add(heelBlock);
    
    const points = []; for (let t = 0; t <= 1; t += 0.045) points.push(new THREE.Vector3(-0.77 + t*1.58, 0.33 + Math.sin(t*Math.PI)*0.24, -0.87 + t*1.98));
    const swoosh = new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(points), 32, 0.075, 8, false), new THREE.MeshStandardMaterial({ color: shoe.secondaryColor, metalness: 0.92, emissive: shoe.primaryColor, emissiveIntensity: 0.3 }));
    shoeGroup.add(swoosh);
    
    const laceMat = new THREE.MeshStandardMaterial({ color: 0xe0e0e0, metalness: 0.2 });
    [-0.12, 0.12, 0.36, 0.6].forEach(xOff => { const lace = new THREE.Mesh(new THREE.CylinderGeometry(0.048, 0.048, 0.44, 8), laceMat); lace.position.set(xOff - 0.18, 0.78, 0.6); lace.rotation.z = 0.85; shoeGroup.add(lace); });
    const ring = new THREE.Mesh(new THREE.TorusGeometry(0.49, 0.058, 32, 90), new THREE.MeshStandardMaterial({ color: shoe.accentColor, metalness: 0.98, emissive: shoe.accentColor, emissiveIntensity: 0.45 }));
    ring.position.set(-0.69, 0.39, -1.22); ring.rotation.x = Math.PI/2; shoeGroup.add(ring);
    
    const particleCount = 420; const positions = new Float32Array(particleCount * 3);
    for (let i = 0; i < particleCount; i++) { positions[i*3] = (Math.random() - 0.5) * 2.9; positions[i*3+1] = Math.random() * 1.55; positions[i*3+2] = (Math.random() - 0.5) * 2.9; }
    const particleGeo = new THREE.BufferGeometry(); particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const particles = new THREE.Points(particleGeo, new THREE.PointsMaterial({ color: shoe.primaryColor, size: 0.022, blending: THREE.AdditiveBlending }));
    shoeGroup.add(particles);
    scene.add(shoeGroup);
    
    const aura = new THREE.Mesh(new THREE.SphereGeometry(1.5, 32, 32), new THREE.MeshStandardMaterial({ color: shoe.primaryColor, emissive: shoe.primaryColor, emissiveIntensity: 0.13, transparent: true, opacity: 0.12 }));
    aura.position.y = 0.2; scene.add(aura);
    
    const starCount = 1200; const starPos = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i++) { starPos[i*3] = (Math.random() - 0.5) * 200; starPos[i*3+1] = (Math.random() - 0.5) * 80; starPos[i*3+2] = (Math.random() - 0.5) * 80 - 35; }
    const starFieldGeo = new THREE.BufferGeometry(); starFieldGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
    const stars = new THREE.Points(starFieldGeo, new THREE.PointsMaterial({ color: 0xffaa88, size: 0.045, transparent: true, opacity: 0.32 }));
    scene.add(stars);
    
    let animTime = 0, animFrame;
    function animate() { animFrame = requestAnimationFrame(animate); animTime += 0.012; fillLight.intensity = 0.58 + Math.sin(animTime)*0.13; backRim.intensity = 0.6 + Math.cos(animTime*1.2)*0.12; particles.rotation.y += 0.006; stars.rotation.y += 0.0005; controls.update(); renderer.render(scene, camera); }
    animate();
    const handleResize = () => { const w = wrapper.clientWidth, h = wrapper.clientHeight; renderer.setSize(w, h); camera.aspect = w/h; camera.updateProjectionMatrix(); };
    window.addEventListener('resize', handleResize);
    return { dispose: () => { window.removeEventListener('resize', handleResize); cancelAnimationFrame(animFrame); renderer.dispose(); } };
  }
  
  shoeNameSpan.innerText = currentShoe.name;
  shoePriceSpan.innerHTML = `$${currentShoe.price} <small>USD</small>`;
  
  if (currentShoe.details && currentShoe.details.length) {
    shoeDetailsContainer.innerHTML = currentShoe.details.map(d => `<span class="detail-tag">${d}</span>`).join('');
  }
  
  renderSizeButtons();
  current3D = initFull3D(currentShoe);
  
  addToCartBtn.addEventListener('click', addToCartAndGoBack);
  backBtn.addEventListener('click', () => { window.location.href = 'shop.html'; });
  
  function createBgParticles() {
    const container = document.getElementById('particleField');
    for (let i = 0; i < 60; i++) { const p = document.createElement('div'); p.classList.add('bg-particle'); const s = 2 + Math.random() * 18; p.style.width = s + 'px'; p.style.height = s + 'px'; p.style.left = Math.random() * 100 + '%'; p.style.top = Math.random() * 100 + '%'; p.style.animationDuration = 12 + Math.random() * 24 + 's'; container.appendChild(p); }
  }
  createBgParticles();
  
  window.addEventListener('resize', () => { if (current3D) current3D.dispose(); current3D = initFull3D(currentShoe); });
</script>
</body>
</html>
