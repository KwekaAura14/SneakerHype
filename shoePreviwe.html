<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>SNEAKER HYPE | CYBER PULSE — 3D PREVIEW & ADD TO CART</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #050508;
      font-family: 'Inter', sans-serif;
      color: #ffffff;
      overflow-x: hidden;
    }

    /* cinematic particle background */
    .bg-particle-field {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .bg-particle {
      position: absolute;
      background: radial-gradient(circle, rgba(230,57,70,0.25), rgba(255,180,71,0.08));
      border-radius: 50%;
      pointer-events: none;
      animation: floatParticle 22s infinite alternate;
    }
    @keyframes floatParticle {
      0% { transform: translateY(0px) translateX(0px); opacity: 0.15; }
      100% { transform: translateY(-100px) translateX(60px); opacity: 0.45; }
    }

    .shop-main {
      position: relative;
      z-index: 10;
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.5rem 2rem 4rem;
    }

    .shop-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 1rem 0 2rem;
      border-bottom: 1px solid rgba(230,57,70,0.3);
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .logo-shop {
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 6px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ffffff, #e63946);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .logo-shop span { font-weight: 800; color: #e63946; background: none; }
    .back-link {
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 0.7rem;
      letter-spacing: 2px;
      border: 1px solid rgba(230,57,70,0.5);
      padding: 0.45rem 1.2rem;
      border-radius: 60px;
      transition: 0.2s;
    }
    .back-link i { margin-right: 6px; }
    .back-link:hover { background: #e63946; border-color: #e63946; color: white; }

    /* product grid */
    .product-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      margin-bottom: 2rem;
    }
    @media (max-width: 900px) {
      .product-container { grid-template-columns: 1fr; gap: 2rem; }
      .shop-main { padding: 1.2rem; }
    }

    /* 3D preview glass card */
    .preview-card {
      background: rgba(12,12,18,0.6);
      backdrop-filter: blur(16px);
      border-radius: 48px;
      border: 1px solid rgba(230,57,70,0.3);
      padding: 1.5rem;
      transition: 0.3s;
    }
    .preview-title {
      font-size: 0.75rem;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #e63946;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .shoe-canvas-wrapper {
      background: #010105;
      border-radius: 32px;
      width: 100%;
      aspect-ratio: 1 / 0.9;
      position: relative;
      overflow: hidden;
      cursor: grab;
      box-shadow: 0 0 30px rgba(0,0,0,0.6);
    }
    #shoeCanvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    .hint-rotate {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.6rem;
      color: rgba(255,255,255,0.4);
      letter-spacing: 2px;
    }

    /* purchase section */
    .purchase-card {
      background: rgba(8,8,14,0.75);
      backdrop-filter: blur(20px);
      border-radius: 48px;
      border: 1px solid rgba(230,57,70,0.4);
      padding: 2rem;
    }
    .shoe-name {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #ffffff, #e63946);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
    }
    .shoe-price {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #ffb347);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 1.5rem;
    }
    .section-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #e63946;
      margin: 1rem 0 0.6rem;
      font-weight: 600;
    }
    .size-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.7rem;
      margin: 0.8rem 0 1.2rem;
    }
    .size-btn {
      background: rgba(25,25,32,0.9);
      border: 1px solid rgba(230,57,70,0.4);
      border-radius: 50px;
      padding: 0.7rem 1.3rem;
      font-weight: 600;
      font-size: 0.9rem;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
    }
    .size-btn.active {
      background: #e63946;
      border-color: #ffb347;
      box-shadow: 0 0 12px rgba(230,57,70,0.6);
    }
    .size-btn:hover { background: #e63946; transform: scale(1.02); }

    .add-to-cart-btn {
      width: 100%;
      background: linear-gradient(95deg, #e63946, #ffb347);
      border: none;
      padding: 1.1rem;
      border-radius: 80px;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 2px;
      color: #0a0a0a;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      font-family: inherit;
      margin-top: 1.5rem;
      box-shadow: 0 5px 20px rgba(230,57,70,0.3);
    }
    .add-to-cart-btn:hover { transform: scale(1.01); filter: brightness(1.05); }

    .cart-summary {
      background: rgba(255,255,255,0.03);
      border-radius: 24px;
      padding: 1rem;
      margin-top: 1.8rem;
      font-size: 0.75rem;
      color: #ccc;
      border-left: 3px solid #e63946;
    }
    .cart-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.5rem;
      font-size: 0.7rem;
    }
    .cart-total {
      border-top: 1px solid rgba(255,255,255,0.1);
      margin-top: 0.5rem;
      padding-top: 0.5rem;
      font-weight: 700;
      color: #ffb347;
    }
    .empty-cart-msg {
      color: #777;
      font-style: italic;
    }

    .toast-message {
      position: fixed;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%) scale(0.9);
      background: #121218cc;
      backdrop-filter: blur(12px);
      border: 1px solid #e63946;
      padding: 0.8rem 2rem;
      border-radius: 60px;
      font-weight: 500;
      z-index: 2000;
      opacity: 0;
      transition: 0.2s;
      pointer-events: none;
      white-space: nowrap;
      font-size: 0.8rem;
    }
    footer {
      text-align: center;
      padding: 2rem;
      border-top: 1px solid rgba(255,255,255,0.03);
      font-size: 0.6rem;
      color: #444;
      margin-top: 2rem;
    }
    @media (max-width: 500px) {
      .toast-message { white-space: normal; width: 80%; text-align: center; }
      .shoe-name { font-size: 1.3rem; }
      .shoe-price { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

<div class="bg-particle-field" id="particleField"></div>

<main class="shop-main">
  <div class="shop-header">
    <div class="logo-shop"><span>CYBER</span> // SNEAKER STUDIO</div>
    <a href="#" class="back-link" id="backToHomeBtn"><i class="fas fa-arrow-left"></i> BACK TO MAIN</a>
  </div>

  <div class="product-container">
    <!-- LEFT: 3D PREVIEW (single shoe) -->
    <div class="preview-card">
      <div class="preview-title"><i class="fas fa-cube"></i> CINEMATIC 3D PREVIEW</div>
      <div class="shoe-canvas-wrapper">
        <canvas id="shoeCanvas"></canvas>
      </div>
      <div class="hint-rotate"><i class="fas fa-mouse-pointer"></i> drag to rotate • immersive experience</div>
    </div>

    <!-- RIGHT: SIZE SELECTION + ADD TO CART (specific shoe) -->
    <div class="purchase-card">
      <div class="shoe-name">CYBER PULSE</div>
      <div class="shoe-price" id="shoePriceDisplay">$289 <small style="font-size:0.9rem;">USD</small></div>
      
      <div class="section-label"><i class="fas fa-ruler-combined"></i> SELECT YOUR SIZE</div>
      <div class="size-grid" id="sizeGrid"></div>

      <button class="add-to-cart-btn" id="addToCartBtn">
        <i class="fas fa-shopping-cart"></i> ADD TO CART
      </button>

      <!-- shopping cart summary (specific for this shoe) -->
      <div class="cart-summary" id="cartSummary">
        <div style="margin-bottom: 0.6rem;"><i class="fas fa-bag-shopping"></i> YOUR CART</div>
        <div id="cartItemsContainer">
          <div class="empty-cart-msg">No items added yet.</div>
        </div>
        <div class="cart-total" id="cartTotal">Total: $0</div>
      </div>
      <div class="cart-summary" style="margin-top: 0.8rem; border-left-color: #ffb347;">
        <i class="fas fa-truck-fast"></i> Free worldwide shipping • 14-day return
      </div>
    </div>
  </div>
  <footer>© 2025 SNEAKER HYPE — CYBER PULSE EDITION | PREMIUM 3D CONFIGURATOR</footer>
</main>

<div id="toastMsg" class="toast-message"></div>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
    }
  }
</script>

<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';

  // ----- SINGLE SHOE DATA (specific product) -----
  const currentShoe = {
    id: "cyber-pulse",
    name: "CYBER PULSE",
    price: 289,
    primaryColor: 0xe63946,
    secondaryColor: 0xffb347,
    accentColor: 0x44aaff,
    metalnessVal: 0.75,
    emissiveIntensity: 0.45,
    soleColor: 0x22223b,
    upperColor: 0x1a1a2e
  };

  // Size list
  const sizeList = ['US 6', 'US 7', 'US 8', 'US 9', 'US 10', 'US 11', 'US 12'];
  let selectedSize = null;
  
  // Cart items for this specific shoe (each item has size, quantity, unit price)
  let cartItems = []; // each: { size, price, quantity }
  
  // DOM elements
  const sizeGridContainer = document.getElementById('sizeGrid');
  const addToCartBtn = document.getElementById('addToCartBtn');
  const cartItemsContainer = document.getElementById('cartItemsContainer');
  const cartTotalSpan = document.getElementById('cartTotal');
  const toast = document.getElementById('toastMsg');
  const shoePriceDisplay = document.getElementById('shoePriceDisplay');

  // Helper functions
  function showToastMessage(msg, isError = false) {
    toast.style.opacity = '1';
    toast.style.transform = 'translateX(-50%) scale(1)';
    toast.innerText = msg;
    toast.style.background = isError ? '#2a0a0ecc' : '#121218cc';
    setTimeout(() => {
      toast.style.opacity = '0';
      toast.style.transform = 'translateX(-50%) scale(0.9)';
    }, 2500);
  }

  // Render size selection buttons
  function renderSizeButtons() {
    sizeGridContainer.innerHTML = '';
    sizeList.forEach(size => {
      const btn = document.createElement('div');
      btn.classList.add('size-btn');
      btn.textContent = size;
      if (selectedSize === size) btn.classList.add('active');
      btn.addEventListener('click', () => {
        document.querySelectorAll('.size-btn').forEach(el => el.classList.remove('active'));
        btn.classList.add('active');
        selectedSize = size;
        showToastMessage(`✓ Size ${selectedSize} selected for ${currentShoe.name}`, false);
      });
      sizeGridContainer.appendChild(btn);
    });
  }

  // Update cart UI (specific for this shoe product)
  function updateCartUI() {
    if (cartItems.length === 0) {
      cartItemsContainer.innerHTML = '<div class="empty-cart-msg">No items added yet.</div>';
      cartTotalSpan.innerHTML = `Total: $0`;
      return;
    }
    
    let html = '';
    let total = 0;
    cartItems.forEach((item, idx) => {
      const itemTotal = item.price * item.quantity;
      total += itemTotal;
      html += `
        <div class="cart-item">
          <span><i class="fas fa-shoe-prints"></i> ${currentShoe.name} (${item.size}) x ${item.quantity}</span>
          <span>$${itemTotal}</span>
          <button class="remove-item-btn" data-index="${idx}" style="background:none; border:none; color:#e63946; cursor:pointer; font-size:0.7rem;"><i class="fas fa-trash-alt"></i></button>
        </div>
      `;
    });
    cartItemsContainer.innerHTML = html;
    cartTotalSpan.innerHTML = `Total: $${total}`;
    
    // attach remove event listeners
    document.querySelectorAll('.remove-item-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const idx = parseInt(btn.getAttribute('data-index'), 10);
        if (!isNaN(idx)) {
          cartItems.splice(idx, 1);
          updateCartUI();
          showToastMessage(`🗑️ Item removed from cart`, false);
        }
      });
    });
  }

  // Add to cart logic specific for this shoe
  function addToCart() {
    if (!selectedSize) {
      showToastMessage(`❌ Please select a size for ${currentShoe.name} first!`, true);
      return;
    }
    
    // Check if same size already exists in cart -> increment quantity
    const existingItemIndex = cartItems.findIndex(item => item.size === selectedSize);
    if (existingItemIndex !== -1) {
      cartItems[existingItemIndex].quantity += 1;
      showToastMessage(`🔄 Added another ${currentShoe.name} (${selectedSize}) to cart. Quantity: ${cartItems[existingItemIndex].quantity}`, false);
    } else {
      cartItems.push({
        size: selectedSize,
        price: currentShoe.price,
        quantity: 1
      });
      showToastMessage(`✅ ${currentShoe.name} (Size ${selectedSize}) added to cart!`, false);
    }
    
    updateCartUI();
    
    // optional: subtle animation on add button
    addToCartBtn.style.transform = 'scale(0.98)';
    setTimeout(() => { addToCartBtn.style.transform = ''; }, 150);
  }

  // Initialize size UI
  renderSizeButtons();
  
  // Attach add to cart event
  addToCartBtn.addEventListener('click', addToCart);
  
  // Set price display
  shoePriceDisplay.innerHTML = `$${currentShoe.price} <small style="font-size:0.9rem;">USD</small>`;
  
  // ---------- 3D SHOE PREVIEW (cinematic, single premium model) ----------
  const canvas = document.getElementById('shoeCanvas');
  const wrapper = canvas.parentElement;
  
  function initShoe3D() {
    const width = wrapper.clientWidth;
    const height = wrapper.clientHeight;
    
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x030308);
    scene.fog = new THREE.FogExp2(0x030308, 0.012);
    
    const camera = new THREE.PerspectiveCamera(42, width / height, 0.1, 1000);
    camera.position.set(2.4, 1.6, 3.4);
    camera.lookAt(0, 0.25, 0);
    
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: false, antialias: true });
    renderer.setSize(width, height);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    
    const controls = new OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.autoRotate = false;
    controls.enableZoom = true;
    controls.zoomSpeed = 1.0;
    controls.rotateSpeed = 1.2;
    controls.target.set(0, 0.3, 0);
    
    // Lighting
    const ambient = new THREE.AmbientLight(0x222222);
    scene.add(ambient);
    const dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
    dirLight.position.set(2, 3, 2);
    dirLight.castShadow = true;
    scene.add(dirLight);
    const fillLight = new THREE.PointLight(currentShoe.primaryColor, 0.6);
    fillLight.position.set(1.2, 1, 2.2);
    scene.add(fillLight);
    const backRim = new THREE.PointLight(currentShoe.secondaryColor, 0.65);
    backRim.position.set(-1, 1.2, -2);
    scene.add(backRim);
    const accentLight = new THREE.PointLight(currentShoe.accentColor, 0.55);
    accentLight.position.set(1.5, 0.8, 1.2);
    scene.add(accentLight);
    
    // Grid reflection
    const gridHelper = new THREE.GridHelper(5.5, 24, currentShoe.primaryColor, 0x333333);
    gridHelper.position.y = -0.65;
    gridHelper.material.transparent = true;
    gridHelper.material.opacity = 0.2;
    scene.add(gridHelper);
    
    const shoeGroup = new THREE.Group();
    
    // Sole
    const soleGeo = new THREE.BoxGeometry(1.68, 0.26, 2.88);
    const soleMat = new THREE.MeshStandardMaterial({ color: currentShoe.soleColor, roughness: 0.45, metalness: 0.65 });
    const sole = new THREE.Mesh(soleGeo, soleMat);
    sole.position.y = -0.28;
    shoeGroup.add(sole);
    
    // Midsole stripe (glow accent)
    const midStripeMat = new THREE.MeshStandardMaterial({ color: currentShoe.primaryColor, metalness: 0.85, roughness: 0.3, emissive: currentShoe.primaryColor, emissiveIntensity: currentShoe.emissiveIntensity * 0.7 });
    const midStripe = new THREE.Mesh(new THREE.BoxGeometry(1.58, 0.1, 2.72), midStripeMat);
    midStripe.position.y = -0.12;
    shoeGroup.add(midStripe);
    
    // Upper
    const upperGeo = new THREE.CylinderGeometry(0.89, 0.97, 1.18, 30);
    const upperMat = new THREE.MeshStandardMaterial({ color: currentShoe.upperColor, roughness: 0.35, metalness: 0.25 });
    const upper = new THREE.Mesh(upperGeo, upperMat);
    upper.position.y = 0.39;
    upper.scale.set(1, 0.92, 1.05);
    shoeGroup.add(upper);
    
    // Toe cap gloss
    const toeMat = new THREE.MeshStandardMaterial({ color: currentShoe.secondaryColor, metalness: 0.88, roughness: 0.2, emissive: currentShoe.secondaryColor, emissiveIntensity: 0.25 });
    const toeCap = new THREE.Mesh(new THREE.SphereGeometry(0.65, 32, 32), toeMat);
    toeCap.position.set(0.79, 0.21, 1.12);
    toeCap.scale.set(0.7, 0.5, 0.6);
    shoeGroup.add(toeCap);
    
    // Heel counter (dynamic)
    const heelMat = new THREE.MeshStandardMaterial({ color: currentShoe.accentColor, metalness: 0.75 });
    const heelBlock = new THREE.Mesh(new THREE.BoxGeometry(0.88, 0.67, 0.78), heelMat);
    heelBlock.position.set(-0.79, 0.23, -1.12);
    shoeGroup.add(heelBlock);
    
    // Iconic swoosh / dynamic curve
    const points = [];
    for (let t = 0; t <= 1; t += 0.045) {
      const x = -0.77 + t * 1.58;
      const z = -0.87 + t * 1.98;
      const y = 0.33 + Math.sin(t * Math.PI) * 0.24;
      points.push(new THREE.Vector3(x, y, z));
    }
    const tubeGeo = new THREE.TubeGeometry(new THREE.CatmullRomCurve3(points), 32, 0.075, 8, false);
    const swooshMat = new THREE.MeshStandardMaterial({ color: currentShoe.secondaryColor, metalness: 0.92, emissive: currentShoe.primaryColor, emissiveIntensity: 0.3 });
    const swoosh = new THREE.Mesh(tubeGeo, swooshMat);
    shoeGroup.add(swoosh);
    
    // Detailed laces
    const laceMat = new THREE.MeshStandardMaterial({ color: 0xe0e0e0, metalness: 0.2 });
    const lacePositions = [-0.12, 0.12, 0.36, 0.6];
    lacePositions.forEach(xOff => {
      const lace = new THREE.Mesh(new THREE.CylinderGeometry(0.048, 0.048, 0.44, 8), laceMat);
      lace.position.set(xOff - 0.18, 0.78, 0.6);
      lace.rotation.z = 0.85;
      shoeGroup.add(lace);
    });
    
    // Holographic ring
    const ringGeo = new THREE.TorusGeometry(0.49, 0.058, 32, 90);
    const ringMatGlow = new THREE.MeshStandardMaterial({ color: currentShoe.accentColor, metalness: 0.98, emissive: currentShoe.accentColor, emissiveIntensity: 0.45 });
    const heelRing = new THREE.Mesh(ringGeo, ringMatGlow);
    heelRing.position.set(-0.69, 0.39, -1.22);
    heelRing.rotation.x = Math.PI / 2;
    shoeGroup.add(heelRing);
    
    // Floating particles (magical dust)
    const particleCount = 420;
    const particleGeo = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);
    for (let i = 0; i < particleCount; i++) {
      positions[i*3] = (Math.random() - 0.5) * 2.9;
      positions[i*3+1] = Math.random() * 1.55;
      positions[i*3+2] = (Math.random() - 0.5) * 2.9;
    }
    particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const particleMatPoints = new THREE.PointsMaterial({ color: currentShoe.primaryColor, size: 0.022, transparent: true, blending: THREE.AdditiveBlending });
    const particles = new THREE.Points(particleGeo, particleMatPoints);
    shoeGroup.add(particles);
    
    scene.add(shoeGroup);
    
    // Glow aura sphere around shoe
    const auraMat = new THREE.MeshStandardMaterial({ color: currentShoe.primaryColor, emissive: currentShoe.primaryColor, emissiveIntensity: 0.13, transparent: true, opacity: 0.12 });
    const auraSphere = new THREE.Mesh(new THREE.SphereGeometry(1.5, 32, 32), auraMat);
    auraSphere.position.y = 0.2;
    scene.add(auraSphere);
    
    // Background starfield (immersive)
    const starCount = 1200;
    const starPositions = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i++) {
      starPositions[i*3] = (Math.random() - 0.5) * 200;
      starPositions[i*3+1] = (Math.random() - 0.5) * 80;
      starPositions[i*3+2] = (Math.random() - 0.5) * 80 - 35;
    }
    const starFieldGeo = new THREE.BufferGeometry();
    starFieldGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
    const starFieldMat = new THREE.PointsMaterial({ color: 0xffaa88, size: 0.045, transparent: true, opacity: 0.32 });
    const starsField = new THREE.Points(starFieldGeo, starFieldMat);
    scene.add(starsField);
    
    let animTime = 0;
    function animateShoe() {
      requestAnimationFrame(animateShoe);
      animTime += 0.012;
      // dynamic lighting
      fillLight.intensity = 0.58 + Math.sin(animTime) * 0.13;
      backRim.intensity = 0.6 + Math.cos(animTime * 1.2) * 0.12;
      accentLight.intensity = 0.52 + Math.sin(animTime * 1.5) * 0.1;
      particles.rotation.y += 0.006;
      particles.rotation.x = Math.sin(animTime * 0.6) * 0.12;
      starsField.rotation.y += 0.0005;
      starsField.rotation.x += 0.0003;
      controls.update();
      renderer.render(scene, camera);
    }
    animateShoe();
    
    // resize handler
    const handleResize = () => {
      const w = wrapper.clientWidth;
      const h = wrapper.clientHeight;
      renderer.setSize(w, h);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    };
    window.addEventListener('resize', handleResize);
    
    return { dispose: () => {
      window.removeEventListener('resize', handleResize);
      renderer.dispose();
    } };
  }
  
  let current3D = initShoe3D();
  
  // background particle generation
  function createBgParticles() {
    const container = document.getElementById('particleField');
    for (let i = 0; i < 70; i++) {
      const p = document.createElement('div');
      p.classList.add('bg-particle');
      const s = 2 + Math.random() * 22;
      p.style.width = s + 'px';
      p.style.height = s + 'px';
      p.style.left = Math.random() * 100 + '%';
      p.style.top = Math.random() * 100 + '%';
      p.style.animationDuration = 14 + Math.random() * 26 + 's';
      p.style.animationDelay = Math.random() * 12 + 's';
      container.appendChild(p);
    }
  }
  createBgParticles();
  
  // Back to main with transition
  const backBtn = document.getElementById('backToHomeBtn');
  backBtn.addEventListener('click', (e) => {
    e.preventDefault();
    const flash = document.createElement('div');
    flash.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle, #e63946, transparent);pointer-events:none;z-index:9999;opacity:0.6';
    document.body.appendChild(flash);
    let op = 0.6;
    const fadeOut = setInterval(() => { op -= 0.05; flash.style.opacity = op; if(op <= 0) { clearInterval(fadeOut); flash.remove(); } }, 20);
    setTimeout(() => { window.location.reload(); }, 420);
  });
  
  // handle canvas resize after load
  window.addEventListener('load', () => {
    setTimeout(() => {
      const w = wrapper.clientWidth;
      const h = wrapper.clientHeight;
      if (current3D && current3D.dispose) {
        // dummy refresh: just trigger resize on 3d renderer manually (we stored renderer inside closure)
        // but it's okay because we have resizeListener attached inside init
        window.dispatchEvent(new Event('resize'));
      }
    }, 120);
  });
</script>
</body>
