<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Shoe Preview | Specific Sneaker Viewer</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
  background: linear-gradient(135deg, #0a0a0c 0%, #050505 100%);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 2rem;
  position: relative;
  overflow-x: hidden;
}

/* animated background particles */
.bg-particles {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}
.particle {
  position: absolute;
  background: radial-gradient(circle, rgba(230,57,70,0.25), rgba(255,180,71,0.08));
  border-radius: 50%;
  animation: floatParticle 20s infinite alternate;
}
@keyframes floatParticle {
  0% { transform: translateY(0px) translateX(0px); opacity: 0.15; }
  100% { transform: translateY(-80px) translateX(50px); opacity: 0.5; }
}

.preview-container {
  text-align: center;
  max-width: 650px;
  width: 100%;
  background: rgba(15, 15, 20, 0.75);
  backdrop-filter: blur(16px);
  border-radius: 64px;
  padding: 2rem 2rem 2.5rem;
  border: 1px solid rgba(230, 57, 70, 0.35);
  box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(230,57,70,0.1);
  transition: all 0.3s ease;
  position: relative;
  z-index: 10;
}

.preview-img {
  width: 100%;
  max-width: 440px;
  height: auto;
  object-fit: contain;
  filter: drop-shadow(0 25px 35px rgba(0,0,0,0.7)) brightness(1.02);
  transition: all 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  border-radius: 32px;
  background: rgba(0,0,0,0.2);
  padding: 8px;
  cursor: grab;
}

.preview-img:active {
  cursor: grabbing;
}

.preview-img:hover {
  transform: scale(1.02);
  filter: drop-shadow(0 30px 45px rgba(230,57,70,0.3));
}

h1 {
  margin-top: 28px;
  font-size: 2.2rem;
  font-weight: 800;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #ffffff, #e63946);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  text-transform: uppercase;
}

.brand-tag {
  font-size: 0.8rem;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #e63946;
  margin: 8px 0 10px;
  font-weight: 500;
}

.description {
  opacity: 0.7;
  font-size: 0.85rem;
  letter-spacing: 1px;
  max-width: 380px;
  margin: 12px auto;
  line-height: 1.4;
}

.price {
  font-size: 2rem;
  font-weight: 800;
  margin: 15px 0 20px;
  background: linear-gradient(135deg, #ffb347, #ffffff);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  letter-spacing: -0.5px;
}

.size-section {
  margin: 20px 0 18px;
}

.size-label {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: #aaa;
  margin-bottom: 12px;
  display: block;
}

.size-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  margin-bottom: 10px;
}

.size-btn {
  background: rgba(30,30,40,0.9);
  border: 1px solid rgba(230,57,70,0.4);
  padding: 10px 18px;
  border-radius: 60px;
  font-weight: 600;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.2s;
  color: white;
  font-family: inherit;
}

.size-btn.active {
  background: #e63946;
  border-color: #ffb347;
  box-shadow: 0 0 12px rgba(230,57,70,0.6);
  color: white;
}

.size-btn:hover {
  background: #e63946;
  transform: scale(1.02);
}

.button-group {
  display: flex;
  gap: 15px;
  justify-content: center;
  margin-top: 10px;
  flex-wrap: wrap;
}

button {
  background: linear-gradient(135deg, #e63946, #ffb347);
  border: none;
  padding: 14px 28px;
  border-radius: 60px;
  color: #0a0a0a;
  font-weight: 800;
  font-size: 0.9rem;
  letter-spacing: 1.5px;
  cursor: pointer;
  transition: all 0.25s;
  font-family: inherit;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  box-shadow: 0 5px 15px rgba(230,57,70,0.3);
}

button i {
  font-size: 1rem;
}

button:hover {
  transform: scale(1.03);
  filter: brightness(1.05);
  box-shadow: 0 8px 25px rgba(230,57,70,0.5);
}

.selected-info {
  background: rgba(255,255,255,0.05);
  border-radius: 40px;
  padding: 10px 18px;
  margin-top: 22px;
  font-size: 0.7rem;
  color: #ccc;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  backdrop-filter: blur(4px);
}

.toast-message {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) scale(0.9);
  background: #1a1a24ee;
  backdrop-filter: blur(16px);
  border: 1px solid #e63946;
  padding: 12px 28px;
  border-radius: 60px;
  font-weight: 500;
  font-size: 0.85rem;
  z-index: 2000;
  opacity: 0;
  transition: all 0.2s;
  pointer-events: none;
  white-space: nowrap;
  color: white;
  box-shadow: 0 5px 20px rgba(0,0,0,0.3);
}

/* 3D Tilt effect container */
.image-wrapper {
  position: relative;
  display: inline-block;
  perspective: 1000px;
}

@media (max-width: 550px) {
  .preview-container { padding: 1.5rem; }
  h1 { font-size: 1.6rem; }
  .price { font-size: 1.5rem; }
  .button-group { flex-direction: column; align-items: center; width: 100%; }
  button { width: 100%; justify-content: center; }
  .toast-message { white-space: normal; width: 85%; text-align: center; font-size: 0.75rem; }
  .size-btn { padding: 6px 14px; font-size: 0.75rem; }
}
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<div class="bg-particles" id="particleField"></div>

<div class="preview-container">
  <div class="image-wrapper" id="imageWrapper">
    <img id="shoeImage" class="preview-img" alt="Sneaker preview">
  </div>
  <h1 id="shoeName"></h1>
  <div id="shoeBrand" class="brand-tag"></div>
  <div id="shoeDescription" class="description"></div>
  <div id="shoePrice" class="price"></div>
  
  <!-- Size selection -->
  <div class="size-section">
    <span class="size-label"><i class="fas fa-ruler-combined"></i> SELECT SIZE (US)</span>
    <div class="size-grid" id="sizeGrid"></div>
  </div>
  
  <div class="button-group">
    <button id="addToCartBtn"><i class="fas fa-shopping-cart"></i> ADD TO CART</button>
  </div>
  
  <div class="selected-info" id="selectedSizeInfo">
    <i class="fas fa-shoe-prints"></i> No size selected
  </div>
</div>

<div id="toastMsg" class="toast-message"></div>

<script>
// ============================================================
// COMPLETE SHOE DATABASE - each shoe has unique ID, name, brand, price, image, description
// The preview shows ONLY the shoe whose ID matches the URL parameter
// Example: preview.html?id=1 shows LeBron XXI
// When "Add to Cart" is clicked, it saves to localStorage for shop.html to read
// ============================================================
const shoesDatabase = [
  { 
    id: 1, 
    name: "LeBron XXI", 
    brand: "NIKE", 
    price: 199, 
    image: "https://static.nike.com/a/images/t_PDP_1728_v1/f_auto,q_auto:eco/lebron-21.png",
    description: "King's legacy, premium cushioning & explosive response"
  },
  { 
    id: 2, 
    name: "Kobe 6 Protro", 
    brand: "NIKE", 
    price: 209, 
    image: "https://static.nike.com/a/images/t_PDP_1728_v1/f_auto,q_auto:eco/kobe-6-protro.png",
    description: "Mamba mentality — lightweight, responsive & iconic"
  },
  { 
    id: 3, 
    name: "Air Jordan 38", 
    brand: "JORDAN", 
    price: 189, 
    image: "https://static.nike.com/a/images/t_PDP_1728_v1/f_auto,q_auto:eco/air-jordan-38.png",
    description: "Timeless elegance meets modern performance"
  },
  { 
    id: 4, 
    name: "Harden Vol 8", 
    brand: "ADIDAS", 
    price: 159, 
    image: "https://assets.adidas.com/images/harden-vol-8.png",
    description: "Signature stepback style with boost comfort"
  },
  { 
    id: 5, 
    name: "Curry 11", 
    brand: "UNDER ARMOUR", 
    price: 169, 
    image: "https://underarmour.scene7.com/is/image/Underarmour/curry-11.png",
    description: "Chef's precision — grip, agility & unmatched flow"
  },
  { 
    id: 6, 
    name: "MB.03", 
    brand: "PUMA", 
    price: 139, 
    image: "https://images.puma.com/image/upload/f_auto,q_auto/mb03.png",
    description: "LaMelo Ball's signature — bold & explosive"
  },
  { 
    id: 7, 
    name: "Kawhi 4", 
    brand: "NEW BALANCE", 
    price: 179, 
    image: "https://nb.scene7.com/is/image/NB/kawhi-4.png",
    description: "Claw grip, two-way dominance, premium stability"
  },
  { 
    id: 8, 
    name: "Ja Morant 2", 
    brand: "NIKE", 
    price: 149, 
    image: "https://static.nike.com/a/images/t_PDP_1728_v1/f_auto,q_auto:eco/ja-morant-2.png",
    description: "Lightning fast, high-flying energy"
  },
  { 
    id: 9, 
    name: "Dame 9", 
    brand: "ADIDAS", 
    price: 145, 
    image: "https://assets.adidas.com/images/dame-9.png",
    description: "Dame Time — clutch performance & comfort"
  },
  { 
    id: 10, 
    name: "Kyrie Infinity", 
    brand: "NIKE", 
    price: 159, 
    image: "https://static.nike.com/a/images/t_PDP_1728_v1/f_auto,q_auto:eco/kyrie-infinity.png",
    description: "Unpredictable handles, elite traction"
  }
];

// Helper: show toast notifications
function showToastMessage(message, isError = false) {
  const toast = document.getElementById('toastMsg');
  toast.style.opacity = '1';
  toast.style.transform = 'translateX(-50%) scale(1)';
  toast.innerText = message;
  toast.style.background = isError ? '#2a0a0ecc' : '#1a1a24ee';
  toast.style.borderColor = isError ? '#e63946' : '#ffb347';
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transform = 'translateX(-50%) scale(0.9)';
  }, 2600);
}

// Size selection logic
const sizeList = ['US 6', 'US 7', 'US 8', 'US 9', 'US 10', 'US 11', 'US 12', 'US 13'];
let selectedSize = null;
let currentShoe = null;

function renderSizeButtons() {
  const sizeGrid = document.getElementById('sizeGrid');
  sizeGrid.innerHTML = '';
  sizeList.forEach(size => {
    const btn = document.createElement('div');
    btn.classList.add('size-btn');
    if (selectedSize === size) btn.classList.add('active');
    btn.textContent = size;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.size-btn').forEach(el => el.classList.remove('active'));
      btn.classList.add('active');
      selectedSize = size;
      const infoSpan = document.getElementById('selectedSizeInfo');
      if (infoSpan) infoSpan.innerHTML = `<i class="fas fa-check-circle"></i> Size ${selectedSize} selected — ready to add`;
      showToastMessage(`✓ Size ${size} selected for ${currentShoe?.name || 'sneaker'}`, false);
    });
    sizeGrid.appendChild(btn);
  });
}

// Load the SPECIFIC shoe from URL parameter "id"
// This shows ONLY the shoe that was clicked from shop.html
function loadShoeFromURL() {
  const params = new URLSearchParams(window.location.search);
  const shoeId = parseInt(params.get('id'));
  
  console.log("Loading specific shoe with ID:", shoeId);
  
  if (isNaN(shoeId)) {
    // If no ID provided, default to first shoe but show warning
    currentShoe = shoesDatabase[0];
    showToastMessage("No shoe specified, showing featured sneaker", false);
  } else {
    const found = shoesDatabase.find(s => s.id === shoeId);
    if (found) {
      currentShoe = found;
      showToastMessage(`✓ Loaded: ${currentShoe.name}`, false);
    } else {
      currentShoe = shoesDatabase[0];
      showToastMessage("Shoe not found, showing default", true);
    }
  }
  
  // Update DOM with the specific shoe's details
  document.getElementById('shoeImage').src = currentShoe.image;
  document.getElementById('shoeName').innerText = currentShoe.name;
  document.getElementById('shoeBrand').innerHTML = `<i class="fas fa-tag"></i> ${currentShoe.brand}`;
  document.getElementById('shoeDescription').innerText = currentShoe.description;
  document.getElementById('shoePrice').innerHTML = `$${currentShoe.price} <span style="font-size:0.8rem; opacity:0.6;">USD</span>`;
  
  // Reset size selection for the new shoe
  selectedSize = null;
  const infoSpan = document.getElementById('selectedSizeInfo');
  if (infoSpan) infoSpan.innerHTML = `<i class="fas fa-shoe-prints"></i> No size selected`;
  renderSizeButtons();
}

// ============================================
// CART SYSTEM - Saves to localStorage for shop.html to read
// This ensures when you click "Add to Cart" on this preview page,
// the item is added to the cart that shop.html will display
// ============================================
let cart = JSON.parse(localStorage.getItem('sneaker_cart')) || [];

function saveCart() {
  localStorage.setItem('sneaker_cart', JSON.stringify(cart));
  // Dispatch a custom event so shop.html can listen for real-time updates
  window.dispatchEvent(new CustomEvent('cartUpdated', { detail: cart }));
}

function addToCart() {
  if (!currentShoe) {
    showToastMessage('Error loading shoe', true);
    return;
  }
  
  if (!selectedSize) {
    showToastMessage('❌ Please select a size before adding to cart', true);
    return;
  }
  
  // Check if item with same ID and size already exists
  const existingIndex = cart.findIndex(item => item.id === currentShoe.id && item.size === selectedSize);
  
  if (existingIndex !== -1) {
    cart[existingIndex].quantity += 1;
    showToastMessage(`🛒 Added another ${currentShoe.name} (${selectedSize}) to cart`, false);
  } else {
    const cartItem = {
      id: currentShoe.id,
      name: currentShoe.name,
      brand: currentShoe.brand,
      price: currentShoe.price,
      size: selectedSize,
      image: currentShoe.image,
      quantity: 1
    };
    cart.push(cartItem);
    showToastMessage(`✓ ${currentShoe.name} (${selectedSize}) added to cart`, false);
  }
  
  saveCart();
  
  // Visual feedback on button
  const btn = document.getElementById('addToCartBtn');
  const originalText = btn.innerHTML;
  btn.innerHTML = '<i class="fas fa-check"></i> ADDED!';
  setTimeout(() => {
    btn.innerHTML = originalText;
  }, 1200);
}

// 3D TILT EFFECT for the shoe image - interactive rotation
function setup3DTiltEffect() {
  const img = document.getElementById('shoeImage');
  const wrapper = document.getElementById('imageWrapper');
  if (!img || !wrapper) return;
  
  let targetX = 0, targetY = 0;
  let currentX = 0, currentY = 0;
  
  wrapper.addEventListener('mousemove', (e) => {
    const rect = wrapper.getBoundingClientRect();
    const width = rect.width;
    const height = rect.height;
    
    // Calculate mouse position relative to the image center (-1 to 1 range)
    const mouseX = ((e.clientX - rect.left) / width) * 2 - 1;
    const mouseY = ((e.clientY - rect.top) / height) * 2 - 1;
    
    // Limit rotation amount (max 15 degrees)
    targetX = mouseY * -12;
    targetY = mouseX * 12;
  });
  
  wrapper.addEventListener('mouseleave', () => {
    targetX = 0;
    targetY = 0;
  });
  
  // Smooth animation loop for tilt
  function animateTilt() {
    currentX += (targetX - currentX) * 0.1;
    currentY += (targetY - currentY) * 0.1;
    img.style.transform = `rotateX(${currentX}deg) rotateY(${currentY}deg) scale(1.02)`;
    requestAnimationFrame(animateTilt);
  }
  animateTilt();
}

// Background particles generator
function generateBackgroundParticles() {
  const container = document.getElementById('particleField');
  if (!container) return;
  for (let i = 0; i < 70; i++) {
    const p = document.createElement('div');
    p.classList.add('particle');
    const size = 2 + Math.random() * 24;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.left = Math.random() * 100 + '%';
    p.style.top = Math.random() * 100 + '%';
    p.style.animationDuration = 12 + Math.random() * 28 + 's';
    p.style.animationDelay = Math.random() * 12 + 's';
    container.appendChild(p);
  }
}

// Initialize everything
document.addEventListener('DOMContentLoaded', () => {
  // Load the specific shoe from URL parameter (the one clicked from shop.html)
  loadShoeFromURL();
  renderSizeButtons();
  generateBackgroundParticles();
  setup3DTiltEffect();
  
  const addBtn = document.getElementById('addToCartBtn');
  if (addBtn) addBtn.addEventListener('click', addToCart);
});

// Listen for browser back/forward navigation to keep shoe ID in sync
window.addEventListener('popstate', () => {
  const params = new URLSearchParams(window.location.search);
  const shoeId = parseInt(params.get('id'));
  const foundShoe = shoesDatabase.find(s => s.id === shoeId);
  if (foundShoe && foundShoe.id !== currentShoe?.id) {
    currentShoe = foundShoe;
    document.getElementById('shoeImage').src = currentShoe.image;
    document.getElementById('shoeName').innerText = currentShoe.name;
    document.getElementById('shoeBrand').innerHTML = `<i class="fas fa-tag"></i> ${currentShoe.brand}`;
    document.getElementById('shoeDescription').innerText = currentShoe.description;
    document.getElementById('shoePrice').innerHTML = `$${currentShoe.price} <span style="font-size:0.8rem; opacity:0.6;">USD</span>`;
    selectedSize = null;
    const infoSpan = document.getElementById('selectedSizeInfo');
    if (infoSpan) infoSpan.innerHTML = `<i class="fas fa-shoe-prints"></i> No size selected`;
    renderSizeButtons();
    showToastMessage(`Loaded: ${currentShoe.name}`, false);
  }
});
</script>
</body>
</html>
