    .worm-text {

      background-clip: text;
      color: transparent;
      animation: gradientFlow 3s ease infinite;
      transform-origin: center bottom;
      will-change: transform, opacity, filter;
    }
    @keyframes gradientFlow {

      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

  const searchInput = document.getElementById("searchInput");
  const filterContainer = document.getElementById("filterContainer");
  
  function showToast(msg, duration = 3000) { const t=document.getElementById("toastMsg"); t.innerText=msg; t.style.display="block"; setTimeout(()=>t.style.display="none",duration); }
  function getFilteredModels() {
    let f = [...sneakerData];
    if(currentFilter!=="all") f=f.filter(m=>m.brand===currentFilter);
    if(searchQuery.trim()){ const q=searchQuery.toLowerCase(); f=f.filter(m=>m.name.toLowerCase().includes(q)||m.brand.toLowerCase().includes(q)); }
    if(currentView==="models" && selectedBrand) f=f.filter(m=>m.brand===selectedBrand);
    return f;
  }
  function getBrandStats() { const s={}; sneakerData.forEach(b=>{ s[b.brand]=(s[b.brand]||0)+1; }); return s; }
  function renderBrands() {
    const stats=getBrandStats(), brands=[...new Set(sneakerData.map(s=>s.brand))];
    let html=`<div class="brand-grid">`;
    brands.forEach(b=>{ html+=`<div class="brand-card" data-brand="${b}"><div class="brand-icon"><i class="fas fa-shoe-prints"></i></div><div class="brand-name">${b.toUpperCase()}</div><div class="brand-count">${stats[b]} MODELS</div></div>`; });
    html+=`</div>`;
    dynamicContainer.innerHTML=html;
    document.querySelectorAll(".brand-card").forEach(c=>c.addEventListener("click",()=>{ selectedBrand=c.getAttribute("data-brand"); currentView="models"; renderModels(); gsap.fromTo(".model-grid",{opacity:0,y:30},{opacity:1,y:0,duration:0.6}); }));
    gsap.fromTo(".brand-card", { opacity:0, y:50, scale:0.95 }, { opacity:1, y:0, scale:1, stagger:0.08, duration:0.8, ease:"back.out(0.6)" });
  }
  function renderModels() {
    let models=getFilteredModels();
    if(selectedBrand && currentView==="models") models=models.filter(m=>m.brand===selectedBrand);
    if(models.length===0){ dynamicContainer.innerHTML=`<div style="text-align:center; padding:4rem;">NO SNEAKERS FOUND</div>`; return; }
    let html=`<div style="margin-bottom:1.5rem;"><button class="back-btn" id="globalBackBtn"><i class="fas fa-arrow-left"></i> BACK TO BRANDS</button></div><div class="model-grid">`;
    models.forEach(m=>{ html+=`<div class="model-card"><img class="model-img" src="${m.image}" loading="lazy" onerror="this.src='https://placehold.co/600x400/1a1a1a/444?text=SNEAKER'"><div class="model-info"><div class="model-name">${m.brand} • ${m.name}</div><div class="model-price">$${m.price}</div><div class="profit">📈 RESELL: ${m.profit}</div><div class="button-group"><button class="buy-btn" data-id="${m.id}">BUY NOW</button><a class="redirect-btn" href="${m.url}" target="_blank">OFFICIAL STORE →</a></div></div></div>`; });
    html+=`</div>`;
    dynamicContainer.innerHTML=html;
    document.querySelectorAll(".buy-btn").forEach(btn=>{ btn.addEventListener("click",(e)=>{ const p=sneakerData.find(p=>p.id===parseInt(btn.getAttribute("data-id"))); if(p) openPurchaseModal(p); e.stopPropagation(); }); });
    document.getElementById("globalBackBtn")?.addEventListener("click",()=>{ currentView="brands"; selectedBrand=""; renderBrands(); gsap.fromTo(".brand-grid",{opacity:0,y:30},{opacity:1,y:0,duration:0.5}); });
  }
  function updateUIFromState() { if(currentView==="brands") renderBrands(); else renderModels(); document.querySelectorAll(".filter").forEach(btn=>{ if(btn.getAttribute("data-filter")===currentFilter) btn.classList.add("active"); else btn.classList.remove("active"); }); }
  function setupEvents() { searchInput.addEventListener("input",(e)=>{ searchQuery=e.target.value; if(currentView==="models") renderModels(); else renderBrands(); }); filterContainer.addEventListener("click",(e)=>{ const btn=e.target.closest(".filter"); if(btn){ currentFilter=btn.getAttribute("data-filter"); if(currentView==="models") renderModels(); else renderBrands(); updateUIFromState(); } }); }
  let currentProduct=null; const modal=document.getElementById("purchaseModal");
  function openPurchaseModal(p){ currentProduct=p; document.getElementById("modalProductInfo").innerText=`${p.brand} ${p.name} — $${p.price}`; modal.style.display="flex"; document.body.style.overflow="hidden"; }
  function closeModal(){ modal.style.display="none"; document.body.style.overflow=""; }
  document.querySelector(".close-modal")?.addEventListener("click",closeModal); window.addEventListener("click",(e)=>{ if(e.target===modal) closeModal(); });
  let selectedPayment="card"; document.querySelectorAll(".payment-opt").forEach(opt=>{ opt.addEventListener("click",()=>{ document.querySelectorAll(".payment-opt").forEach(o=>o.classList.remove("selected")); opt.classList.add("selected"); selectedPayment=opt.getAttribute("data-method"); }); });
  document.getElementById("submitPurchase")?.addEventListener("click",()=>{ const name=document.getElementById("fullName").value.trim(), email=document.getElementById("emailAddr").value.trim(), addr=document.getElementById("addressLine").value.trim(); if(!name||!email||!addr) showToast("❌ Please fill all fields",2000); else if(currentProduct){ showToast(`✅ ORDER PLACED! ${currentProduct.name} (${selectedPayment.toUpperCase()})`,4000); closeModal(); document.getElementById("fullName").value=""; document.getElementById("emailAddr").value=""; document.getElementById("addressLine").value=""; } });
  
  let musicPlaying=false; const music=document.getElementById("shoppingMusic"), musicBtn=document.getElementById("musicControl");
  function initMusic(){ music.volume=0.5; musicBtn.addEventListener("click",()=>{ if(musicPlaying){ music.pause(); musicPlaying=false; musicBtn.style.background="rgba(0,0,0,0.8)"; musicBtn.style.color="#e63946"; } else { music.play().catch(()=>{}); musicPlaying=true; musicBtn.style.background="#e63946"; musicBtn.style.color="white"; } }); document.body.addEventListener("click",()=>{ if(!musicPlaying && music.paused){ music.play().then(()=>{ musicPlaying=true; musicBtn.style.background="#e63946"; musicBtn.style.color="white"; }).catch(()=>{}); } },{ once:true }); }
  
  // WORM LETTER ANIMATION + DISINTEGRATION
  let wormAnimationActive = true;
  let wormInterval;
  
  function startWormAnimation() {
    const letters = document.querySelectorAll('.worm-letter');
    letters.forEach((letter, index) => {
      // Staggered wave animation - each letter moves like a worm segment
      gsap.to(letter, {
        duration: 0.6,
        y: -12,
        rotationX: 15,
        rotationZ: index % 2 === 0 ? 5 : -5,
        scale: 1.1,
        repeat: -1,
        yoyo: true,
        ease: "sine.inOut",
        delay: index * 0.05,
        repeatDelay: 0.1
      });
      gsap.to(letter, {
        duration: 0.4,
        opacity: 0.7,
        repeat: -1,
        yoyo: true,
        ease: "sine.inOut",
        delay: index * 0.07
      });
    });
  }
  
  function disintegrateLetters() {
    const container = document.getElementById("wormText");
    const letters = document.querySelectorAll('.worm-letter');
    const rect = container.getBoundingClientRect();
    
    letters.forEach((letter, idx) => {
      const letterRect = letter.getBoundingClientRect();
      const centerX = letterRect.left + letterRect.width / 2;
      const centerY = letterRect.top + letterRect.height / 2;
      
      // Create 6-10 particles per letter
      const particleCount = 8 + Math.floor(Math.random() * 8);
      for(let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.className = 'disintegration-particle';
        particle.style.position = 'fixed';
        particle.style.left = centerX + 'px';
        particle.style.top = centerY + 'px';
        particle.style.width = (3 + Math.random() * 6) + 'px';
        particle.style.height = (3 + Math.random() * 6) + 'px';
        particle.style.background = `radial-gradient(circle, #e63946, #ffb347)`;
        document.body.appendChild(particle);
        
        const angle = Math.random() * Math.PI * 2;
        const distance = 80 + Math.random() * 150;
        const rotation = Math.random() * 360;
        
        gsap.to(particle, {
          duration: 0.8 + Math.random() * 0.5,
          x: Math.cos(angle) * distance,
          y: Math.sin(angle) * distance,
          rotation: rotation,
          opacity: 0,
          scale: 0,
          ease: "power2.out",
          onComplete: () => particle.remove()
        });
      }
      
      // Fade and scale down the letter
      gsap.to(letter, {
        duration: 0.5,
        opacity: 0,
        scale: 0,
        filter: "blur(8px)",
        ease: "back.in(1.2)",
        delay: idx * 0.03
      });
    });
  }
  
  function initWormLogo() {
    const text = "SNEAKER HYPE";
    const container = document.getElementById("wormText");
    container.innerHTML = '';
    for(let i = 0; i < text.length; i++) {
      const span = document.createElement('span');
      span.className = 'worm-letter';
      span.textContent = text[i];
      span.style.animationDelay = `${i * 0.08}s`;
      container.appendChild(span);
    }
    startWormAnimation();
  }
  
  // Loading progression
  let loadPercent = 0;
  const progressFill = document.getElementById("resnProgressFill");
  const percentSpan = document.getElementById("resnPercent");
  const loaderMsg = document.getElementById("loaderMessage");
  const loadingScreenDiv = document.getElementById("loadingScreen");
  const msgCycle = ["🐛 WORM DANCE", "🪱 LETTERS WAVING", "🌀 SNAKE MOTION", "💫 ALMOST THERE", "✨ DISINTEGRATION SOON"];
  let msgIndex = 0;
  
  const msgInterval = setInterval(() => {
    if(loadPercent < 100) {
      msgIndex = (msgIndex + 1) % msgCycle.length;
      loaderMsg.innerText = msgCycle[msgIndex];
    }
  }, 500);
  
  const loadInterval = setInterval(() => {
    let inc = Math.floor(Math.random() * 6) + 2;
    loadPercent = Math.min(loadPercent + inc, 100);
    progressFill.style.width = loadPercent + "%";
    percentSpan.innerText = loadPercent + "%";
    
    if(loadPercent >= 100) {
      clearInterval(loadInterval);
      clearInterval(msgInterval);
      loaderMsg.innerText = "💥 DISINTEGRATING LOGO 💥";
      
      // Stop worm animation and disintegrate
      disintegrateLetters();
      
      // Fade out progress section
      gsap.to("#loaderProgressSection", { duration: 0.6, opacity: 0 });
      gsap.to(".loader-message", { duration: 0.6, opacity: 0 });
      
      setTimeout(() => {
        loadingScreenDiv.style.opacity = "0";
        setTimeout(() => {
          loadingScreenDiv.style.display = "none";
          gsap.to(".main-container", { opacity: 1, duration: 1.2 });
          if(window.triggerTitleAnimation) window.triggerTitleAnimation();
          initCursorTracking();
        }, 900);
      }, 700);
    }
  }, 45);
  
  // Interactive cursor tracking for center logo
  function initCursorTracking() {
    const logoWrapper = document.getElementById("logo3dWrapper");
    const container = document.getElementById("centerLogo");
    if(!logoWrapper || !container) return;
    
    let targetRotateX = 0, targetRotateY = 0;
    let currentRotateX = 0, currentRotateY = 0;
    
    document.addEventListener("mousemove", (e) => {
      const rect = container.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      const deltaX = (e.clientX - centerX) / (rect.width / 2);
      const deltaY = (e.clientY - centerY) / (rect.height / 2);
      targetRotateY = deltaX * 15;
      targetRotateX = -deltaY * 15;
    });
    
    function animate() {
      currentRotateX += (targetRotateX - currentRotateX) * 0.12;
      currentRotateY += (targetRotateY - currentRotateY) * 0.12;
      logoWrapper.style.transform = `rotateX(${currentRotateX}deg) rotateY(${currentRotateY}deg) scale(1)`;
      requestAnimationFrame(animate);
    }
    animate();
    
    container.addEventListener("mouseenter", () => {
      gsap.to(logoWrapper, { duration: 0.3, scale: 1.05, ease: "back.out(0.5)" });
    });
    container.addEventListener("mouseleave", () => {
      targetRotateX = 0;
      targetRotateY = 0;
      gsap.to(logoWrapper, { duration: 0.5, scale: 1, ease: "elastic.out(1, 0.5)" });
    });
  }
  
  // Title split animation
  window.triggerTitleAnimation = () => {
    const el = document.getElementById('heroTitle');
    const txt = el.innerText;
    el.innerHTML = '';
    txt.split('').forEach((ch, i) => {
      const span = document.createElement('span');
      span.className = 'char';
      span.textContent = ch === ' ' ? '\u00A0' : ch;
      el.appendChild(span);
    });
    gsap.fromTo('.hero-title .char', 
      { opacity: 0, y: 80, filter: 'blur(8px)' },
      { opacity: 1, y: 0, filter: 'blur(0px)', duration: 0.9, stagger: 0.05, ease: "back.out(1.2)", delay: 0.2 }
    );
    gsap.to('.hero-sub', { opacity: 0.4, y: 0, duration: 1, delay: 0.8 });
    
    const logoContainer = document.getElementById("movingLogoContainer");
    if(logoContainer) {
      const texts = ["SNEAKER HYPE", "RARE KICKS", "LIMITED EDITION", "STREETWEAR", "HYPEBEAST", "COLLECTOR"];
      for(let i = 0; i < 12; i++) {
        const orb = document.createElement("div");
        orb.className = "orbiting-logo";
        orb.textContent = texts[i % texts.length];
        orb.style.left = (5 + Math.random() * 90) + "%";
        orb.style.top = (5 + Math.random() * 90) + "%";
        orb.style.animationDuration = (4 + Math.random() * 4) + "s";
        orb.style.animationDelay = (Math.random() * 2) + "s";
        logoContainer.appendChild(orb);
      }
    }
  };
  
  // Initialize worm logo
  initWormLogo();
  
  // Cursor and scroll effects
  const cursorDot = document.querySelector(".cursor-dot"), cursorOutline = document.querySelector(".cursor-outline");
  document.addEventListener("mousemove", (e) => {
    cursorDot.style.transform = `translate(${e.clientX - 2}px, ${e.clientY - 2}px)`;
    cursorOutline.style.transform = `translate(${e.clientX}px, ${e.clientY}px) translate(-50%, -50%)`;
  });
  document.addEventListener("mouseleave", () => { cursorDot.style.opacity = "0"; cursorOutline.style.opacity = "0"; });
  document.addEventListener("mouseenter", () => { cursorDot.style.opacity = "1"; cursorOutline.style.opacity = "1"; });
  
  window.addEventListener("scroll", () => {
    const nav = document.getElementById("nav");
    if(window.scrollY > 50) nav.classList.add("scrolled");
    else nav.classList.remove("scrolled");
  });
  
  ScrollTrigger.create({ trigger: ".main-container", start: "top 80%", onEnter: () => gsap.to(".main-container", { opacity: 1, duration: 1 }) });
  document.getElementById("scrollHint")?.addEventListener("click", () => window.scrollTo({ top: window.innerHeight, behavior: "smooth" }));
  
  function init() {
    setupEvents();
    renderBrands();
    currentView = "brands";
    updateUIFromState();
    initMusic();
    document.querySelector('.payment-opt[data-method="card"]')?.classList.add("selected");
    selectedPayment = "card";
  }
  init();
</script>
</body>
</html>
