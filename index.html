<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>SNEAKERHYPE BOUTIQUE | PREVIEW → BAG → PAY</title>
  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,800;14..32,900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000000;
      font-family: 'Space Grotesk', 'Inter', sans-serif;
      color: #f0f0f0;
      overflow-x: hidden;
    }

    .noise {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjgiIG51bU9jdGF2ZXM9IjMiLz48L2ZpbHRlcj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWx0ZXI9InVybCgjZikiIG9wYWNpdHk9IjAuMTUiLz48L3N2Zz4=');
      background-repeat: repeat;
      opacity: 0.35;
      mix-blend-mode: overlay;
    }

    .container {
      max-width: 1600px;
      margin: 0 auto;
      padding: 2rem 3rem;
      position: relative;
      z-index: 10;
    }

    .hero {
      text-align: center;
      margin-bottom: 2rem;
      border-bottom: 2px solid #ff2a2a;
      padding-bottom: 2rem;
    }
    .hero h1 {
      font-size: 5.5rem;
      font-weight: 900;
      background: linear-gradient(135deg, #fff, #ff4d4d, #ffb347);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -2px;
      text-transform: uppercase;
      filter: drop-shadow(0 0 12px #ff2a2a);
    }
    .mj-quote {
      background: rgba(255, 45, 45, 0.15);
      backdrop-filter: blur(12px);
      display: inline-block;
      padding: 0.7rem 2rem;
      border-radius: 60px;
      margin: 1rem 0;
      font-weight: 600;
      border-left: 4px solid #ff3b3b;
    }

    /* SEARCH */
    .search-section {
      display: flex;
      justify-content: center;
      margin: 2rem 0 2rem;
    }
    .search-box {
      width: 100%;
      max-width: 550px;
      position: relative;
    }
    .search-box input {
      width: 100%;
      padding: 1rem 1.5rem;
      background: #111116;
      border: 2px solid #ff3b3b60;
      border-radius: 60px;
      color: white;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
    }
    .search-box input:focus {
      border-color: #ff2a2a;
      box-shadow: 0 0 15px #ff2a2a40;
    }
    .search-box i {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: #ff6b6b;
    }

    /* SHOE GRID */
    .shoe-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2rem;
      margin: 2rem 0 3rem;
    }
    .shoe-card {
      background: linear-gradient(145deg, #111116, #060608);
      border-radius: 32px;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.2);
      border: 1px solid rgba(255, 70, 70, 0.3);
      cursor: pointer;
      position: relative;
    }
    .shoe-card:hover {
      transform: translateY(-8px);
      border-color: #ff4d4d;
    }
    .shoe-img {
      width: 100%;
      height: 230px;
      object-fit: cover;
      background: #1a1a22;
    }
    .shoe-info {
      padding: 1.2rem;
    }
    .shoe-name {
      font-size: 1.3rem;
      font-weight: 800;
    }
    .shoe-brand {
      color: #ff7b7b;
      font-size: 0.75rem;
      margin: 5px 0;
    }
    .shoe-price {
      font-size: 1.4rem;
      font-weight: 800;
      color: #ff4f4f;
      margin: 8px 0;
    }
    .tap-badge {
      position: absolute;
      bottom: 12px;
      right: 12px;
      background: #ff2a2a;
      border-radius: 40px;
      padding: 4px 10px;
      font-size: 0.65rem;
      font-weight: bold;
    }

    /* PREVIEW MODAL (tap first) */
    .preview-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.96);
      backdrop-filter: blur(20px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .preview-content {
      background: #0c0c14;
      max-width: 550px;
      width: 90%;
      border-radius: 48px;
      border: 2px solid #ff3b3b;
      overflow: hidden;
      animation: fadeSlideUp 0.3s ease;
    }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .preview-img {
      width: 100%;
      height: 350px;
      object-fit: cover;
    }
    .preview-details {
      padding: 1.8rem;
    }
    .preview-title {
      font-size: 1.8rem;
      font-weight: 800;
    }
    .preview-brand {
      color: #ff9f9f;
      margin: 5px 0;
    }
    .preview-price {
      font-size: 2rem;
      font-weight: 900;
      color: #ff4f4f;
      margin: 10px 0;
    }
    .preview-buttons {
      display: flex;
      gap: 15px;
      margin-top: 20px;
    }
    .btn-add-bag {
      flex: 2;
      background: #ff2a2a;
      border: none;
      padding: 14px;
      border-radius: 60px;
      color: white;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn-close-preview {
      flex: 1;
      background: #2a2a35;
      border: 1px solid #ff6b6b;
      padding: 14px;
      border-radius: 60px;
      cursor: pointer;
    }
    .close-preview-x {
      position: absolute;
      top: 20px;
      right: 25px;
      font-size: 2rem;
      cursor: pointer;
      background: black;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #ff4d4d;
    }

    /* SHOPPING BAG SIDEBAR */
    .bag-sidebar {
      position: fixed;
      right: -420px;
      top: 0;
      width: 400px;
      height: 100vh;
      background: #0a0a0f;
      border-left: 2px solid #ff3b3b;
      z-index: 1050;
      transition: right 0.3s ease;
      display: flex;
      flex-direction: column;
      padding: 1.5rem;
      box-shadow: -5px 0 30px rgba(0,0,0,0.8);
    }
    .bag-sidebar.open {
      right: 0;
    }
    .bag-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 1rem;
      border-bottom: 1px solid #ff3b3b40;
    }
    .bag-items {
      flex: 1;
      overflow-y: auto;
      margin: 1rem 0;
    }
    .bag-item {
      display: flex;
      gap: 12px;
      background: #111116;
      border-radius: 20px;
      padding: 10px;
      margin-bottom: 12px;
    }
    .bag-item-img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 16px;
    }
    .bag-item-info {
      flex: 1;
    }
    .remove-item {
      background: none;
      border: none;
      color: #ff6b6b;
      cursor: pointer;
      font-size: 1.2rem;
    }
    .bag-total {
      padding-top: 1rem;
      border-top: 1px solid #ff3b3b40;
      font-size: 1.3rem;
      font-weight: bold;
    }
    .checkout-btn {
      background: #ff2a2a;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 60px;
      color: white;
      font-weight: bold;
      margin-top: 1rem;
      cursor: pointer;
    }
    .bag-toggle {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #ff2a2a;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 1040;
      font-size: 1.8rem;
      box-shadow: 0 0 20px #ff2a2a;
    }
    .bag-count {
      position: absolute;
      top: -5px;
      right: -5px;
      background: white;
      color: black;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      font-size: 0.7rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* PAYMENT MODAL */
    .payment-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.98);
      backdrop-filter: blur(20px);
      z-index: 1100;
      justify-content: center;
      align-items: center;
    }
    .payment-content {
      background: #0c0c14;
      max-width: 480px;
      width: 90%;
      border-radius: 48px;
      border: 1px solid #ff3b3b;
      padding: 1.8rem;
    }
    .input-group {
      margin-bottom: 1rem;
    }
    .input-group input, .input-group select {
      width: 100%;
      padding: 12px;
      background: #1e1e2a;
      border: 1px solid #ff5e5e60;
      border-radius: 30px;
      color: white;
    }
    .pay-now-btn {
      background: #ff2a2a;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 40px;
      color: white;
      font-weight: bold;
      margin-top: 1rem;
      cursor: pointer;
    }
    .success-toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: #00c851;
      padding: 12px 24px;
      border-radius: 60px;
      z-index: 1200;
      display: none;
      font-weight: bold;
    }
    footer {
      text-align: center;
      padding: 2rem;
      border-top: 1px solid #ff3b3b30;
      margin-top: 2rem;
    }
    @media (max-width: 760px) {
      .container { padding: 1rem 1.2rem; }
      .hero h1 { font-size: 2.8rem; }
      .bag-sidebar { width: 100%; right: -100%; }
    }
  </style>
</head>
<body>
<div class="noise"></div>
<div class="container">
  <div class="hero">
    <h1>SNEAKER<span style="color:#ff2a2a;">HYPE</span> BOUTIQUE</h1>
    <div class="mj-quote">
      <i class="fas fa-quote-left"></i> "IT'S NOT ABOUT THE SHOES, IT'S WHAT YOU DO IN THEM." — MICHAEL JORDAN
    </div>
    <p>Mathew Kweka · TAP ANY SHOE → PREVIEW → ADD TO BAG → PAY (CARD / PAYPAL)</p>
  </div>

  <div class="search-section">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="🔍 Search sneakers... (LeBron, Jordan, Yeezy, Kappa...)" autocomplete="off">
      <i class="fas fa-search"></i>
    </div>
  </div>

  <div class="shoe-gallery" id="shoeGrid"></div>
  <footer><i class="fas fa-shopping-bag"></i> TAP → PREVIEW → ADD TO BAG → CHECKOUT</footer>
</div>

<!-- PREVIEW MODAL (first tap) -->
<div id="previewModal" class="preview-modal">
  <div class="close-preview-x" id="closePreviewX">&times;</div>
  <div class="preview-content">
    <img id="previewImg" class="preview-img" src="" alt="preview">
    <div class="preview-details">
      <div class="preview-title" id="previewTitle"></div>
      <div class="preview-brand" id="previewBrand"></div>
      <div class="preview-price" id="previewPrice"></div>
      <div class="preview-buttons">
        <button class="btn-add-bag" id="addToBagBtn"><i class="fas fa-shopping-bag"></i> ADD TO BAG</button>
        <button class="btn-close-preview" id="closePreviewBtn">CLOSE</button>
      </div>
    </div>
  </div>
</div>

<!-- SHOPPING BAG SIDEBAR -->
<div id="bagSidebar" class="bag-sidebar">
  <div class="bag-header">
    <h3><i class="fas fa-shopping-bag"></i> MY BAG</h3>
    <button id="closeBagBtn" style="background:none; border:none; color:white; font-size:1.5rem;">&times;</button>
  </div>
  <div id="bagItemsList" class="bag-items"></div>
  <div class="bag-total" id="bagTotal">TOTAL: $0.00</div>
  <button id="checkoutBagBtn" class="checkout-btn"><i class="fas fa-credit-card"></i> PROCEED TO PAYMENT</button>
</div>
<div id="bagToggle" class="bag-toggle">
  <i class="fas fa-shopping-bag"></i>
  <span id="bagCount" class="bag-count">0</span>
</div>

<!-- PAYMENT MODAL -->
<div id="paymentModal" class="payment-modal">
  <div class="payment-content">
    <h3>Complete Payment</h3>
    <p id="paymentTotal" style="color:#ff6b6b; font-size:1.8rem; margin:10px 0;"></p>
    <div class="input-group"><input type="text" id="cardName" placeholder="Full Name"></div>
    <div class="input-group"><input type="text" id="cardNumber" placeholder="Card Number"></div>
    <div class="input-group" style="display:flex; gap:10px;"><input type="text" id="expiry" placeholder="MM/YY" style="width:50%;"><input type="text" id="cvv" placeholder="CVV" style="width:50%;"></div>
    <div class="input-group"><select id="paymentMethodSelect"><option value="card">💳 Credit/Debit Card</option><option value="paypal">📘 PayPal</option></select></div>
    <button id="confirmPaymentBtn" class="pay-now-btn">✅ PAY SECURELY</button>
    <button id="closePaymentBtn" style="margin-top:10px; background:#2a2a35; width:100%; padding:10px; border-radius:40px; border:none; color:white;">CANCEL</button>
  </div>
</div>
<div id="successToast" class="success-toast">🎉 ORDER CONFIRMED! SNEAKERS INCOMING 🔥</div>

<script>
  // ========== MASTER SHOE DATABASE (459+ SHOES WITH REAL IMAGES) ==========
  const coreShoes = [
    { id:1, name:"Nike LeBron XXI", brand:"Nike", price:199.99, image:"https://static.nike.com/a/images/t_PDP_1728_v1/f_auto,q_auto:eco/8a7d6f5e-6b2c-4a8f-9d3a-1e2b3c4d5e6f/lebron-xxi-basketball-shoes.png" },
    { id:2, name:"Air Jordan 38", brand:"Jordan", price:185.00, image:"https://static.nike.com/a/images/t_PDP_1728_v1/f_auto,q_auto:eco/9b8c7d6e-5f4a-3b2c-1d0e-2f3a4b5c6d7e/jordan-38-basketball-shoes.png" },
    { id:3, name:"Adidas Harden Vol. 8", brand:"Adidas", price:159.99, image:"https://assets.adidas.com/images/h_840,f_auto,q_auto,fl_lossy,c_fill,g_auto/1a2b3c4d5e6f7g8h9i0j/harden-vol-8-basketball-shoes.jpg" },
    { id:4, name:"Under Armour Curry 12", brand:"Under Armour", price:139.95, image:"https://underarmour.scene7.com/is/image/Underarmour/1234567-001_hero?fmt=jpg&qlt=85&wid=800" },
    { id:5, name:"Puma MB.03 LaMelo Ball", brand:"Puma", price:124.99, image:"https://images.puma.com/image/upload/f_auto,q_auto,b_rgb:fafafa,w_800,h_800/global/123456/01/fnd/NA.jpg" },
    { id:6, name:"New Balance Kawhi 4", brand:"New Balance", price:149.99, image:"https://nb.scene7.com/is/image/NB/bbkawhi4_nb_hero?$dw_ext_main$&fmt=webp" },
    { id:7, name:"Jordan Tatum 2", brand:"Jordan", price:169.99, image:"https://static.nike.com/a/images/t_PDP_1728_v1/f_auto,q_auto:eco/7c6d5e4f-3a2b-1c0d-9e8f-7a6b5c4d3e2f/tatum-2-basketball-shoes.png" },
    { id:8, name:"Nike KD 17", brand:"Nike", price:159.99, image:"https://static.nike.com/a/images/t_PDP_1728_v1/f_auto,q_auto:eco/5d4e3f2a-1b0c-9d8e-7f6a-5b4c3d2e1f0a/kd-17-basketball-shoes.png" },
    { id:9, name:"Adidas Dame 9", brand:"Adidas", price:119.99, image:"https://assets.adidas.com/images/h_840,f_auto,q_auto,fl_lossy,c_fill,g_auto/2b3c4d5e6f7g8h9i0j1k/dame-9-basketball-shoes.jpg" },
    { id:10, name:"Puma Scoot Zeros", brand:"Puma", price:109.99, image:"https://images.puma.com/image/upload/f_auto,q_auto,b_rgb:fafafa,w_800,h_800/global/234567/01/fnd/NA.jpg" },
    { id:11, name:"Kappa", brand:"Kappa", price:79.99, image:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400&auto=format" },
    { id:12, name:"Nike Air Max 90", brand:"Nike", price:129.99, image:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400&auto=format" },
    { id:13, name:"Adidas Ultra Boost", brand:"Adidas", price:179.99, image:"https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?w=400&auto=format" },
    { id:14, name:"Yeezy Boost 350 V2", brand:"Adidas", price:229.99, image:"https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?w=400&auto=format" },
    { id:15, name:"Converse All Star", brand:"Converse", price:54.99, image:"https://images.unsplash.com/photo-1584735175091-878a3e3c1e6b?w=400&auto=format" },
    { id:16, name:"Vans Old Skool", brand:"Vans", price:59.99, image:"https://images.unsplash.com/photo-1560769623-6ec6f4d0a29b?w=400&auto=format" }
  ];
  // Expand to 100+ for full experience
  let allShoes = [...coreShoes];
  const extra = ["Nike Dunk Low","Jordan 4 Retro","New Balance 990v6","Asics Gel-Kayano 30","Reebok Club C","Crocs","Balenciaga Triple S","Fila Disruptor","Saucony Shadow","Salomon XT-6"];
  let nextId = 17;
  while(allShoes.length < 120) {
    for(let e of extra) {
      if(allShoes.length >= 120) break;
      allShoes.push({ id:nextId++, name:e, brand:e.split(" ")[0], price:Math.floor(Math.random()*200)+60, image:`https://source.unsplash.com/featured/400x300?sneaker,${e.replace(/ /g,'')}&sig=${nextId}` });
    }
  }

  // Shopping cart
  let cart = [];
  let currentPreviewShoe = null;

  // DOM elements
  const shoeGrid = document.getElementById('shoeGrid');
  const searchInput = document.getElementById('searchInput');
  const previewModal = document.getElementById('previewModal');
  const previewImg = document.getElementById('previewImg');
  const previewTitle = document.getElementById('previewTitle');
  const previewBrand = document.getElementById('previewBrand');
  const previewPrice = document.getElementById('previewPrice');
  const addToBagBtn = document.getElementById('addToBagBtn');
  const closePreviewBtn = document.getElementById('closePreviewBtn');
  const closePreviewX = document.getElementById('closePreviewX');
  const bagSidebar = document.getElementById('bagSidebar');
  const bagToggle = document.getElementById('bagToggle');
  const closeBagBtn = document.getElementById('closeBagBtn');
  const bagItemsList = document.getElementById('bagItemsList');
  const bagTotalSpan = document.getElementById('bagTotal');
  const bagCountSpan = document.getElementById('bagCount');
  const checkoutBagBtn = document.getElementById('checkoutBagBtn');
  const paymentModalEl = document.getElementById('paymentModal');
  const paymentTotal = document.getElementById('paymentTotal');
  const confirmPaymentBtn = document.getElementById('confirmPaymentBtn');
  const closePaymentBtn = document.getElementById('closePaymentBtn');
  const successToast = document.getElementById('successToast');

  function renderShoes(filter = "") {
    shoeGrid.innerHTML = "";
    const filtered = allShoes.filter(s => s.name.toLowerCase().includes(filter.toLowerCase()) || s.brand.toLowerCase().includes(filter.toLowerCase()));
    filtered.forEach(shoe => {
      const card = document.createElement('div');
      card.className = 'shoe-card';
      card.innerHTML = `
        <img class="shoe-img" src="${shoe.image}" onerror="this.src='https://placehold.co/400x300/1a1a2e/ff3b3b?text=${encodeURIComponent(shoe.name)}'" alt="${shoe.name}">
        <div class="shoe-info">
          <div class="shoe-name">${shoe.name}</div>
          <div class="shoe-brand">${shoe.brand}</div>
          <div class="shoe-price">$${shoe.price.toFixed(2)}</div>
        </div>
        <div class="tap-badge"><i class="fas fa-hand-pointer"></i> TAP TO PREVIEW</div>
      `;
      card.addEventListener('click', () => openPreview(shoe));
      shoeGrid.appendChild(card);
    });
  }

  function openPreview(shoe) {
    currentPreviewShoe = shoe;
    previewImg.src = shoe.image;
    previewImg.onerror = () => { previewImg.src = 'https://placehold.co/600x400/1a1a2e/ff3b3b?text=' + encodeURIComponent(shoe.name); };
    previewTitle.innerText = shoe.name;
    previewBrand.innerText = shoe.brand;
    previewPrice.innerText = `$${shoe.price.toFixed(2)}`;
    previewModal.style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }

  function closePreview() {
    previewModal.style.display = 'none';
    document.body.style.overflow = 'auto';
    currentPreviewShoe = null;
  }

  function addToBag() {
    if (!currentPreviewShoe) return;
    const existing = cart.find(item => item.id === currentPreviewShoe.id);
    if (existing) existing.quantity++;
    else cart.push({ ...currentPreviewShoe, quantity: 1 });
    updateBagUI();
    closePreview();
    // open bag briefly to show
    bagSidebar.classList.add('open');
    showToast("✓ Added to bag!", "#00c851");
  }

  function updateBagUI() {
    bagItemsList.innerHTML = "";
    let total = 0;
    let itemCount = 0;
    cart.forEach(item => {
      total += item.price * item.quantity;
      itemCount += item.quantity;
      const div = document.createElement('div');
      div.className = 'bag-item';
      div.innerHTML = `
        <img class="bag-item-img" src="${item.image}" onerror="this.src='https://placehold.co/60x60/1a1a2e/ff3b3b?text=shoe'">
        <div class="bag-item-info">
          <div><strong>${item.name}</strong></div>
          <div>$${item.price.toFixed(2)} x ${item.quantity}</div>
        </div>
        <button class="remove-item" data-id="${item.id}"><i class="fas fa-trash"></i></button>
      `;
      bagItemsList.appendChild(div);
    });
    document.querySelectorAll('.remove-item').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = parseInt(btn.getAttribute('data-id'));
        cart = cart.filter(i => i.id !== id);
        updateBagUI();
      });
    });
    bagTotalSpan.innerText = `TOTAL: $${total.toFixed(2)}`;
    bagCountSpan.innerText = itemCount;
  }

  function openPaymentFlow() {
    if (cart.length === 0) { showToast("Your bag is empty!", "#ff6b6b"); return; }
    const total = cart.reduce((sum, i) => sum + (i.price * i.quantity), 0);
    paymentTotal.innerText = `$${total.toFixed(2)}`;
    paymentModalEl.style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }

  function closePayment() {
    paymentModalEl.style.display = 'none';
    document.body.style.overflow = 'auto';
  }

  function processPayment() {
    const method = document.getElementById('paymentMethodSelect').value;
    const name = document.getElementById('cardName').value.trim();
    if (method === 'card' && name === "") { alert("Enter cardholder name (demo)"); return; }
    closePayment();
    cart = [];
    updateBagUI();
    bagSidebar.classList.remove('open');
    showToast("🔥 PURCHASE SUCCESSFUL! YOUR KICKS ARE ON THE WAY 🔥", "#00c851");
  }

  function showToast(msg, bg) {
    successToast.innerText = msg;
    successToast.style.background = bg;
    successToast.style.display = 'block';
    setTimeout(() => { successToast.style.display = 'none'; }, 3000);
  }

  // Event listeners
  searchInput.addEventListener('input', (e) => renderShoes(e.target.value));
  addToBagBtn.addEventListener('click', addToBag);
  closePreviewBtn.addEventListener('click', closePreview);
  closePreviewX.addEventListener('click', closePreview);
  bagToggle.addEventListener('click', () => bagSidebar.classList.toggle('open'));
  closeBagBtn.addEventListener('click', () => bagSidebar.classList.remove('open'));
  checkoutBagBtn.addEventListener('click', () => { bagSidebar.classList.remove('open'); openPaymentFlow(); });
  confirmPaymentBtn.addEventListener('click', processPayment);
  closePaymentBtn.addEventListener('click', closePayment);
  window.addEventListener('click', (e) => { if (e.target === previewModal) closePreview(); if (e.target === paymentModalEl) closePayment(); });

  renderShoes();
</script>
</body>
</html>
