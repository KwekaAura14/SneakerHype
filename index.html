<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ShoeVerse - Basketball Shoe Market</title>
<!-- Google Fonts for a modern look -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
  /* Reset & Basic Styles */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Orbitron', sans-serif;
    background-color: #0d0d0d;
    color: #eee;
  }

  /* Header */
  header {
    background-color: #111;
    padding: 30px 20px;
    text-align: center;
    color: #ff2a00;
  }

  header h1 {
    font-size: 3em;
    letter-spacing: 2px;
  }

  /* Showcase */
  .showcase {
    padding: 50px 20px;
    text-align: center;
    background: linear-gradient(135deg, #222, #000);
  }

  .showcase h2 {
    font-size: 2.5em;
    margin-bottom: 15px;
    color: #ff2a00;
  }

  .showcase p {
    font-size: 1.2em;
    margin-bottom: 25px;
  }

  /* Search Bar */
  .search-container {
    margin: 20px auto;
    max-width: 700px;
    display: flex;
  }

  .search-container input[type="text"] {
    flex: 1;
    padding: 15px 20px;
    font-size: 1em;
    border: none;
    border-radius: 5px 0 0 5px;
  }

  .search-container button {
    padding: 15px 25px;
    border: none;
    background-color: #ff2a00;
    color: #fff;
    font-size: 1em;
    border-radius: 0 5px 5px 0;
    cursor: pointer;
    transition: background-color 0.3s;
  }

  .search-container button:hover {
    background-color: #e62200;
  }

  /* Shoe Gallery */
  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
    padding: 30px 20px;
  }

  .shoe-card {
    background-color: #222;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 8px 16px rgba(0,0,0,0.5);
    transition: transform 0.3s, box-shadow 0.3s;
  }

  .shoe-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 12px 24px rgba(0,0,0,0.7);
  }

  .shoe-image {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-bottom: 2px solid #ff2a00;
  }

  .shoe-details {
    padding: 15px;
    text-align: center;
  }

  .shoe-name {
    font-size: 1.4em;
    margin-bottom: 10px;
    color: #fff;
  }

  .shoe-price {
    font-size: 1.2em;
    color: #ff2a00;
    margin-bottom: 15px;
  }

  .btn-preview {
    padding: 10px 20px;
    border: none;
    background-color: #ff2a00;
    color: #fff;
    border-radius: 5px;
    cursor: pointer;
    font-size: 1em;
    transition: background-color 0.2s;
  }

  .btn-preview:hover {
    background-color: #e62200;
  }

  /* Preview & Purchase */
  #previewSection {
    padding: 50px 20px;
    background-color: #111;
    display: none; /* Hidden initially */
  }

  .preview-title {
    text-align: center;
    font-size: 2.5em;
    margin-bottom: 25px;
    color: #ff2a00;
  }

  .preview-container {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .preview-image {
    max-width: 400px;
    width: 90%;
    border-radius: 15px;
    border: 3px solid #ff2a00;
    margin-bottom: 20px;
    box-shadow: 0 8px 16px rgba(0,0,0,0.8);
  }

  #buyButton {
    padding: 15px 30px;
    font-size: 1.2em;
    border: none;
    border-radius: 8px;
    background-color: #ff2a00;
    color: #fff;
    cursor: pointer;
    transition: background-color 0.3s;
  }

  #buyButton:hover {
    background-color: #e62200;
  }

  /* Payment Section */
  #paymentSection {
    display: none;
    padding: 50px 20px;
    background-color: #222;
  }

  .payment-title {
    text-align: center;
    font-size: 2.5em;
    margin-bottom: 25px;
    color: #ff2a00;
  }

  .payment-form {
    max-width: 400px;
    margin: 0 auto;
    background: #111;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 8px 16px rgba(0,0,0,0.8);
  }

  .payment-form input {
    width: 100%;
    padding: 15px;
    margin-bottom: 15px;
    border: none;
    border-radius: 8px;
    background-color: #333;
    color: #fff;
  }

  .payment-form button {
    width: 100%;
    padding: 15px;
    font-size: 1.2em;
    border: none;
    border-radius: 8px;
    background-color: #ff2a00;
    color: #fff;
    cursor: pointer;
    transition: background-color 0.3s;
  }

  .payment-form button:hover {
    background-color: #e62200;
  }

  /* Footer */
  footer {
    background-color: #111;
    text-align: center;
    padding: 25px 20px;
    font-size: 1em;
    color: #888;
    margin-top: 50px;
  }

  /* Responsive adjustments */
  @media(max-width: 768px){
    header h1 { font-size: 2em; }
    .showcase h2 { font-size: 2em; }
  }
</style>
</head>
<body>

<!-- Header -->
<header>
  <h1>ShoeVerse</h1>
</header>

<!-- Showcase -->
<section class="showcase">
  <h2>Unleash Your Basketball Style</h2>
  <p>Discover the toughest and coolest basketball shoes. Buy, sell, and showcase your game!</p>
</section>

<!-- Search -->
<div class="search-container">
  <input type="text" placeholder="Search for basketball shoes..." id="searchInput"/>
  <button onclick="filterShoes()">Search</button>
</div>

<!-- Shoes Gallery with Basketball Shoes -->
<section class="gallery" id="shoesGallery">
  <!-- Example Basketball Shoes -->
  <div class="shoe-card" data-name="Air Jordan 1 Retro">
    <img src="https://images.unsplash.com/photo-1603781573440-0b2f6b7a2e0a" alt="Air Jordan 1" class="shoe-image"/>
    <div class="shoe-details">
      <div class="shoe-name">Air Jordan 1 Retro</div>
      <div class="shoe-price">$250</div>
      <button class="btn-preview" onclick="showPreview('https://images.unsplash.com/photo-1603781573440-0b2f6b7a2e0a')">Preview</button>
    </div>
  </div>
  <div class="shoe-card" data-name="Nike LeBron 18">
    <img src="https://images.unsplash.com/photo-1603781573440-0b2f6b7a2e0a" alt="LeBron 18" class="shoe-image"/>
    <div class="shoe-details">
      <div class="shoe-name">Nike LeBron 18</div>
      <div class="shoe-price">$280</div>
      <button class="btn-preview" onclick="showPreview('https://images.unsplash.com/photo-1603781573440-0b2f6b7a2e0a')">Preview</button>
    </div>
  </div>
  <div class="shoe-card" data-name="Kobe AD NXT">
    <img src="https://images.unsplash.com/photo-1603781573440-0b2f6b7a2e0a" alt="Kobe AD" class="shoe-image"/>
    <div class="shoe-details">
      <div class="shoe-name">Kobe AD NXT</div>
      <div class="shoe-price">$230</div>
      <button class="btn-preview" onclick="showPreview('https://images.unsplash.com/photo-1603781573440-0b2f6b7a2e0a')">Preview</button>
    </div>
  </div>
  <!-- Add more shoes here -->
</section>

<!-- Shoe Preview & Purchase -->
<section id="previewSection">
  <div class="preview-title">Shoe Preview</div>
  <div class="preview-container">
    <img src="" alt="Shoe Preview" class="preview-image" id="previewImage"/>
  </div>
  <button id="buyButton" onclick="showPayment()">Buy Now</button>
</section>

<!-- Payment -->
<section id="paymentSection">
  <div class="payment-title">Complete Your Purchase</div>
  <form class="payment-form" id="paymentForm">
    <input type="text" placeholder="Full Name" required />
    <input type="email" placeholder="Email" required />
    <input type="text" placeholder="Card Number" required />
    <input type="text" placeholder="Expiration Date" required />
    <input type="number" placeholder="CVV" required />
    <button type="submit">Pay</button>
  </form>
</section>

<!-- Footer -->
<footer>
  &copy; 2024 ShoeVerse - Basketball Shoes. All rights reserved.
</footer>

<script>
  let selectedShoeImage = '';

  // Filter shoes based on search input
  function filterShoes() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    const shoes = document.querySelectorAll('.shoe-card');
    shoes.forEach(shoe => {
      const name = shoe.dataset.name.toLowerCase();
      if (name.includes(query)) {
        shoe.style.display = 'block';
      } else {
        shoe.style.display = 'none';
      }
    });
  }

  // Show preview of selected shoe
  function showPreview(imageUrl) {
    document.getElementById('previewImage').src = imageUrl;
    document.getElementById('previewSection').style.display = 'block';
    document.getElementById('buyButton').style.display = 'block';
    // Save the image URL for purchase
    selectedShoeImage = imageUrl;
  }

  // Show payment form
  function showPayment() {
    document.getElementById('paymentSection').style.display = 'block';
    document.getElementById('previewSection').style.display = 'none';
  }

  // Handle payment form submission
  document.getElementById('paymentForm').addEventListener('submit', function(e) {
    e.preventDefault();
    alert('Payment processing is simulated in this demo.');
    // Reset views
    document.getElementById('paymentSection').style.display = 'none';
    document.getElementById('previewSection').style.display = 'none';
    alert('Thank you for your purchase!');
  });
</script>
</body>
</html>
