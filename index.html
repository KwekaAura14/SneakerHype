<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Shoe Marketplace</title>
    <style>
        /* Basic Reset & Styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f2f5;
            color: #333;
        }

        /* Header */
        header {
            background-color: #222;
            padding: 20px;
            text-align: center;
            color: #fff;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        /* Showcase */
        .showcase {
            padding: 40px 20px;
            text-align: center;
            background: linear-gradient(135deg, #ece9e6, #ffffff);
        }

        .showcase h2 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .showcase p {
            font-size: 1.2em;
            margin-bottom: 20px;
        }

        /* Search Bar */
        .search-container {
            margin: 20px auto;
            max-width: 600px;
            display: flex;
        }

        .search-container input[type="text"] {
            flex: 1;
            padding: 12px 20px;
            font-size: 1em;
            border: 2px solid #ccc;
            border-radius: 4px 0 0 4px;
        }

        .search-container button {
            padding: 12px 20px;
            border: none;
            background-color: #222;
            color: #fff;
            font-size: 1em;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
        }

        /* Shoe Gallery */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .shoe-card {
            background-color: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .shoe-card:hover {
            transform: scale(1.02);
        }

        .shoe-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .shoe-details {
            padding: 15px;
        }

        .shoe-name {
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        .shoe-price {
            color: #e91e63;
            font-size: 1.1em;
            margin-bottom: 10px;
        }

        /* Preview & Purchase */
        .preview-section {
            padding: 40px 20px;
            background-color: #fff;
        }

        .preview-title {
            text-align: center;
            margin-bottom: 20px;
            font-size: 2em;
        }

        .preview-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .preview-image {
            max-width: 300px;
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* Payment Section */
        .payment-section {
            padding: 40px 20px;
            background-color: #f9f9f9;
        }

        .payment-title {
            text-align: center;
            margin-bottom: 20px;
            font-size: 2em;
        }

        /* Payment form */
        .payment-form {
            max-width: 400px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .payment-form input[type="text"],
        .payment-form input[type="number"],
        .payment-form input[type="email"] {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 15px;
            border: 2px solid #ccc;
            border-radius: 4px;
        }

        .payment-form button {
            width: 100%;
            padding: 15px;
            background-color: #222;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 1.2em;
            cursor: pointer;
        }

        /* Footer */
        footer {
            background-color: #222;
            color: #fff;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }

        /* Responsive adjustments */
        @media(max-width: 768px) {
            .showcase h2 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <h1>ShoeVerse</h1>
        <p>Your premier marketplace for buying and selling shoes</p>
    </header>

    <!-- Showcase -->
    <section class="showcase">
        <h2>Discover the Latest Shoes</h2>
        <p>Explore a wide variety of shoes from top brands. Buy, sell, and showcase your style!</p>
        <!-- Could add a carousel here for featured shoes -->
    </section>

    <!-- Search Bar -->
    <div class="search-container">
        <input type="text" placeholder="Search for shoes..."/>
        <button>Search</button>
    </div>

    <!-- Shoes Gallery -->
    <section class="gallery" id="shoesGallery">
        <!-- Example Shoe Card -->
        <div class="shoe-card">
            <img src="https://images.unsplash.com/photo-1603781573440-0b2f6b7a2e0a" alt="Sneaker" class="shoe-image"/>
            <div class="shoe-details">
                <div class="shoe-name">Sporty Sneaker</div>
                <div class="shoe-price">$120</div>
                <button onclick="showPreview('https://images.unsplash.com/photo-1603781573440-0b2f6b7a2e0a')">Preview</button>
            </div>
        </div>
        <!-- Add more shoe cards as needed -->
        <!-- You can dynamically generate these with JavaScript for more shoes -->
    </section>

    <!-- Preview Section -->
    <section class="preview-section" id="previewSection">
        <div class="preview-title">Shoe Preview</div>
        <div class="preview-container" id="previewContainer">
            <!-- Preview Image will appear here -->
        </div>
        <button style="display:none; margin:20px auto; padding:10px 20px; font-size:1em; cursor:pointer;" id="buyButton" onclick="showPayment()">Buy Now</button>
    </section>

    <!-- Payment System -->
    <section class="payment-section" id="paymentSection" style="display:none;">
        <div class="payment-title">Complete Your Purchase</div>
        <form class="payment-form" id="paymentForm">
            <input type="text" placeholder="Full Name" required />
            <input type="email" placeholder="Email" required />
            <input type="number" placeholder="Card Number" required />
            <input type="text" placeholder="Expiration Date" required />
            <input type="number" placeholder="CVV" required />
            <button type="submit">Pay</button>
        </form>
    </section>

    <!-- Footer -->
    <footer>
        &copy; 2024 ShoeVerse. All rights reserved.
    </footer>

    <script>
        // Function to show shoe preview
        function showPreview(imageUrl) {
            const previewContainer = document.getElementById('previewContainer');
            previewContainer.innerHTML = '<img src="' + imageUrl + '" class="preview-image" />';
            document.getElementById('buyButton').style.display = 'block';
        }

        // Function to show payment form
        function showPayment() {
            document.getElementById('paymentSection').style.display = 'block';
            document.getElementById('previewSection').style.display = 'none';
        }

        // Handle payment form submission
        document.getElementById('paymentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Payment processing is not implemented in this demo.');
            // Here you would integrate with a real payment API
        });
    </script>
</body>
</html>
