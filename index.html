<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Sneaker Hype | The Runway of Kicks</title>
  <!-- Google Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800;14..32,900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #0a0a0f 0%, #050508 100%);
      font-family: 'Space Grotesk', 'Inter', sans-serif;
      color: #ffffff;
      overflow-x: hidden;
    }

    /* animated gradient background */
    .animated-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 30%, rgba(255, 80, 80, 0.15), rgba(255, 180, 40, 0.08), transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 1600px;
      margin: 0 auto;
      padding: 2rem 3rem;
      position: relative;
      z-index: 10;
    }

    /* HERO SECTION - MODEL PAGE STYLE */
    .hero {
      text-align: center;
      margin-bottom: 3rem;
      position: relative;
    }
    .hero h1 {
      font-size: 6rem;
      font-weight: 900;
      background: linear-gradient(135deg, #FFD166, #FF6B6B, #4ECDC4, #FF9F4A);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -3px;
      text-transform: uppercase;
      filter: drop-shadow(0 0 20px rgba(255, 107, 107, 0.5));
      animation: pulseGlow 3s infinite;
    }
    @keyframes pulseGlow {
      0% { filter: drop-shadow(0 0 10px rgba(255, 107, 107, 0.3)); }
      50% { filter: drop-shadow(0 0 30px rgba(255, 180, 70, 0.6)); }
      100% { filter: drop-shadow(0 0 10px rgba(255, 107, 107, 0.3)); }
    }
    .hero-sub {
      font-size: 1.2rem;
      color: #ccc;
      letter-spacing: 2px;
      margin-top: 1rem;
    }
    .runway-badge {
      display: inline-block;
      background: rgba(255, 100, 100, 0.2);
      backdrop-filter: blur(8px);
      border-radius: 60px;
      padding: 0.5rem 1.5rem;
      margin: 1rem 0;
      border: 1px solid #ff6b6b;
      font-size: 0.85rem;
    }

    /* SEARCH BAR - GLAM */
    .search-section {
      display: flex;
      justify-content: center;
      margin: 2rem 0 3rem;
    }
    .search-box {
      width: 100%;
      max-width: 600px;
      position: relative;
    }
    .search-box input {
      width: 100%;
      padding: 1.2rem 2rem;
      background: rgba(20, 20, 30, 0.7);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255, 107, 107, 0.6);
      border-radius: 80px;
      color: white;
      font-size: 1.1rem;
      font-family: inherit;
      outline: none;
      transition: all 0.3s;
    }
    .search-box input:focus {
      border-color: #FFD166;
      box-shadow: 0 0 20px rgba(255, 209, 102, 0.4);
      background: rgba(30, 30, 45, 0.9);
    }
    .search-box i {
      position: absolute;
      right: 25px;
      top: 50%;
      transform: translateY(-50%);
      color: #FF6B6B;
      font-size: 1.3rem;
    }

    /* CATEGORY PILLS */
    .category-pills {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-bottom: 3rem;
    }
    .pill {
      background: rgba(30, 30, 45, 0.7);
      backdrop-filter: blur(8px);
      padding: 8px 24px;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid rgba(255, 107, 107, 0.3);
      color: #eee;
    }
    .pill:hover, .pill.active {
      background: #FF6B6B;
      color: black;
      border-color: #FFD166;
      transform: scale(1.05);
    }

    /* SHOE GRID - MODEL RUNWAY STYLE */
    .shoe-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 2rem;
      margin: 2rem 0 4rem;
    }
    .shoe-card {
      background: linear-gradient(145deg, rgba(25, 25, 35, 0.8), rgba(15, 15, 22, 0.9));
      backdrop-filter: blur(4px);
      border-radius: 32px;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.2);
      border: 1px solid rgba(255, 107, 107, 0.3);
      cursor: pointer;
      position: relative;
    }
    .shoe-card:hover {
      transform: translateY(-12px) scale(1.02);
      border-color: #FFD166;
      box-shadow: 0 30px 40px -15px rgba(255, 107, 107, 0.4);
    }
    .shoe-img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      transition: transform 0.5s;
    }
    .shoe-card:hover .shoe-img {
      transform: scale(1.05);
    }
    .shoe-info {
      padding: 1.2rem;
      position: relative;
    }
    .shoe-name {
      font-size: 1.4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #FFD166);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .shoe-brand {
      color: #FF9F4A;
      font-size: 0.8rem;
      letter-spacing: 1px;
      margin: 5px 0;
    }
    .shoe-price {
      font-size: 1.3rem;
      font-weight: 800;
      color: #FF6B6B;
    }
    .model-tag {
      position: absolute;
      top: 15px;
      right: 15px;
      background: #FF6B6B;
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: bold;
      color: black;
    }

    /* MODAL PREVIEW */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(20px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      background: linear-gradient(145deg, #1a1a2a, #0f0f18);
      max-width: 550px;
      width: 90%;
      border-radius: 48px;
      border: 2px solid #FFD166;
      overflow: hidden;
      animation: fadeUp 0.3s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .modal-img {
      width: 100%;
      height: 360px;
      object-fit: cover;
    }
    .modal-details {
      padding: 1.8rem;
    }
    .modal-title {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #FFD166, #FF6B6B);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .modal-price {
      font-size: 2rem;
      color: #FF6B6B;
      margin: 10px 0;
    }
    .close-modal {
      position: absolute;
      top: 20px;
      right: 25px;
      font-size: 2rem;
      cursor: pointer;
      background: black;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #FFD166;
    }
    .btn-buy {
      background: #FF6B6B;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 60px;
      font-weight: bold;
      font-size: 1rem;
      margin-top: 1rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-buy:hover {
      background: #FFD166;
      color: black;
      transform: scale(1.02);
    }

    footer {
      text-align: center;
      padding: 2rem;
      border-top: 1px solid rgba(255, 107, 107, 0.3);
      margin-top: 2rem;
      color: #aaa;
    }
    @media (max-width: 760px) {
      .container { padding: 1rem 1.2rem; }
      .hero h1 { font-size: 3rem; }
      .shoe-gallery { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="animated-bg"></div>
<div class="container">
  <!-- HERO - MODEL PAGE AESTHETIC -->
  <div class="hero">
    <h1>SNEAKER HYPE</h1>
    <div class="runway-badge"><i class="fas fa-crown"></i> THE OFFICIAL SNEAKER RUNWAY</div>
    <p class="hero-sub">"It's not about the shoes, it's what you do in them." — Michael Jordan</p>
    <p style="margin-top: 10px; font-size: 0.9rem;">Mathew Kweka · Sneakerhead / Baller</p>
  </div>

  <!-- SEARCH BUTTON / BAR -->
  <div class="search-section">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="🔍 Search for your next pair... LeBron, Jordan, Yeezy, Nike..." autocomplete="off">
      <i class="fas fa-search"></i>
    </div>
  </div>

  <!-- CATEGORY FILTERS (colorful) -->
  <div class="category-pills" id="categoryPills">
    <div class="pill active" data-cat="all">ALL SNEAKERS</div>
    <div class="pill" data-cat="Nike">NIKE</div>
    <div class="pill" data-cat="Jordan">JORDAN</div>
    <div class="pill" data-cat="Adidas">ADIDAS</div>
    <div class="pill" data-cat="Puma">PUMA</div>
    <div class="pill" data-cat="New Balance">NEW BALANCE</div>
    <div class="pill" data-cat="Luxury">LUXURY</div>
  </div>

  <!-- SHOE GRID - MANY DIFFERENT SHOES, COLORFUL -->
  <div class="shoe-gallery" id="shoeGrid"></div>

  <footer>
    <i class="fas fa-shoe-prints"></i> SNEAKER HYPE — WHERE STYLE MEETS THE STREET  |  TAP ANY SHOE FOR PREVIEW
  </footer>
</div>

<!-- MODAL PREVIEW -->
<div id="previewModal" class="modal">
  <div class="close-modal" id="closeModalBtn">&times;</div>
  <div class="modal-content">
    <img id="modalImg" class="modal-img" src="" alt="shoe preview">
    <div class="modal-details">
      <div class="modal-title" id="modalTitle"></div>
      <div id="modalBrand" style="color:#FF9F4A; margin:5px 0;"></div>
      <div class="modal-price" id="modalPrice"></div>
      <button class="btn-buy" id="buyNowBtn"><i class="fas fa-shopping-cart"></i> VIEW & BUY → Official Store</button>
    </div>
  </div>
</div>

<script>
  // ========== VIBRANT SHOE DATABASE (MANY DIFFERENT SHOES, DIVERSE BRANDS, COLORFUL) ==========
  const shoesCollection = [
    // Nike collection
    { id:1, name:"Nike Air Max 90", brand:"Nike", price:129.99, image:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500&auto=format", link:"https://www.nike.com/air-max-90" },
    { id:2, name:"Nike LeBron XXI", brand:"Nike", price:199.99, image:"https://static.nike.com/a/images/t_PDP_1728_v1/f_auto,q_auto:eco/8a7d6f5e-6b2c-4a8f-9d3a-1e2b3c4d5e6f/lebron-xxi-basketball-shoes.png", link:"https://www.nike.com/lebron-21" },
    { id:3, name:"Nike KD 17", brand:"Nike", price:159.99, image:"https://static.nike.com/a/images/t_PDP_1728_v1/f_auto,q_auto:eco/5d4e3f2a-1b0c-9d8e-7f6a-5b4c3d2e1f0a/kd-17-basketball-shoes.png", link:"https://www.nike.com/kd" },
    { id:4, name:"Nike Dunk Low", brand:"Nike", price:114.99, image:"https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?w=500&auto=format", link:"https://www.nike.com/dunk" },
    // Jordan
    { id:5, name:"Air Jordan 38", brand:"Jordan", price:185.00, image:"https://static.nike.com/a/images/t_PDP_1728_v1/f_auto,q_auto:eco/9b8c7d6e-5f4a-3b2c-1d0e-2f3a4b5c6d7e/jordan-38-basketball-shoes.png", link:"https://www.nike.com/jordan" },
    { id:6, name:"Jordan Tatum 2", brand:"Jordan", price:169.99, image:"https://static.nike.com/a/images/t_PDP_1728_v1/f_auto,q_auto:eco/7c6d5e4f-3a2b-1c0d-9e8f-7a6b5c4d3e2f/tatum-2-basketball-shoes.png", link:"https://www.nike.com/tatum" },
    { id:7, name:"Jordan 1 Retro High", brand:"Jordan", price:179.99, image:"https://images.unsplash.com/photo-1606107557195-0e29a4b5b4aa?w=500&auto=format", link:"https://www.nike.com/jordan" },
    // Adidas
    { id:8, name:"Adidas Harden Vol. 8", brand:"Adidas", price:159.99, image:"https://assets.adidas.com/images/h_840,f_auto,q_auto,fl_lossy,c_fill,g_auto/1a2b3c4d5e6f7g8h9i0j/harden-vol-8-basketball-shoes.jpg", link:"https://www.adidas.com/harden" },
    { id:9, name:"Adidas Ultra Boost", brand:"Adidas", price:179.99, image:"https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?w=500&auto=format", link:"https://www.adidas.com/ultraboost" },
    { id:10, name:"Adidas Dame 9", brand:"Adidas", price:119.99, image:"https://assets.adidas.com/images/h_840,f_auto,q_auto,fl_lossy,c_fill,g_auto/2b3c4d5e6f7g8h9i0j1k/dame-9-basketball-shoes.jpg", link:"https://www.adidas.com/dame" },
    { id:11, name:"Yeezy Boost 350 V2", brand:"Adidas", price:229.99, image:"https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?w=500&auto=format", link:"https://www.adidas.com/yeezy" },
    // Puma
    { id:12, name:"Puma MB.03 LaMelo Ball", brand:"Puma", price:124.99, image:"https://images.puma.com/image/upload/f_auto,q_auto,b_rgb:fafafa,w_800,h_800/global/123456/01/fnd/NA.jpg", link:"https://us.puma.com/mb" },
    { id:13, name:"Puma Scoot Zeros", brand:"Puma", price:109.99, image:"https://images.puma.com/image/upload/f_auto,q_auto,b_rgb:fafafa,w_800,h_800/global/234567/01/fnd/NA.jpg", link:"https://us.puma.com/scoot" },
    { id:14, name:"Puma Suede Classic", brand:"Puma", price:74.99, image:"https://images.unsplash.com/photo-1560769623-6ec6f4d0a29b?w=500&auto=format", link:"https://us.puma.com/suede" },
    // New Balance
    { id:15, name:"New Balance Kawhi 4", brand:"New Balance", price:149.99, image:"https://nb.scene7.com/is/image/NB/bbkawhi4_nb_hero?$dw_ext_main$&fmt=webp", link:"https://www.newbalance.com/kawhi" },
    { id:16, name:"New Balance 990v6", brand:"New Balance", price:199.99, image:"https://images.unsplash.com/photo-1556906781-9a412961c28c?w=500&auto=format", link:"https://www.newbalance.com/990" },
    // Under Armour
    { id:17, name:"Under Armour Curry 12", brand:"Under Armour", price:139.95, image:"https://underarmour.scene7.com/is/image/Underarmour/1234567-001_hero?fmt=jpg&qlt=85&wid=800", link:"https://www.underarmour.com/curry" },
    // Converse & Vans
    { id:18, name:"Converse All Star", brand:"Converse", price:54.99, image:"https://images.unsplash.com/photo-1584735175091-878a3e3c1e6b?w=500&auto=format", link:"https://www.converse.com" },
    { id:19, name:"Vans Old Skool", brand:"Vans", price:59.99, image:"https://images.unsplash.com/photo-1560769623-6ec6f4d0a29b?w=500&auto=format", link:"https://www.vans.com" },
    // Luxury / lifestyle
    { id:20, name:"Balenciaga Triple S", brand:"Luxury", price:850.00, image:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500&auto=format", link:"https://www.balenciaga.com" },
    { id:21, name:"Dior B23", brand:"Luxury", price:1200.00, image:"https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?w=500&auto=format", link:"https://www.dior.com" },
    { id:22, name:"Kappa Banda", brand:"Kappa", price:89.99, image:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500&auto=format", link:"https://www.kappa.com" },
    { id:23, name:"Asics Gel-Kayano 30", brand:"Asics", price:159.99, image:"https://images.unsplash.com/photo-1584735175091-878a3e3c1e6b?w=500&auto=format", link:"https://www.asics.com" },
    { id:24, name:"Reebok Club C", brand:"Reebok", price:79.99, image:"https://images.unsplash.com/photo-1556906781-9a412961c28c?w=500&auto=format", link:"https://www.reebok.com" },
    { id:25, name:"Crocs Classic Clog", brand:"Crocs", price:49.99, image:"https://images.unsplash.com/photo-1560769623-6ec6f4d0a29b?w=500&auto=format", link:"https://www.crocs.com" },
    { id:26, name:"Salomon XT-6", brand:"Salomon", price:149.99, image:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500&auto=format", link:"https://www.salomon.com" },
    { id:27, name:"Fila Disruptor", brand:"Fila", price:69.99, image:"https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?w=500&auto=format", link:"https://www.fila.com" },
    { id:28, name:"Saucony Shadow 6000", brand:"Saucony", price:119.99, image:"https://images.unsplash.com/photo-1584735175091-878a3e3c1e6b?w=500&auto=format", link:"https://www.saucony.com" }
  ];

  // Current filter state
  let currentFilter = "all";
  let searchTerm = "";

  const shoeGrid = document.getElementById('shoeGrid');
  const searchInput = document.getElementById('searchInput');
  const previewModal = document.getElementById('previewModal');
  const modalImg = document.getElementById('modalImg');
  const modalTitle = document.getElementById('modalTitle');
  const modalBrand = document.getElementById('modalBrand');
  const modalPrice = document.getElementById('modalPrice');
  const buyNowBtn = document.getElementById('buyNowBtn');
  const closeModalBtn = document.getElementById('closeModalBtn');
  let currentShoe = null;

  function renderShoes() {
    shoeGrid.innerHTML = "";
    let filtered = shoesCollection.filter(shoe => {
      const matchesSearch = shoe.name.toLowerCase().includes(searchTerm.toLowerCase()) || shoe.brand.toLowerCase().includes(searchTerm.toLowerCase());
      const matchesCategory = currentFilter === "all" || shoe.brand === currentFilter || (currentFilter === "Luxury" && shoe.brand === "Luxury");
      return matchesSearch && matchesCategory;
    });

    filtered.forEach(shoe => {
      const card = document.createElement('div');
      card.className = 'shoe-card';
      card.innerHTML = `
        <img class="shoe-img" src="${shoe.image}" onerror="this.src='https://placehold.co/600x400/1a1a2e/FF6B6B?text=${encodeURIComponent(shoe.name)}'" alt="${shoe.name}">
        <div class="shoe-info">
          <div class="shoe-name">${shoe.name}</div>
          <div class="shoe-brand"><i class="fas fa-tag"></i> ${shoe.brand}</div>
          <div class="shoe-price">$${shoe.price.toFixed(2)}</div>
        </div>
        <div class="model-tag"><i class="fas fa-camera"></i> RUNWAY</div>
      `;
      card.addEventListener('click', () => openPreview(shoe));
      shoeGrid.appendChild(card);
    });
  }

  function openPreview(shoe) {
    currentShoe = shoe;
    modalImg.src = shoe.image;
    modalTitle.innerText = shoe.name;
    modalBrand.innerText = shoe.brand + " · Official Model";
    modalPrice.innerText = `$${shoe.price.toFixed(2)}`;
    previewModal.style.display = 'flex';
    document.body.style.overflow = 'hidden';
    // set buy link
    buyNowBtn.onclick = () => {
      window.open(shoe.link, '_blank');
    };
  }

  function closePreview() {
    previewModal.style.display = 'none';
    document.body.style.overflow = 'auto';
  }

  // Event listeners
  searchInput.addEventListener('input', (e) => {
    searchTerm = e.target.value;
    renderShoes();
  });

  // Category pills
  document.querySelectorAll('.pill').forEach(pill => {
    pill.addEventListener('click', () => {
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      currentFilter = pill.getAttribute('data-cat');
      renderShoes();
    });
  });

  closeModalBtn.addEventListener('click', closePreview);
  window.addEventListener('click', (e) => {
    if (e.target === previewModal) closePreview();
  });

  // Initial render
  renderShoes();
</script>
</body>
</html>
