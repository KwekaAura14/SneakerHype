  gsap.from(".hero-title", { duration: 1, y: 50, opacity: 0, ease: "power3.out" });
  window.addEventListener('scroll', () => { document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 50); });
  document.getElementById('scrollHint')?.addEventListener('click', () => { document.getElementById('mainContent').scrollIntoView({ behavior: 'smooth' }); });

  function renderBrands() {
    let filtered = brands.filter(b => b.name.toLowerCase().includes(searchTerm.toLowerCase()));
    brandsView.innerHTML = `<div class="brand-grid">${filtered.map(b => `<div class="brand-card" data-brand="${b.name}"><div class="brand-icon"><i class="${b.icon}"></i></div><div class="brand-name">${b.name}</div><div class="brand-count">${b.count} MODELS</div></div>`).join('')}</div>`;
    document.querySelectorAll('.brand-card').forEach(card => card.addEventListener('click', () => showModels(card.getAttribute('data-brand'))));
    gsap.from(".brand-card", { duration: 0.6, y: 30, opacity: 0, stagger: 0.05 });
  }

  function showModels(brandName) {
    selectedBrand = brandName;
    const models = shoeModels.filter(m => m.brand === brandName);
    modelsGrid.innerHTML = models.map(m => `<div class="model-card"><img class="model-img" src="${m.image}" onerror="this.src='https://placehold.co/400x300/1a1a1a/555?text=${m.name}'"><div class="model-info"><div class="model-name">${m.name}</div><div class="model-price">$${m.retailPrice.toFixed(2)}</div><div class="profit"><i class="fas fa-chart-line"></i> Our profit: $${m.profitAmount.toFixed(2)} (${m.profitPercent}%)</div><div class="button-group"><button class="buy-btn" data-id="${m.id}"><i class="fas fa-shopping-cart"></i> BUY HERE</button><a href="${m.link}" target="_blank" class="redirect-btn"><i class="fas fa-external-link-alt"></i> OFFICIAL STORE</a></div></div></div>`).join('');
    document.querySelectorAll('.buy-btn').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); const model = shoeModels.find(m => m.id === parseInt(btn.getAttribute('data-id'))); if(model) openCheckout(model); }));
    brandsView.style.display = 'none'; modelsView.style.display = 'block'; currentView = "models";
    gsap.from(".model-card", { duration: 0.5, y: 30, opacity: 0, stagger: 0.05 });
  }

  function backToBrands() { brandsView.style.display = 'block'; modelsView.style.display = 'none'; currentView = "brands"; renderBrands(); }
  function openCheckout(model) { currentSelectedModel = model; document.getElementById('checkoutProductInfo').innerHTML = `<div style="display:flex; justify-content:space-between;"><div><strong>${model.name}</strong><br>$${model.retailPrice.toFixed(2)}</div><div style="color:#2ecc71;">Profit: $${model.profitAmount.toFixed(2)}</div></div>`; checkoutModal.style.display = 'flex'; document.body.style.overflow = 'hidden'; }
  function closeCheckout() { checkoutModal.style.display = 'none'; document.body.style.overflow = 'auto'; }
  function processOrder() { const fullName = document.getElementById('fullName').value.trim(), address = document.getElementById('address').value.trim(), email = document.getElementById('email').value.trim(); if(!fullName || !address || !email) { alert("Please fill all shipping details"); return; } if(selectedPaymentMethod === 'card' && !document.getElementById('cardNumber').value.trim()) { alert("Enter card details"); return; } closeCheckout(); toast.style.display = 'block'; setTimeout(() => toast.style.display = 'none', 4000); alert(`✅ ORDER CONFIRMED! Profit Earned: $${currentSelectedModel.profitAmount.toFixed(2)}\n\nShipped to: ${address}\n\nThank you!`); currentSelectedModel = null; }

  document.querySelectorAll('.payment-opt').forEach(opt => opt.addEventListener('click', () => { document.querySelectorAll('.payment-opt').forEach(o => o.classList.remove('selected')); opt.classList.add('selected'); selectedPaymentMethod = opt.getAttribute('data-method'); document.getElementById('cardDetails').style.display = selectedPaymentMethod === 'card' ? 'block' : 'none'; }));
  function renderFilters() { const allBrands = [...new Set(shoeModels.map(m => m.brand))]; filtersContainer.innerHTML = `<div class="filter active" data-cat="all">ALL</div>` + allBrands.map(b => `<div class="filter" data-cat="${b}">${b.toUpperCase()}</div>`).join(''); document.querySelectorAll('.filter').forEach(btn => btn.addEventListener('click', () => { document.querySelectorAll('.filter').forEach(b => b.classList.remove('active')); btn.classList.add('active'); const cat = btn.getAttribute('data-cat'); if(cat === 'all') { if(currentView === 'brands') renderBrands(); else if(currentView === 'models' && selectedBrand) showModels(selectedBrand); } else { if(currentView === 'brands') { searchTerm = cat; renderBrands(); } else if(currentView === 'models') showModels(cat); } if(currentView === 'brands' && cat !== 'all') searchTerm = cat; else if(currentView === 'brands' && cat === 'all') searchTerm = ""; if(currentView === 'brands') renderBrands(); })); }
  searchInput.addEventListener('input', (e) => { searchTerm = e.target.value; if(currentView === 'brands') renderBrands(); else if(currentView === 'models' && selectedBrand) { const models = shoeModels.filter(m => m.brand === selectedBrand && m.name.toLowerCase().includes(searchTerm.toLowerCase())); modelsGrid.innerHTML = models.map(m => `<div class="model-card"><img class="model-img" src="${m.image}"><div class="model-info"><div class="model-name">${m.name}</div><div class="model-price">$${m.retailPrice.toFixed(2)}</div><div class="profit">Profit: $${m.profitAmount.toFixed(2)}</div><div class="button-group"><button class="buy-btn" data-id="${m.id}">BUY HERE</button><a href="${m.link}" target="_blank" class="redirect-btn">OFFICIAL STORE</a></div></div></div>`).join(''); document.querySelectorAll('.buy-btn').forEach(btn => btn.addEventListener('click', (e) => { const model = shoeModels.find(m => m.id === parseInt(btn.getAttribute('data-id'))); if(model) openCheckout(model); })); } });
  backBtn.addEventListener('click', backToBrands); document.getElementById('closeCheckoutBtn')?.addEventListener('click', closeCheckout); window.addEventListener('click', (e) => { if(e.target === checkoutModal) closeCheckout(); }); document.getElementById('submitOrderBtn')?.addEventListener('click', processOrder);

  // Custom Cursor
  const dot = document.querySelector('.cursor-dot'), outline = document.querySelector('.cursor-outline');
  document.addEventListener('mousemove', (e) => { dot.style.left = e.clientX + 'px'; dot.style.top = e.clientY + 'px'; outline.style.left = e.clientX + 'px'; outline.style.top = e.clientY + 'px'; });
  document.addEventListener('mouseleave', () => { dot.style.opacity = '0'; outline.style.opacity = '0'; });
  document.addEventListener('mouseenter', () => { dot.style.opacity = '1'; outline.style.opacity = '1'; });

  // Loading Animation
  let progress = 0;
  const interval = setInterval(() => {
    progress += Math.random() * 15;
    if (progress >= 100) { progress = 100; clearInterval(interval); setTimeout(() => { document.getElementById('loadingScreen').style.opacity = '0'; setTimeout(() => { document.getElementById('loadingScreen').style.display = 'none'; document.getElementById('mainContent').style.opacity = '1'; gsap.from("#mainContent", { duration: 0.8, y: 30, opacity: 0 }); }, 500); }, 300); }
    document.getElementById('loadingBar').style.width = progress + '%';
    document.getElementById('loadingPercent').innerText = Math.floor(progress) + '%';
  }, 80);

  renderFilters();
  renderBrands();
</script>
</body>
</html>
