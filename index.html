      font-family: 'Inter', monospace;
    }
    .loading-screen::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(230,57,70,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(230,57,70,0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    
    /* Motion Path Container */
    .motion-path-container {
      position: relative;
      width: 451px;
      height: 437px;
      margin-bottom: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .motion-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 8px rgba(230,57,70,0.3));
    }
    .motion-svg path {
      stroke: url(#pathGradient);
      stroke-width: 2.5;

      stroke-dashoffset: 1000;
      animation: drawPath 2.2s ease-in-out forwards;

    @keyframes drawPath {

      color: transparent;
      white-space: nowrap;
      text-transform: uppercase;
      filter: drop-shadow(0 0 12px rgba(230,57,70,0.7));

      align-items: center;
      justify-content: center;

      justify-content: center;
      margin-bottom: 20px;

    .loader-ring {

    }
    @keyframes spinRingReverse {
      0% { transform: rotate(360deg); }
      100% { transform: rotate(0deg); }

<script type="module">
  import * as THREE from "three";
  const container = document.getElementById("three-container");
  const scene = new THREE.Scene({ alpha: true });
  const camera = new THREE.PerspectiveCamera(25, container.offsetWidth / container.offsetHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(container.offsetWidth, container.offsetHeight);
  renderer.setClearColor(0x000000, 0);
  container.appendChild(renderer.domElement);
  const geometry = new THREE.BoxGeometry(1.8, 1.8, 1.8);
  const material = new THREE.MeshStandardMaterial({ color: 0xe63946, roughness: 0.3, metalness: 0.7, emissive: 0x220000, emissiveIntensity: 0.4 });
  const cube = new THREE.Mesh(geometry, material);
  const edgesGeo = new THREE.EdgesGeometry(geometry);
  const wireframe = new THREE.LineSegments(edgesGeo, new THREE.LineBasicMaterial({ color: 0xffb347 }));
  cube.add(wireframe);
  scene.add(cube);
  const ambientLight = new THREE.AmbientLight(0x404060);
  scene.add(ambientLight);
  const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
  directionalLight.position.set(3, 5, 2);
  scene.add(directionalLight);
  scene.add(new THREE.PointLight(0xe63946, 0.5).position.set(-1,1,-2));
  scene.add(new THREE.PointLight(0xffb347, 0.4).position.set(2,1,2));
  camera.position.z = 4.2; camera.position.y = 0.5;
  function animateCube() { requestAnimationFrame(animateCube); cube.rotation.x += 0.008; cube.rotation.y += 0.012; cube.rotation.z += 0.005; renderer.render(scene, camera); }
  animateCube();
  window.addEventListener('resize', () => { const w = container.offsetWidth, h = container.offsetHeight; renderer.setSize(w, h); camera.aspect = w/h; camera.updateProjectionMatrix(); });
  
  // Motion Path Animation for SNEAKER HYPE Logo
  function initMotionPath() {
    const movingLogo = document.getElementById("movingLogoText");
    const path = document.getElementById("motionPath");
    if(movingLogo && path) {
      gsap.registerPlugin(MotionPathPlugin);
      gsap.to(movingLogo, {
        duration: 3.5,
        repeat: -1,
        repeatDelay: 0.3,
        ease: "power1.inOut",
        motionPath: {
          path: path,
          align: path,
          autoRotate: true,
          alignOrigin: [0.5, 0.5]
        },
        onUpdate: () => {
          const rot = gsap.getProperty(movingLogo, "rotation");
          movingLogo.style.transform = `rotate(${rot}deg) scale(1.05)`;
        }
      });
    }
  }
  window.initMotionPath = initMotionPath;
</script>

<script>
  // Sneaker Data & Core Logic
  const sneakerData = [
    { id: 1, brand: "Nike", name: "Air Zoom Vaporfly", price: 275, profit: "+38% resell", image: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600&auto=format", url: "https://www.nike.com" },
    { id: 2, brand: "Nike", name: "Dunk Low Retro", price: 125, profit: "+22% hype", image: "https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?w=600&auto=format", url: "https://www.nike.com" },
    { id: 3, brand: "Adidas", name: "Yeezy Boost 350", price: 230, profit: "+67% premium", image: "https://images.unsplash.com/photo-1600269452121-4f2416e55c28?w=600&auto=format", url: "https://www.adidas.com" },
    { id: 4, brand: "Adidas", name: "Ultraboost 23", price: 190, profit: "+29% stable", image: "https://images.unsplash.com/photo-1608231387042-66d1773070a5?w=600&auto=format", url: "https://www.adidas.com" },
    { id: 5, brand: "New Balance", name: "990v6 Made in USA", price: 199, profit: "+45% exclusive", image: "https://images.unsplash.com/photo-1539185441755-769473a23570?w=600&auto=format", url: "https://www.newbalance.com" },
    { id: 6, brand: "New Balance", name: "2002R Protection", price: 150, profit: "+31% trending", image: "https://images.unsplash.com/photo-1584735175090-9c8fccdca87c?w=600&auto=format", url: "https://www.newbalance.com" },
    { id: 7, brand: "Jordan", name: "Air Jordan 1 Retro High", price: 180, profit: "+92% grail", image: "https://images.unsplash.com/photo-1600185365926-3a2ce3cdb9eb?w=600&auto=format", url: "https://www.jordan.com" },
    { id: 8, brand: "Jordan", name: "Air Jordan 4 Thunder", price: 210, profit: "+73% limited", image: "https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?w=600&auto=format", url: "https://www.jordan.com" },
    { id: 9, brand: "Nike", name: "Air Max 90 Futura", price: 140, profit: "+18% classic", image: "https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=600&auto=format", url: "https://www.nike.com" }
  ];
  
  let currentView = "brands", selectedBrand = "", currentFilter = "all", searchQuery = "";
  const dynamicContainer = document.getElementById("dynamicContent");
  const searchInput = document.getElementById("searchInput");
  const filterContainer = document.getElementById("filterContainer");
  
  function showToast(msg, duration = 3000) { const t=document.getElementById("toastMsg"); t.innerText=msg; t.style.display="block"; setTimeout(()=>t.style.display="none",duration); }
  function getFilteredModels() {
    let f = [...sneakerData];
    if(currentFilter!=="all") f=f.filter(m=>m.brand===currentFilter);
    if(searchQuery.trim()){ const q=searchQuery.toLowerCase(); f=f.filter(m=>m.name.toLowerCase().includes(q)||m.brand.toLowerCase().includes(q)); }
    if(currentView==="models" && selectedBrand) f=f.filter(m=>m.brand===selectedBrand);
    return f;
  }
  function getBrandStats() { const s={}; sneakerData.forEach(b=>{ s[b.brand]=(s[b.brand]||0)+1; }); return s; }
  function renderBrands() {
    const stats=getBrandStats(), brands=[...new Set(sneakerData.map(s=>s.brand))];
    let html=`<div class="brand-grid">`;
    brands.forEach(b=>{ html+=`<div class="brand-card" data-brand="${b}"><div class="brand-icon"><i class="fas fa-shoe-prints"></i></div><div class="brand-name">${b.toUpperCase()}</div><div class="brand-count">${stats[b]} MODELS</div></div>`; });
    html+=`</div>`;
    dynamicContainer.innerHTML=html;
    document.querySelectorAll(".brand-card").forEach(c=>c.addEventListener("click",()=>{ selectedBrand=c.getAttribute("data-brand"); currentView="models"; renderModels(); gsap.fromTo(".model-grid",{opacity:0,y:30},{opacity:1,y:0,duration:0.6}); }));
    gsap.fromTo(".brand-card", { opacity:0, y:50, scale:0.95 }, { opacity:1, y:0, scale:1, stagger:0.08, duration:0.8, ease:"back.out(0.6)" });
  }
  function renderModels() {
    let models=getFilteredModels();
    if(selectedBrand && currentView==="models") models=models.filter(m=>m.brand===selectedBrand);
    if(models.length===0){ dynamicContainer.innerHTML=`<div style="text-align:center; padding:4rem;">NO SNEAKERS FOUND</div>`; return; }
    let html=`<div style="margin-bottom:1.5rem;"><button class="back-btn" id="globalBackBtn"><i class="fas fa-arrow-left"></i> BACK TO BRANDS</button></div><div class="model-grid">`;
    models.forEach(m=>{ html+=`<div class="model-card"><img class="model-img" src="${m.image}" loading="lazy" onerror="this.src='https://placehold.co/600x400/1a1a1a/444?text=SNEAKER'"><div class="model-info"><div class="model-name">${m.brand} • ${m.name}</div><div class="model-price">$${m.price}</div><div class="profit">📈 RESELL: ${m.profit}</div><div class="button-group"><button class="buy-btn" data-id="${m.id}">BUY NOW</button><a class="redirect-btn" href="${m.url}" target="_blank">OFFICIAL STORE →</a></div></div></div>`; });
    html+=`</div>`;
    dynamicContainer.innerHTML=html;
    document.querySelectorAll(".buy-btn").forEach(btn=>{ btn.addEventListener("click",(e)=>{ const p=sneakerData.find(p=>p.id===parseInt(btn.getAttribute("data-id"))); if(p) openPurchaseModal(p); e.stopPropagation(); }); });
    document.getElementById("globalBackBtn")?.addEventListener("click",()=>{ currentView="brands"; selectedBrand=""; renderBrands(); gsap.fromTo(".brand-grid",{opacity:0,y:30},{opacity:1,y:0,duration:0.5}); });
  }
  function updateUIFromState() { if(currentView==="brands") renderBrands(); else renderModels(); document.querySelectorAll(".filter").forEach(btn=>{ if(btn.getAttribute("data-filter")===currentFilter) btn.classList.add("active"); else btn.classList.remove("active"); }); }
  function setupEvents() { searchInput.addEventListener("input",(e)=>{ searchQuery=e.target.value; if(currentView==="models") renderModels(); else renderBrands(); }); filterContainer.addEventListener("click",(e)=>{ const btn=e.target.closest(".filter"); if(btn){ currentFilter=btn.getAttribute("data-filter"); if(currentView==="models") renderModels(); else renderBrands(); updateUIFromState(); } }); }
  let currentProduct=null; const modal=document.getElementById("purchaseModal");
  function openPurchaseModal(p){ currentProduct=p; document.getElementById("modalProductInfo").innerText=`${p.brand} ${p.name} — $${p.price}`; modal.style.display="flex"; document.body.style.overflow="hidden"; }
  function closeModal(){ modal.style.display="none"; document.body.style.overflow=""; }
  document.querySelector(".close-modal")?.addEventListener("click",closeModal); window.addEventListener("click",(e)=>{ if(e.target===modal) closeModal(); });
  let selectedPayment="card"; document.querySelectorAll(".payment-opt").forEach(opt=>{ opt.addEventListener("click",()=>{ document.querySelectorAll(".payment-opt").forEach(o=>o.classList.remove("selected")); opt.classList.add("selected"); selectedPayment=opt.getAttribute("data-method"); }); });
  document.getElementById("submitPurchase")?.addEventListener("click",()=>{ const name=document.getElementById("fullName").value.trim(), email=document.getElementById("emailAddr").value.trim(), addr=document.getElementById("addressLine").value.trim(); if(!name||!email||!addr) showToast("❌ Please fill all fields",2000); else if(currentProduct){ showToast(`✅ ORDER PLACED! ${currentProduct.name} (${selectedPayment.toUpperCase()})`,4000); closeModal(); document.getElementById("fullName").value=""; document.getElementById("emailAddr").value=""; document.getElementById("addressLine").value=""; } });
  
  let musicPlaying=false; const music=document.getElementById("shoppingMusic"), musicBtn=document.getElementById("musicControl");
  function initMusic(){ music.volume=0.5; musicBtn.addEventListener("click",()=>{ if(musicPlaying){ music.pause(); musicPlaying=false; musicBtn.style.background="rgba(0,0,0,0.8)"; musicBtn.style.color="#e63946"; } else { music.play().catch(()=>{}); musicPlaying=true; musicBtn.style.background="#e63946"; musicBtn.style.color="white"; } }); document.body.addEventListener("click",()=>{ if(!musicPlaying && music.paused){ music.play().then(()=>{ musicPlaying=true; musicBtn.style.background="#e63946"; musicBtn.style.color="white"; }).catch(()=>{}); } },{ once:true }); }
  
  // Loading progression
  let loadPercent=0; const progressFill=document.getElementById("resnProgressFill"), percentSpan=document.getElementById("resnPercent"), loaderMsg=document.getElementById("loaderMessage"), loadingScreenDiv=document.getElementById("loadingScreen");
  const msgCycle=["⟳ TRACING THE PATH","◢ SNEAKER VECTORS","✦ MOTION ACTIVATED","⨀ FOLLOW THE SHOE","⛭ ALMOST READY"];
  let msgIndex=0;
  const msgInterval=setInterval(()=>{ if(loadPercent<100){ msgIndex=(msgIndex+1)%msgCycle.length; loaderMsg.innerText=msgCycle[msgIndex]; } },550);
  const loadInterval=setInterval(()=>{ let inc=Math.floor(Math.random()*12)+4; loadPercent=Math.min(loadPercent+inc,100); progressFill.style.width=loadPercent+"%"; percentSpan.innerText=loadPercent+"%"; if(loadPercent>=100){ clearInterval(loadInterval); clearInterval(msgInterval); loaderMsg.innerText="✓ READY TO IGNITE"; setTimeout(()=>{ loadingScreenDiv.style.opacity="0"; setTimeout(()=>{ loadingScreenDiv.style.display="none"; gsap.to(".main-container",{opacity:1,duration:1.2}); if(window.triggerTitleAnimation) window.triggerTitleAnimation(); if(window.initMotionPath) window.initMotionPath(); },900); },400); } },70);
  
  // Title split animation
  window.triggerTitleAnimation=()=>{ const el=document.getElementById('heroTitle'); const txt=el.innerText; el.innerHTML=''; txt.split('').forEach((ch,i)=>{ const span=document.createElement('span'); span.className='char'; span.textContent=ch===' '?'\u00A0':ch; el.appendChild(span); }); gsap.fromTo('.hero-title .char',{opacity:0,y:80,filter:'blur(8px)'},{opacity:1,y:0,filter:'blur(0px)',duration:0.9,stagger:0.05,ease:"back.out(1.2)",delay:0.2}); gsap.to('.hero-sub',{opacity:0.4,y:0,duration:1,delay:0.8}); const orbContainer=document.getElementById("orbitingContainer"); if(orbContainer){ for(let i=0;i<12;i++){ const orb=document.createElement("div"); orb.className="orbiting-logo"; orb.textContent=["SNEAKER HYPE","RARE KICKS","LIMITED EDITION","STREETWEAR","COLLECTOR"][i%5]; orb.style.position="absolute"; orb.style.left=Math.random()*80+10+"%"; orb.style.top=Math.random()*80+10+"%"; orb.style.animation=`floatIcon ${5+Math.random()*5}s infinite alternate`; orbContainer.appendChild(orb); } } };
  const styleSheet=document.createElement("style"); styleSheet.textContent=`@keyframes floatIcon{0%{transform:translateY(0px) rotate(0deg); opacity:0.2;}100%{transform:translateY(-30px) rotate(10deg); opacity:0.7;}}`; document.head.appendChild(styleSheet);
  
  const cursorDot=document.querySelector(".cursor-dot"), cursorOutline=document.querySelector(".cursor-outline");
  document.addEventListener("mousemove",(e)=>{ cursorDot.style.transform=`translate(${e.clientX-2}px,${e.clientY-2}px)`; cursorOutline.style.transform=`translate(${e.clientX}px,${e.clientY}px) translate(-50%,-50%)`; });
  document.addEventListener("mouseleave",()=>{ cursorDot.style.opacity="0"; cursorOutline.style.opacity="0"; });
  document.addEventListener("mouseenter",()=>{ cursorDot.style.opacity="1"; cursorOutline.style.opacity="1"; });
  window.addEventListener("scroll",()=>{ const nav=document.getElementById("nav"); if(window.scrollY>50) nav.classList.add("scrolled"); else nav.classList.remove("scrolled"); });
  ScrollTrigger.create({ trigger:".main-container", start:"top 80%", onEnter:()=>gsap.to(".main-container",{opacity:1,duration:1}) });
  document.getElementById("scrollHint")?.addEventListener("click",()=>window.scrollTo({top:window.innerHeight,behavior:"smooth"}));
  
  function init(){ setupEvents(); renderBrands(); currentView="brands"; updateUIFromState(); initMusic(); document.querySelector('.payment-opt[data-method="card"]')?.classList.add("selected"); selectedPayment="card"; }
  init();
</script>
</body>
</html>
