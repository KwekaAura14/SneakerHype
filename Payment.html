    .place-order-btn {

    @media (max-width: 900px) {
      .payment-card { grid-template-columns: 1fr; }

<script type="module">
  import * as THREE from 'three';
  
  const canvas = document.getElementById('webgl-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setClearColor(0x000000, 0);
  
  const scene = new THREE.Scene();
  scene.background = null;
  scene.fog = new THREE.FogExp2(0x050505, 0.006);
  
  const camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 1.2, 13);
  camera.lookAt(0, 0, 0);
  
  const ambient = new THREE.AmbientLight(0x111111);
  scene.add(ambient);
  const keyLight = new THREE.PointLight(0xe63946, 1.2);
  keyLight.position.set(3, 4, 5);
  scene.add(keyLight);
  const fillLight = new THREE.PointLight(0xffb347, 0.7);
  fillLight.position.set(-2, 2, 6);
  scene.add(fillLight);
  const rimLight = new THREE.PointLight(0xffffff, 0.5);
  rimLight.position.set(0, 3, -5);
  scene.add(rimLight);
  
  const particleCount = 1500;
  const particleGeo = new THREE.BufferGeometry();
  const positions = new Float32Array(particleCount * 3);
  for (let i = 0; i < particleCount; i++) {
    positions[i*3] = (Math.random() - 0.5) * 50;
    positions[i*3+1] = (Math.random() - 0.5) * 28;
    positions[i*3+2] = (Math.random() - 0.5) * 40 - 20;
  }
  particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const particleMat = new THREE.PointsMaterial({ color: 0xe63946, size: 0.06, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending });
  const particles = new THREE.Points(particleGeo, particleMat);
  scene.add(particles);
  
  const knotGeo = new THREE.TorusKnotGeometry(1.0, 0.22, 200, 32, 3, 4);
  const knotMat = new THREE.MeshStandardMaterial({ color: 0xe63946, emissive: 0x441111, roughness: 0.25, metalness: 0.85, emissiveIntensity: 0.6 });
  const knot = new THREE.Mesh(knotGeo, knotMat);
  scene.add(knot);
  
  const ringGeo = new THREE.TorusGeometry(1.6, 0.04, 128, 300);
  const ringMat = new THREE.MeshStandardMaterial({ color: 0xffb347, emissive: 0x552200, metalness: 0.9, roughness: 0.2 });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  scene.add(ring);
  
  let time = 0;
  function animate() {
    requestAnimationFrame(animate);
    time += 0.008;
    knot.rotation.x = time * 0.5;
    knot.rotation.y = time * 0.7;
    knot.rotation.z = time * 0.3;
    knot.material.emissiveIntensity = 0.5 + Math.sin(time * 2) * 0.2;
    ring.rotation.x = Math.sin(time * 0.4) * 0.2;
    ring.rotation.y = time * 0.5;
    particles.rotation.y = time * 0.03;
    particles.rotation.x = Math.sin(time * 0.1) * 0.05;
    camera.position.x += (Math.sin(time * 0.2) * 0.04 - camera.position.x) * 0.02;
    camera.position.y += (Math.sin(time * 0.5) * 0.03 - camera.position.y) * 0.02;
    camera.lookAt(0, 0, 0);
    renderer.render(scene, camera);
  }
  animate();
  
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>

<script>
  // ========== LOAD CART FROM LOCALSTORAGE ==========
  let cart = [];
  let shippingDetails = {};
  let selectedPayment = "card";
  
  function loadCart() {
    const saved = localStorage.getItem("sneaker_cart");
    if (saved) {
      cart = JSON.parse(saved);
    }
    // Also try to load shipping details if any
    const savedShipping = localStorage.getItem("shipping_details");
    if (savedShipping) {
      shippingDetails = JSON.parse(savedShipping);
    }
  }
  
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
  
  function formatPrice(price) {
    return `$${price}`;
  }
  
  function calculateTotal() {
    return cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
  }
  
  function renderPaymentPage() {
    const container = document.getElementById('paymentCard');
    const total = calculateTotal();
    
    if (cart.length === 0) {
      container.innerHTML = `
        <div class="empty-cart" style="grid-column: 1/-1; padding: 4rem; text-align: center;">
          <i class="fas fa-shopping-cart"></i>
          <h3>Your cart is empty</h3>
          <p style="margin-top: 1rem; color: rgba(255,255,255,0.5);">Add some sneakers from the shop to proceed with payment.</p>
          <a href="javascript:history.back()" style="display: inline-block; margin-top: 1.5rem; background: linear-gradient(135deg, #e63946, #ffb347); padding: 0.8rem 2rem; border-radius: 60px; text-decoration: none; color: white; font-weight: 600;">← Back to Shop</a>
        </div>
      `;
      return;
    }
    
    // Build cart items HTML
    let cartItemsHtml = '';
    cart.forEach(item => {
      cartItemsHtml += `
        <div class="cart-preview-item">
          <div class="item-name">${escapeHtml(item.name)} <span style="color: rgba(255,255,255,0.4);">x${item.quantity}</span></div>
          <div class="item-price">$${item.price * item.quantity}</div>
        </div>
      `;
    });
    
    // Get shipping info from localStorage (set in previous step)
    const fullName = localStorage.getItem("payment_fullName") || shippingDetails.fullName || "Not provided";
    const email = localStorage.getItem("payment_email") || shippingDetails.email || "Not provided";
    const address = localStorage.getItem("payment_address") || shippingDetails.address || "Not provided";
    const city = localStorage.getItem("payment_city") || shippingDetails.city || "Not provided";
    const zip = localStorage.getItem("payment_zip") || shippingDetails.zip || "Not provided";
    const country = localStorage.getItem("payment_country") || shippingDetails.country || "United States";
    
    container.innerHTML = `
      <!-- Order Summary Column -->
      <div class="order-summary">
        <h3><i class="fas fa-receipt"></i> Order Summary</h3>
        <div class="cart-items-preview">
          ${cartItemsHtml}
        </div>
        <div class="total-row">
          <span>Total</span>
          <span>$${total}</span>
        </div>
        <div class="shipping-info">
          <h4 style="font-size: 0.8rem; margin-bottom: 0.5rem; color: #e63946;"><i class="fas fa-truck"></i> Shipping Details</h4>
          <p><strong>${escapeHtml(fullName)}</strong></p>
          <p>${escapeHtml(email)}</p>
          <p>${escapeHtml(address)}</p>
          <p>${escapeHtml(city)}, ${escapeHtml(zip)}</p>
          <p>${escapeHtml(country)}</p>
        </div>
      </div>
      
      <!-- Payment Form Column -->
      <div class="payment-form">
        <h3><i class="fas fa-lock"></i> Secure Payment</h3>
        
        <div class="payment-methods" id="paymentMethods">
          <div class="pay-method selected" data-method="card">
            <i class="fab fa-cc-visa"></i> Credit Card
          </div>
          <div class="pay-method" data-method="paypal">
            <i class="fab fa-paypal"></i> PayPal
          </div>
          <div class="pay-method" data-method="bitcoin">
            <i class="fab fa-bitcoin"></i> Bitcoin
          </div>
        </div>
        
        <div id="cardDetailsSection" class="card-details">
          <div class="form-group">
            <label>Card Number</label>
            <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19">
          </div>
          <div class="row-2">
            <div class="form-group">
              <label>Expiry Date</label>
              <input type="text" id="expiry" placeholder="MM/YY">
            </div>
            <div class="form-group">
              <label>CVV</label>
              <input type="text" id="cvv" placeholder="123" maxlength="4">
            </div>
          </div>
          <div class="form-group">
            <label>Cardholder Name</label>
            <input type="text" id="cardholderName" placeholder="Name on card">
          </div>
        </div>
        
        <div id="paypalSection" style="display: none; text-align: center; padding: 2rem;">
          <i class="fab fa-paypal" style="font-size: 4rem; color: #0070ba; margin-bottom: 1rem; display: block;"></i>
          <p>You will be redirected to PayPal to complete your payment securely.</p>
        </div>
        
        <div id="bitcoinSection" style="display: none; text-align: center; padding: 2rem;">
          <i class="fab fa-bitcoin" style="font-size: 4rem; color: #f7931a; margin-bottom: 1rem; display: block;"></i>
          <p>Bitcoin payment address will be generated.</p>
          <div style="background: rgba(255,255,255,0.1); padding: 0.5rem; border-radius: 0.5rem; margin-top: 1rem;">
            <code style="word-break: break-all;">bc1qxy2kgdygjrsqtzq2n0yrf2493p83kkfjhx0wlh</code>
          </div>
        </div>
        
        <button class="place-order-btn" id="placeOrderBtn">
          <i class="fas fa-check-circle"></i> Complete Purchase — $${total}
        </button>
        
        <div class="secure-badge">
          <i class="fas fa-shield-alt"></i> 256-bit SSL Encrypted | PCI Compliant
        </div>
      </div>
    `;
    
    // Attach payment method selection
    const methods = document.querySelectorAll('.pay-method');
    const cardSection = document.getElementById('cardDetailsSection');
    const paypalSection = document.getElementById('paypalSection');
    const bitcoinSection = document.getElementById('bitcoinSection');
    
    methods.forEach(method => {
      method.addEventListener('click', () => {
        methods.forEach(m => m.classList.remove('selected'));
        method.classList.add('selected');
        selectedPayment = method.dataset.method;
        
        // Show/hide appropriate sections
        cardSection.style.display = 'none';
        paypalSection.style.display = 'none';
        bitcoinSection.style.display = 'none';
        
        if (selectedPayment === 'card') {
          cardSection.style.display = 'block';
        } else if (selectedPayment === 'paypal') {
          paypalSection.style.display = 'block';
        } else if (selectedPayment === 'bitcoin') {
          bitcoinSection.style.display = 'block';
        }
      });
    });
    
    // Place order logic
    const placeBtn = document.getElementById('placeOrderBtn');
    placeBtn.addEventListener('click', () => {
      if (selectedPayment === 'card') {
        const cardNum = document.getElementById('cardNumber')?.value.trim();
        const expiry = document.getElementById('expiry')?.value.trim();
        const cvv = document.getElementById('cvv')?.value.trim();
        const cardName = document.getElementById('cardholderName')?.value.trim();
        
        if (!cardNum || !expiry || !cvv || !cardName) {
          alert("Please fill in all credit card details.");
          return;
        }
        if (cardNum.replace(/\s/g, '').length < 15) {
          alert("Please enter a valid card number.");
          return;
        }
        if (!expiry.match(/^\d{2}\/\d{2}$/)) {
          alert("Please enter expiry date in MM/YY format.");
          return;
        }
      }
      
      // Process order
      const total = calculateTotal();
      let paymentMethodName = selectedPayment === 'card' ? 'Credit Card' : (selectedPayment === 'paypal' ? 'PayPal' : 'Bitcoin');
      
      // Simulate payment processing
      placeBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Processing...';
      placeBtn.disabled = true;
      
      setTimeout(() => {
        alert(`✅ Order successfully placed!\n\nPayment Method: ${paymentMethodName}\nTotal Amount: $${total}\n\nYour sneakers will be shipped to the provided address within 3-5 business days.\n\nThank you for shopping with SNEAKER HYPE!`);
        
        // Clear cart after successful order
        localStorage.removeItem("sneaker_cart");
        // Clear shipping details
        localStorage.removeItem("payment_fullName");
        localStorage.removeItem("payment_email");
        localStorage.removeItem("payment_address");
        localStorage.removeItem("payment_city");
        localStorage.removeItem("payment_zip");
        localStorage.removeItem("payment_country");
        localStorage.removeItem("shipping_details");
        
        // Redirect to home page / shop
        window.location.href = "index.html";
      }, 1500);
    });
  }
  
  // Also collect any shipping details passed from previous page
  function collectShippingFromURL() {
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('fullName')) {
      localStorage.setItem("payment_fullName", urlParams.get('fullName'));
      localStorage.setItem("payment_email", urlParams.get('email'));
      localStorage.setItem("payment_address", urlParams.get('address'));
      localStorage.setItem("payment_city", urlParams.get('city'));
      localStorage.setItem("payment_zip", urlParams.get('zip'));
      localStorage.setItem("payment_country", urlParams.get('country'));
    }
  }
  
  // Initialize
  collectShippingFromURL();
  loadCart();
  renderPaymentPage();
  
  // Navigation scroll effect
  window.addEventListener('scroll', () => {
    const nav = document.getElementById('nav');
    if (window.scrollY > 50) nav.classList.add('scrolled');
    else nav.classList.remove('scrolled');
  });
  
  // Music (same as main page)
  let musicPlaying = false;
  const music = document.getElementById('bgMusic');
  const musicBtn = document.getElementById('musicControl');
  if (music && musicBtn) {
    music.volume = 0.25;
    musicBtn.addEventListener('click', () => {
      if (musicPlaying) {
        music.pause();
        musicPlaying = false;
        musicBtn.style.background = "rgba(0,0,0,0.8)";
        musicBtn.style.color = "#e63946";
      } else {
        music.play().catch(() => {});
        musicPlaying = true;
        musicBtn.style.background = "#e63946";
        musicBtn.style.color = "white";
      }
    });
    document.body.addEventListener('click', () => {
      if (!musicPlaying && music.paused) {
        music.play().then(() => {
          musicPlaying = true;
          musicBtn.style.background = "#e63946";
          musicBtn.style.color = "white";
        }).catch(() => {});
      }
    }, { once: true });
  }
  
  // Custom cursor
  const dot = document.querySelector(".cursor-dot"), outline = document.querySelector(".cursor-outline");
  if (dot && outline) {
    document.addEventListener("mousemove", (e) => {
      dot.style.transform = `translate(${e.clientX - 2}px, ${e.clientY - 2}px)`;
      outline.style.transform = `translate(${e.clientX}px, ${e.clientY}px) translate(-50%, -50%)`;
    });
  }
</script>
</body>
</html>
